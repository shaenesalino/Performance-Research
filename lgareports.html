<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Australian Property Market Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  margin: 0;
  background: #eefcfd;
  color: #161d27;
}

/* HEADER */
.site-header {
  background: #0a6266;
  padding: 14px;
  text-align: center;
}
.header-logo {
  height: 36px;
}

/* HERO */
.hero {
  padding: 50px 20px;
  max-width: 900px;
  margin: auto;
}

.hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: 40px;
  color: #0a6266;
  margin-bottom: 10px;
}

.hero-subtitle {
  color: #8aadb2;
  margin-bottom: 20px;
}

.hero-description {
  color: #5c7b80;
  margin-bottom: 20px;
}

.hero-subtle {
  display: block;
  margin-top: 6px;
  font-size: 13px;
  color: #8aadb2;
}

.hero-cta {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.btn-primary {
  background: #2aadbb;
  border: none;
  padding: 10px 20px;
  color: white;
  cursor: pointer;
}

.btn-secondary {
  border: 1px solid #2aadbb;
  background: transparent;
  padding: 10px 20px;
  cursor: pointer;
}

.hero-stats {
  display: flex;
  gap: 30px;
}

.stat-value {
  font-size: 20px;
  font-family: 'DM Serif Display';
}

.stat-label {
  font-size: 11px;
  color: #8aadb2;
}

/* FILTER */
.filter-section {
  padding: 20px;
}

select {
  padding: 10px;
  margin-right: 10px;
}

</style>
</head>

<body>

<header class="site-header">
  <img src="logo.png" class="header-logo">
</header>

<section class="hero">

<h1 class="hero-title">
Australian Property Market Analytics
</h1>

<p class="hero-subtitle">
by Performance Research
</p>

<p class="hero-description">
Build custom reports, visualize market trends, and compare property data across Australian LGAs.
<span class="hero-subtle">Powered by real-time analytics in a single dashboard.</span>
</p>

<div class="hero-cta">
<button class="btn-primary" onclick="scrollToFilters()">Start Exploring</button>
<button class="btn-secondary" onclick="scrollToFilters()">Build Report</button>
</div>

<div class="hero-stats">
<div>
<div class="stat-value" id="statLga">—</div>
<div class="stat-label">LGAs</div>
</div>

<div>
<div class="stat-value" id="statRecords">—</div>
<div class="stat-label">Records</div>
</div>

<div>
<div class="stat-value">1980+</div>
<div class="stat-label">Coverage</div>
</div>
</div>

</section>

<section class="filter-section" id="filterSection">

<select id="lgaSelect"></select>

<select id="typeSelect">
<option value="">All</option>
<option value="H">House</option>
<option value="U">Unit</option>
</select>

<select id="viewMode">
<option value="monthly">Monthly</option>
<option value="yearly">Yearly</option>
</select>

<button onclick="generateReport()">Generate</button>

</section>

<script>

/* SIMPLE STATE */
let rawData = [];

/* LOAD SAMPLE (replace with your Supabase later) */
async function loadData() {
  // TEMP mock
  rawData = [
    {lga:"Sydney", propType:"H", monthEnd:new Date("2024-01-01"), medPrice12:1000000},
    {lga:"Sydney", propType:"H", monthEnd:new Date("2025-01-01"), medPrice12:1100000}
  ];

  populateFilters();
  updateStats();
}

function populateFilters() {
  const lgas = [...new Set(rawData.map(r=>r.lga))];

  const select = document.getElementById("lgaSelect");

  select.innerHTML = lgas.map(l=>`<option>${l}</option>`).join("");
}

function updateStats() {
  document.getElementById("statLga").textContent =
    new Set(rawData.map(r=>r.lga)).size;

  document.getElementById("statRecords").textContent =
    rawData.length;
}

function scrollToFilters() {
  document.getElementById("filterSection").scrollIntoView({behavior:"smooth"});
}

/* YEARLY AGGREGATION */
function aggregateYearly(data) {
  const map = new Map();

  data.forEach(r=>{
    const year = r.monthEnd.getFullYear();
    if(!map.has(year) || r.monthEnd > map.get(year).monthEnd){
      map.set(year,r);
    }
  });

  return [...map.values()];
}

/* GENERATE */
function generateReport() {
  const lga = document.getElementById("lgaSelect").value;
  const type = document.getElementById("typeSelect").value;
  const view = document.getElementById("viewMode").value;

  let data = rawData.filter(r=>r.lga===lga);

  if(type) data = data.filter(r=>r.propType===type);

  if(view==="yearly") {
    data = aggregateYearly(data);
  }

  console.log("FINAL DATA:", data);
  alert("Check console for output (next step: charts)");
}

loadData();

</script>

</body>
</html>
