<style>
  html, body { background: #F7F8FA; color: #111827; font-family: 'Manrope', system-ui, sans-serif; font-feature-settings: "cv11"; -webkit-font-smoothing: antialiased; touch-action: manipulation; }
  .num { font-variant-numeric: tabular-nums; font-weight: 600; }
  input, select, textarea, button { font-family: inherit; }
  input[type="number"], input[type="date"] { font-variant-numeric: tabular-nums; font-weight: 600; }
  input[type="date"], input[type="month"] { min-width: 0; max-width: 100%; box-sizing: border-box; }

  /* Inputs */
  .input-base { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 6px; padding: 8px 12px; font-size: 14px; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; color: #111827; }
  .input-base:hover { border-color: #CBD5E1; }
  .input-base:focus { outline: none; border-color: #4A90E2; box-shadow: 0 0 0 3px rgba(74,144,226,0.15); }
  .input-base::placeholder { color: #94A3B8; }
  .input-base:disabled { background: #F1F5F9; color: #94A3B8; cursor: not-allowed; }
  .input-error { border-color: #FF5A5F !important; background: #FEF2F2 !important; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background-color 0.12s, border-color 0.12s, color 0.12s; cursor: pointer; border: 1px solid transparent; white-space: nowrap; line-height: 1.2; }
  .btn:focus-visible { outline: 2px solid #4A90E2; outline-offset: 2px; }
  .btn-primary { background: #4A90E2; color: #FFFFFF; }
  .btn-primary:hover { background: #2563EB; }
  .btn-secondary { background: #FFFFFF; color: #111827; border-color: #E5E7EB; }
  .btn-secondary:hover { background: #F1F5F9; border-color: #CBD5E1; }
  .btn-ghost { background: transparent; color: #4B5563; border-color: transparent; }
  .btn-ghost:hover { background: #F1F5F9; color: #111827; }
  .btn-danger { background: transparent; color: #DC2626; border-color: #FECACA; }
  .btn-danger:hover { background: #FEF2F2; border-color: #DC2626; }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .btn-icon { padding: 6px 8px; }

  /* Cards */
  .card { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03); }
  .card-flat { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; }

  /* Chips */
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; line-height: 1.4; }
  .chip-paid { background: #ECFDF5; color: #3F9D2D; }
  .chip-partial { background: #FFFBEB; color: #D97706; }
  .chip-unpaid { background: #FEF2F2; color: #DC2626; }
  .chip-muted { background: #F1F5F9; color: #4B5563; }
  .chip-info { background: #EFF6FF; color: #2563EB; }
  .chip-warn { background: #FFFBEB; color: #D97706; }
  .chip-teal { background: rgba(14,165,165,0.1); color: #0EA5A5; }
  .chip-purple { background: rgba(126,63,227,0.1); color: #7E3FE3; }
  .chip-pink { background: rgba(209,29,108,0.1); color: #D11D6C; }
  .chip-gold { background: #FFFBEB; color: #C9920C; }

  /* Stat card accents - colored icon bubble */
  .stat-icon { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; }
  .stat-icon-blue { background: #EFF6FF; color: #2563EB; }
  .stat-icon-teal { background: rgba(14,165,165,0.12); color: #0EA5A5; }
  .stat-icon-green { background: #ECFDF5; color: #3F9D2D; }
  .stat-icon-red { background: #FEF2F2; color: #DC2626; }
  .stat-icon-purple { background: rgba(126,63,227,0.12); color: #7E3FE3; }
  .stat-icon-pink { background: rgba(209,29,108,0.1); color: #D11D6C; }
  .stat-icon-orange { background: #FFFBEB; color: #E07B0A; }
  .stat-icon-gold { background: #FFFBEB; color: #C9920C; }

  /* Top accent bar for cards */
  .card-accent { position: relative; overflow: hidden; }
  .card-accent::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-accent-blue::before   { background: #4A90E2; }
  .card-accent-teal::before   { background: #0EA5A5; }
  .card-accent-green::before  { background: #3F9D2D; }
  .card-accent-red::before    { background: #DC2626; }
  .card-accent-purple::before { background: #7E3FE3; }
  .card-accent-pink::before   { background: #D11D6C; }
  .card-accent-orange::before { background: #E07B0A; }
  .card-accent-gold::before   { background: #C9920C; }

  /* Nav */
  .nav-link { padding: 7px 12px; border-radius: 6px; font-weight: 600; font-size: 14px; color: #4B5563; transition: background-color 0.12s, color 0.12s; cursor: pointer; }
  .nav-link:hover { background: #F1F5F9; color: #111827; }
  .nav-link.active { background: #4A90E2; color: #FFFFFF; }
  .nav-link.active:hover { background: #2563EB; color: #FFFFFF; }

  /* Tables */
  table.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.data-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: #6B7280; border-bottom: 1px solid #E5E7EB; background: #F7F8FA; }
  table.data-table td { padding: 12px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; color: #111827; }
  table.data-table tr:last-child td { border-bottom: none; }
  table.data-table tbody tr:hover td { background: #F7F8FA; }
  table.data-table tfoot td, table.data-table tfoot th { background: #F1F5F9; font-weight: 600; color: #111827; border-bottom: none; }
  .num-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 14px; }

  /* Monthly entry table — grouped columns with subtle dividers */
  table.entry-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.entry-table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: #6B7280; background: #F7F8FA; }
  table.entry-table td { padding: 10px 12px; vertical-align: middle; color: #111827; }
  table.entry-table tbody tr { border-bottom: 1px solid #F1F5F9; }
  table.entry-table tbody tr:last-child { border-bottom: none; }
  table.entry-table tbody tr:hover td { background: #FAFBFC; }
  /* Group header row (top of thead) */
  table.entry-table .group-row th { padding: 6px 12px; text-align: center; font-size: 10px; letter-spacing: 0.08em; border-bottom: 1px solid #E5E7EB; }
  table.entry-table .group-electric { background: rgba(224, 123, 10, 0.06); color: #E07B0A; }
  table.entry-table .group-water    { background: rgba(14, 165, 165, 0.06); color: #0EA5A5; }
  table.entry-table .group-bill     { background: rgba(74, 144, 226, 0.06); color: #2563EB; }
  /* Column-group dividers (first cell in each group row gets a left border) */
  table.entry-table .col-div { border-left: 1px solid #E5E7EB; }
  /* Column tint on body rows to reinforce grouping (very subtle) */
  table.entry-table tbody td.td-electric { background: rgba(224, 123, 10, 0.025); }
  table.entry-table tbody td.td-water    { background: rgba(14, 165, 165, 0.025); }
  table.entry-table tbody td.td-bill     { background: rgba(74, 144, 226, 0.025); }
  table.entry-table .reading-input { text-align: center; font-weight: 600; }
  table.entry-table .total-cell { font-weight: 700; font-size: 14px; }

  /* Mobile: collapse the monthly entry table into per-unit cards */
  @media (max-width: 639px) {
    table.entry-table { display: block; }
    table.entry-table thead { display: none; }
    table.entry-table tbody { display: block; }
    table.entry-table tbody tr {
      display: block;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    table.entry-table tbody tr:hover td { background: transparent; }
    table.entry-table tbody td {
      display: flex !important;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px !important;
      border: none !important;
      background: transparent !important;
      text-align: left !important;
    }
    table.entry-table tbody td::before {
      content: attr(data-label);
      font-size: 11px;
      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: 1;
      min-width: 100px;
    }
    table.entry-table tbody td.mobile-header {
      display: block !important;
      padding: 10px 14px !important;
      background: #F7F8FA !important;
      border-bottom: 1px solid #E5E7EB !important;
    }
    table.entry-table tbody td.mobile-header::before { display: none; }
    table.entry-table tbody td.mobile-sep {
      border-top: 1px solid #F1F5F9 !important;
      margin-top: 2px;
      padding-top: 10px !important;
    }
    /* Tinted group hints (subtle left accent bar) */
    table.entry-table tbody td.td-electric { box-shadow: inset 3px 0 0 rgba(224, 123, 10, 0.35); }
    table.entry-table tbody td.td-water    { box-shadow: inset 3px 0 0 rgba(14, 165, 165, 0.35); }
    table.entry-table tbody td.td-bill     { box-shadow: inset 3px 0 0 rgba(74, 144, 226, 0.35); }
    /* Inputs narrower on mobile */
    table.entry-table tbody td input[type="number"] {
      max-width: 140px;
      text-align: right;
    }
    /* Totals footer simplifies to a compact summary */
    table.entry-table tfoot { display: block; background: #F7F8FA; border: 1px solid #E5E7EB; border-radius: 10px; margin-top: 4px; padding: 10px 14px; }
    table.entry-table tfoot tr { display: block; }
    table.entry-table tfoot th, table.entry-table tfoot td { display: flex; justify-content: space-between; padding: 4px 0 !important; border: none !important; text-align: left !important; background: transparent !important; font-size: 13px; }
    table.entry-table tfoot tr:first-child th[colspan] { display: none; }
    table.entry-table tfoot tr:first-child th:not([colspan])::before { content: attr(data-mlabel); font-size: 11px; color: #6B7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; flex: 1; }
    table.entry-table tfoot tr:last-child { display: none; }
  }

  /* KPI stat block */
  .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #6B7280; }
  .stat-value { font-size: 24px; font-weight: 700; color: #111827; font-variant-numeric: tabular-nums; }
  .stat-value.num { font-size: 22px; font-weight: 700; }

  /* Banner */
  .banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-radius: 8px; border: 1px solid transparent; font-size: 14px; }
  .banner-warn { background: #FFFBEB; border-color: #FDE68A; color: #78350F; }
  .banner-danger { background: #FEF2F2; border-color: #FECACA; color: #991B1B; }
  .banner-info { background: #EFF6FF; border-color: #BFDBFE; color: #1E40AF; }
  .banner-success { background: #ECFDF5; border-color: #A7F3D0; color: #065F46; }

  /* Animations */
  .fade-in { animation: fadeIn 0.18s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Ledger responsive: table on desktop, card stack on mobile */
  .ledger-table { display: block; }
  .ledger-mobile { display: none; }
  @media (max-width: 640px) {
    .ledger-table { display: none; }
    .ledger-mobile { display: block; }
  }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-panel { background: #FFFFFF; border-radius: 12px; max-width: 560px; width: 100%; max-height: 92vh; overflow-y: auto; border: 1px solid #E5E7EB; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15); }

  /* Tab */
  .tab { padding: 8px 2px; font-weight: 600; font-size: 14px; color: #6B7280; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.12s, border-color 0.12s; }
  .tab.active { color: #2563EB; border-bottom-color: #2563EB; }
  .tab:hover:not(.active) { color: #111827; }

  /* Section header bar */
  .section-h { font-size: 18px; font-weight: 700; color: #111827; letter-spacing: -0.01em; }
  .section-sub { font-size: 13px; color: #6B7280; }

  /* KBD */
  .kbd { font-size: 11px; padding: 2px 6px; background: #F1F5F9; border: 1px solid #E5E7EB; border-radius: 4px; color: #334155; font-weight: 600; }

  /* Missing cell indicator */
  .missing { color: #94A3B8; font-style: italic; }
  .cell-warn { color: #D97706; }
  .cell-danger { color: #DC2626; font-weight: 600; }
  .cell-success { color: #3F9D2D; font-weight: 600; }

  /* Print */
  @media print {
    body { background: white !important; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .card, .card-flat { box-shadow: none !important; border: 1px solid #111 !important; }
    @page { margin: 16mm; }
  }
  .print-only { display: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #F1F5F9; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 5px; border: 2px solid #F1F5F9; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
</style>

// Accent palette — rotated per unit / per position for visual variety
const ACCENT_PALETTE = [
  { key: 'blue',   color: '#4A90E2', soft: '#EFF6FF',               dark: '#2563EB' },
  { key: 'teal',   color: '#0EA5A5', soft: 'rgba(14,165,165,0.1)',  dark: '#0EA5A5' },
  { key: 'purple', color: '#7E3FE3', soft: 'rgba(126,63,227,0.1)',  dark: '#7E3FE3' },
  { key: 'pink',   color: '#D11D6C', soft: 'rgba(209,29,108,0.1)',  dark: '#D11D6C' },
  { key: 'orange', color: '#E07B0A', soft: '#FFFBEB',               dark: '#D97706' },
  { key: 'green',  color: '#2E9E5B', soft: '#ECFDF5',               dark: '#3F9D2D' },
  { key: 'gold',   color: '#C9920C', soft: '#FFFBEB',               dark: '#C9920C' },
];

function unitAccent(unitId) {
  const u = state.units.find(x => x.id === unitId);
  if (u && u.colorKey) {
    const found = ACCENT_PALETTE.find(p => p.key === u.colorKey);
    if (found) return found;
  }
  const idx = state.units.findIndex(x => x.id === unitId);
  const i = idx >= 0 ? idx : 0;
  return ACCENT_PALETTE[i % ACCENT_PALETTE.length];
}

// ============================================================================
// 2. STATE & PERSISTENCE
// ============================================================================
let state = null;
let session = { authed: false, mode: 'admin' };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
    // Fallback: try v1 and migrate
    const legacy = localStorage.getItem(LEGACY_KEY_V1);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      return migrateState(parsed);
    }
  } catch (e) { console.error('loadState', e); }
  return null;
}
function saveStateLocal() {
  if (!state.meta) state.meta = {};
  state.meta.lastSavedAt = new Date().toISOString();
  state.meta.schemaVersion = SCHEMA_VERSION;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function saveState() {
  saveStateLocal();
  // Schedule a debounced cloud push if sync is active
  schedulePush();
}
function loadSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { authed: false, mode: 'admin' };
}
function saveSession() {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

// ============================================================================
// 3. UTILITIES
// ============================================================================
const $  = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => Array.from(el.querySelectorAll(s));

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '—';
  const neg = n < 0;
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (neg ? '−' : '') + CURRENCY + s;
}
function fmtNum(n, dp=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = typeof iso === 'string' ? new Date(iso) : iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtRelative(iso) {
  if (!iso) return 'never';
  const then = new Date(iso).getTime();
  const now = Date.now();
  const diffSec = Math.floor((now - then) / 1000);
  if (diffSec < 60) return 'just now';
  if (diffSec < 3600) return `${Math.floor(diffSec/60)}m ago`;
  if (diffSec < 86400) return `${Math.floor(diffSec/3600)}h ago`;
  const days = Math.floor(diffSec/86400);
  if (days < 30) return `${days}d ago`;
  return fmtDate(iso);
}
function monthLabel(id) {
  const [y, m] = id.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function monthShort(id) {
  const [y, m] = id.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}
function currentMonthId() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function prevMonthId(id) {
  const [y, m] = id.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function nextMonthId(id) {
  const [y, m] = id.split('-').map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function daysBetween(iso1, iso2) {
  const d1 = new Date(iso1).getTime();
  const d2 = new Date(iso2).getTime();
  return Math.floor((d2 - d1) / 86400000);
}
function uid(prefix='id') { return `${prefix}-${Math.random().toString(36).slice(2,9)}`; }
function slugify(s) { return (s||'').toString().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'tenant'; }

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function h(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================================
// 4. CALCULATIONS  (pure — do not mutate state)
// ============================================================================
function monthById(id) { return state.months.find(m => m.id === id); }
function unitById(id) { return state.units.find(u => u.id === id); }
function tenantById(id) { return state.tenants.find(t => t.id === id); }
function tenantByCode(code) { return state.tenants.find(t => t.tenantCode === code); }
function sortedMonthIds() { return state.months.map(m => m.id).sort(); }
function activeUnits() { return state.units.filter(u => u.active); }
function activeTenants() { return state.tenants.filter(t => t.active !== false && !t.moveOutDate); }

// Returns the tenant currently occupying a unit (active, no move-out), or null.
function currentTenantForUnit(unitId) {
  return state.tenants.find(t => t.unitId === unitId && t.active !== false && !t.moveOutDate) || null;
}
// All tenants that have ever occupied this unit (current + past)
function tenantsForUnit(unitId) {
  return state.tenants.filter(t => t.unitId === unitId);
}
// Display name for a unit's current tenant
function tenantNameForUnit(unitId) {
  const t = currentTenantForUnit(unitId);
  return t ? t.name : null;
}

// Tiered water bill — reads from settings every time.
// Resolve which water rate applies for a given month. Looks up the latest
// waterRateHistory entry whose `from` is on or before monthId; falls back to
// the current settings (waterBaseRate / waterBaseCubic / waterPerExtra).
function waterRateForMonth(monthId) {
  const s = state.settings;
  const history = (Array.isArray(s.waterRateHistory) ? s.waterRateHistory : [])
    .filter(r => r.from && (!monthId || r.from <= monthId));
  if (history.length) {
    history.sort((a,b) => b.from.localeCompare(a.from));
    const r = history[0];
    return { baseRate: Number(r.baseRate) || 0, baseCubic: Number(r.baseCubic) || 0, perExtra: Number(r.perExtra) || 0 };
  }
  return {
    baseRate: Number(s.waterBaseRate) || 0,
    baseCubic: Number(s.waterBaseCubic) || 0,
    perExtra: Number(s.waterPerExtra) || 0,
  };
}

// Compute a water bill from cubic meters. If a monthId is provided, uses the
// rate that was in effect for that month (so historical bills stay frozen).
// Otherwise falls back to current settings.
function waterBillFrom(cubicMeters, monthId) {
  if (cubicMeters == null || isNaN(cubicMeters)) return null;
  const cm = Number(cubicMeters);
  if (cm <= 0) return 0;
  const r = waterRateForMonth(monthId);
  if (cm <= r.baseCubic) return r.baseRate;
  return r.baseRate + (cm - r.baseCubic) * r.perExtra;
}

// Find the most recent previous reading of a given field for a unit.
// field = 'electricReading' | 'waterReading'
function previousReading(unitId, monthId, field) {
  const past = state.months
    .filter(m => m.id < monthId && m.readings[unitId] && m.readings[unitId][field] != null)
    .sort((a,b) => a.id.localeCompare(b.id));
  if (past.length) return { value: past[past.length-1].readings[unitId][field], fromMonthId: past[past.length-1].id };
  const u = unitById(unitId);
  if (field === 'electricReading') return { value: u?.startElectric ?? 0, fromMonthId: null };
  if (field === 'waterReading') return { value: u?.startWater ?? 0, fromMonthId: null };
  return { value: 0, fromMonthId: null };
}

// Compute month readings & derived values for one unit.
function computeMonthReadings(unitId, monthId) {
  const month = monthById(monthId);
  const unit = unitById(unitId);
  if (!month || !unit) return null;
  const r = month.readings[unitId] || {};
  const rate = month.kwhRate;

  const prevE = previousReading(unitId, monthId, 'electricReading');
  const prevW = previousReading(unitId, monthId, 'waterReading');

  const currE = r.electricReading != null ? Number(r.electricReading) : null;
  const currW = r.waterReading != null ? Number(r.waterReading) : null;
  const vacant = !!r.vacant;

  const kwUsed = (currE != null && prevE.value != null) ? (currE - prevE.value) : null;
  const cubicUsed = (currW != null && prevW.value != null) ? (currW - prevW.value) : null;

  const electricBill = (kwUsed != null && rate != null && !isNaN(rate)) ? kwUsed * Number(rate) : null;
  const waterBill = cubicUsed != null ? waterBillFrom(cubicUsed, monthId) : null;

  return {
    prevElectric: prevE.value, currElectric: currE, kwUsed, rate, electricBill,
    prevWater: prevW.value, currWater: currW, cubicUsed, waterBill,
    vacant,
    hasElectric: currE != null,
    hasWater: currW != null,
    hasReadings: currE != null || currW != null,
    notes: r.notes || '',
  };
}

// Compute charges (bill components) for a unit in a month.
function computeCharges(unitId, monthId) {
  const unit = unitById(unitId);
  if (!unit) return null;
  const cm = computeMonthReadings(unitId, monthId);
  if (!cm) return null;

  if (cm.vacant) {
    return { vacant: true, rent: 0, otherCharge: 0, otherCharges: [], electricBill: 0, waterBill: 0, total: 0, hasReadings: false, cm };
  }

  // Occupancy: rent/wifi only when a tenant is currently associated with the unit in that month.
  // For historical months: find the tenant whose tenancy window covers this month.
  const [y, mo] = monthId.split('-').map(Number);
  const monthStart = new Date(y, mo-1, 1);
  const monthEnd = new Date(y, mo, 0);

  const tenantInMonth = state.tenants.find(t => {
    if (t.unitId !== unitId) return false;
    const moveIn = t.moveInDate ? new Date(t.moveInDate) : null;
    const moveOut = t.moveOutDate ? new Date(t.moveOutDate) : null;
    // Tenant occupies this month if moveIn is before/during month AND
    // (no moveOut OR moveOut is after the start of month)
    if (moveIn && moveIn > monthEnd) return false;
    if (moveOut && moveOut < monthStart) return false;
    return true;
  });

  // If no tenant occupying, and no readings, we treat it as unoccupied.
  const occupied = !!tenantInMonth;
  const rent = occupied ? rentForUnit(unitId, monthId) : 0;
  const otherCharges = occupied ? otherChargesForUnit(unitId, monthId) : [];
  const otherCharge = otherCharges.reduce((a, c) => a + (Number(c.amount) || 0), 0);

  return {
    vacant: false,
    rent,
    otherCharge,
    otherCharges,
    electricBill: cm.electricBill || 0,
    waterBill: cm.waterBill || 0,
    total: rent + otherCharge + (cm.electricBill || 0) + (cm.waterBill || 0),
    hasReadings: cm.hasReadings,
    occupied,
    tenantId: tenantInMonth?.id || null,
    cm,
  };
}

function paymentsForUnitMonth(unitId, monthId) {
  return state.payments.filter(p => p.unitId === unitId && p.monthId === monthId);
}
function paymentsTotalForUnitMonth(unitId, monthId) {
  return paymentsForUnitMonth(unitId, monthId).reduce((a,p) => a + (Number(p.amount)||0), 0);
}

// Running balance ledger for a unit across all months (chronological).
// Each row: { monthId, prevBal, charges, payments, endBal, hasReadings, vacant }
function computeLedger(unitId) {
  const ids = sortedMonthIds();
  let prevBal = 0;
  const rows = [];
  for (const monthId of ids) {
    const ch = computeCharges(unitId, monthId);
    const pays = paymentsTotalForUnitMonth(unitId, monthId);
    if (!ch) continue;
    // Only include months that have activity (readings, vacant marker, or payments, or the unit exists)
    const hasRow = ch.hasReadings || ch.vacant || pays > 0;
    if (!hasRow) continue;
    const charges = ch.total;
    const endBal = prevBal + charges - pays;
    rows.push({
      monthId,
      prevBal,
      charges,
      payments: pays,
      endBal,
      vacant: ch.vacant,
      hasReadings: ch.hasReadings,
      breakdown: { rent: ch.rent, otherCharge: ch.otherCharge, otherCharges: ch.otherCharges, electricBill: ch.electricBill, waterBill: ch.waterBill },
      cm: ch.cm,
      tenantId: ch.tenantId || null,
    });
    prevBal = endBal;
  }
  return rows;
}

function outstandingBalance(unitId) {
  const ledger = computeLedger(unitId);
  if (!ledger.length) return 0;
  return ledger[ledger.length - 1].endBal;
}

// Payment status for a unit in a given month, using its own bill total
// (not carry-forward) — useful for the month view.
function monthPaymentStatus(unitId, monthId) {
  const ch = computeCharges(unitId, monthId);
  if (!ch || ch.vacant) return { status: 'vacant', paid: 0, total: 0, balance: 0 };
  if (!ch.hasReadings) return { status: 'none', paid: 0, total: 0, balance: 0 };
  const paid = paymentsTotalForUnitMonth(unitId, monthId);
  const total = ch.total;
  const balance = total - paid;
  if (paid <= 0) return { status: 'unpaid', paid, total, balance };
  if (balance <= 0.01) return { status: 'paid', paid, total, balance };
  return { status: 'partial', paid, total, balance };
}

function depositBalance(tenantId) {
  return state.depositMovements
    .filter(d => d.tenantId === tenantId)
    .reduce((a,d) => a + (d.type === 'in' ? 1 : -1) * (Number(d.amount)||0), 0);
}

// Effective rent for a unit in a given month. Honors unit.rentHistory entries
// of shape { from: 'YYYY-MM', rent: N }. Falls back to unit.rent.
function rentForUnit(unitId, monthId) {
  const u = unitById(unitId);
  if (!u) return 0;
  const history = (u.rentHistory || []).filter(r => r.from && r.from <= monthId);
  if (history.length) {
    history.sort((a,b) => b.from.localeCompare(a.from));
    return Number(history[0].rent) || 0;
  }
  return Number(u.rent) || 0;
}

// Effective other-charges for a unit in a given month. Honors snapshots inside
// unit.rentHistory entries; falls back to unit.otherCharges (the base/current).
function otherChargesForUnit(unitId, monthId) {
  const u = unitById(unitId);
  if (!u) return [];
  const history = (u.rentHistory || []).filter(r => r.from && r.from <= monthId);
  if (history.length) {
    history.sort((a,b) => b.from.localeCompare(a.from));
    if (Array.isArray(history[0].otherCharges)) return history[0].otherCharges;
  }
  return Array.isArray(u.otherCharges) ? u.otherCharges : [];
}

// Lifetime rent billed to a unit (sum of rent across all non-vacant months with readings).
function lifetimeRentForUnit(unitId) {
  let total = 0;
  for (const m of state.months) {
    const ch = computeCharges(unitId, m.id);
    if (ch && !ch.vacant && ch.hasReadings) total += ch.rent || 0;
  }
  return total;
}

// Outstanding balance for a tenant — running balance across their tenancy window
// (chained from 0 so previous tenants' debts don't carry over).
function tenantOutstanding(tenantId) {
  const t = tenantById(tenantId);
  if (!t || !t.unitId) return 0;
  const tenancyStart = t.moveInDate ? t.moveInDate.slice(0,7) : null;
  const tenancyEnd = t.moveOutDate ? t.moveOutDate.slice(0,7) : null;
  const ledger = computeLedger(t.unitId).filter(r => {
    if (tenancyStart && r.monthId < tenancyStart) return false;
    if (tenancyEnd && r.monthId > tenancyEnd) return false;
    return true;
  });
  let bal = 0;
  for (const r of ledger) bal = bal + r.charges - r.payments;
  return bal;
}

// Most recent payment date for a tenant (within their tenancy window). Null if none.
function tenantLastPaidDate(tenantId) {
  const t = tenantById(tenantId);
  if (!t || !t.unitId) return null;
  const start = t.moveInDate || null;
  const end = t.moveOutDate || null;
  const pays = state.payments.filter(p => {
    if (p.unitId !== t.unitId) return false;
    if (!p.date) return false;
    if (start && p.date < start) return false;
    if (end && p.date > end) return false;
    return true;
  });
  if (!pays.length) return null;
  return pays.map(p => p.date).sort().pop();
}

// Latest month with a remaining balance (used by Mark-as-Paid to know which
// month to apply the payment to). Falls back to current month if none.
function latestUnpaidMonthIdForTenant(tenantId) {
  const t = tenantById(tenantId);
  if (!t || !t.unitId) return currentMonthId();
  const tenancyStart = t.moveInDate ? t.moveInDate.slice(0,7) : null;
  const tenancyEnd = t.moveOutDate ? t.moveOutDate.slice(0,7) : null;
  const ledger = computeLedger(t.unitId).filter(r => {
    if (tenancyStart && r.monthId < tenancyStart) return false;
    if (tenancyEnd && r.monthId > tenancyEnd) return false;
    return true;
  });
  // Find the latest month where unit is occupied with charges remaining
  for (let i = ledger.length - 1; i >= 0; i--) {
    if (ledger[i].charges - ledger[i].payments > 0.01) return ledger[i].monthId;
  }
  return ledger.length ? ledger[ledger.length-1].monthId : currentMonthId();
}

// Effective due-day for a tenant (1–31). Falls back to settings.defaultDueDay,
// then to 5 if nothing is configured.
function tenantDueDayFor(tenantId) {
  const t = tenantById(tenantId);
  const day = t && t.dueDay != null ? parseInt(t.dueDay) : NaN;
  if (!isNaN(day) && day >= 1 && day <= 31) return day;
  const fallback = parseInt(state.settings.defaultDueDay);
  return (!isNaN(fallback) && fallback >= 1 && fallback <= 31) ? fallback : 5;
}

// Returns the due date 'YYYY-MM-DD' for a tenant's bill of `monthId`.
// Convention: bill for month YYYY-MM is due on the dueDay of the FOLLOWING
// calendar month (e.g., April bill → May 5 if dueDay=5). If the dueDay
// exceeds the next month's length (e.g., 31 in Feb), we cap to the last day.
function tenantDueDateFor(tenantId, monthId) {
  const day = tenantDueDayFor(tenantId);
  const [y, m] = monthId.split('-').map(Number); // m is 1-indexed
  // In Date constructor, month is 0-indexed, so passing m yields the next month.
  const lastDayOfNext = new Date(y, m + 1, 0).getDate();
  const capped = Math.min(day, lastDayOfNext);
  // Format as YYYY-MM-DD without timezone shift
  const yy = (m === 12) ? y + 1 : y;
  const mm = (m === 12) ? 1 : m + 1;
  return `${yy}-${String(mm).padStart(2,'0')}-${String(capped).padStart(2,'0')}`;
}

// Resolves a due date for a unit's bill in a given month. Uses the tenant
// occupying the unit in that month; falls back to the default day.
function unitDueDateFor(unitId, monthId) {
  const tenantInMonth = state.tenants.find(t => {
    if (t.unitId !== unitId) return false;
    const start = t.moveInDate ? t.moveInDate.slice(0,7) : '0000-00';
    const end = t.moveOutDate ? t.moveOutDate.slice(0,7) : '9999-99';
    return start <= monthId && monthId <= end;
  });
  if (tenantInMonth) return tenantDueDateFor(tenantInMonth.id, monthId);
  // Generic fallback using settings
  const day = parseInt(state.settings.defaultDueDay) || 5;
  const [y, m] = monthId.split('-').map(Number);
  const lastDayOfNext = new Date(y, m + 1, 0).getDate();
  const capped = Math.min(day, lastDayOfNext);
  const yy = (m === 12) ? y + 1 : y;
  const mm = (m === 12) ? 1 : m + 1;
  return `${yy}-${String(mm).padStart(2,'0')}-${String(capped).padStart(2,'0')}`;
}

// Returns all calendar months YYYY-MM falling within a tenancy in a given year.
// Bounded by tenancy.moveInDate (incl) → moveOutDate or current month (incl).
// year is a string '2026'.
function tenantMonthsForYear(tenant, year) {
  const startMonth = tenant.moveInDate ? tenant.moveInDate.slice(0,7) : '0000-01';
  const todayMonth = currentMonthId();
  const endMonth = tenant.moveOutDate ? tenant.moveOutDate.slice(0,7) : todayMonth;
  // Year window
  const yStart = `${year}-01`;
  const yEnd = `${year}-12`;
  const lo = startMonth > yStart ? startMonth : yStart;
  const hi = endMonth < yEnd ? endMonth : yEnd;
  if (lo > hi) return [];
  // Enumerate ascending (Jan → Dec) so the table reads in calendar order
  const out = [];
  let cur = lo;
  while (cur <= hi) {
    out.push(cur);
    cur = nextMonthId(cur);
  }
  return out;
}

// Years that have any tenancy month for this tenant. Used for nav arrows.
function tenantYears(tenant) {
  const startMonth = tenant.moveInDate ? tenant.moveInDate.slice(0,7) : currentMonthId();
  const endMonth = tenant.moveOutDate ? tenant.moveOutDate.slice(0,7) : currentMonthId();
  const startY = parseInt(startMonth.slice(0,4));
  const endY = parseInt(endMonth.slice(0,4));
  const years = [];
  for (let y = startY; y <= endY; y++) years.push(String(y));
  return years;
}

// ============================================================================
// 5. MIGRATIONS
// ============================================================================
function migrateState(old) {
  if (!old) return null;
  const s = JSON.parse(JSON.stringify(old));
  if (!s.meta) s.meta = {};

  // settings defaults
  s.settings = Object.assign({
    propertyName: '',
    currency: CURRENCY,
    adminPasswordHash: null,
    waterBaseRate: 250,
    waterBaseCubic: 10,
    waterPerExtra: 30,
    waterRateHistory: [],
    defaultDueDay: 5,
    supabaseUrl: '',
    supabaseKey: '',
  }, s.settings || {});

  // Normalize waterRateHistory: keep only well-formed entries
  s.settings.waterRateHistory = (Array.isArray(s.settings.waterRateHistory) ? s.settings.waterRateHistory : [])
    .map(e => ({
      from: e.from,
      baseRate: Number(e.baseRate) || 0,
      baseCubic: Number(e.baseCubic) || 0,
      perExtra: Number(e.perExtra) || 0,
    }))
    .filter(e => /^\d{4}-\d{2}$/.test(e.from || ''));

  s.units = s.units || [];
  s.months = s.months || [];
  s.payments = s.payments || [];
  s.depositMovements = s.depositMovements || [];
  s.tenants = s.tenants || [];

  // v1 → v2: water reading migration + houseBill strip
  const ids = s.months.map(m => m.id).sort();
  for (const unit of s.units) {
    let running = unit?.startWater ?? 0;
    for (const mid of ids) {
      const m = s.months.find(x => x.id === mid);
      if (!m || !m.readings || !m.readings[unit.id]) continue;
      const r = m.readings[unit.id];
      if (r.waterReading != null) {
        running = Number(r.waterReading);
      } else if (r.waterCubicMeters != null) {
        running = Number(running) + Number(r.waterCubicMeters);
        r.waterReading = running;
      }
      delete r.waterCubicMeters;
      delete r.electricUsed;
    }
  }
  s.months.forEach(m => { delete m.houseBill; });

  // v2 → v3: split Tenants out of Units
  // Legacy units carried: tenant, deposit, moveInDate, moveOutDate, tenantCode.
  // If no tenants array yet (or empty while some units still have tenant info), extract.
  if (s.tenants.length === 0 && s.units.some(u => u.tenant || u.tenantCode || u.deposit || u.moveInDate)) {
    const legacyUnitIdToTenantId = {};
    s.units.forEach(u => {
      if (!u.tenant && !u.tenantCode && !u.deposit && !u.moveInDate) return;
      const tenant = {
        id: 'ten-' + Math.random().toString(36).slice(2,9),
        name: u.tenant || '',
        contactNumber: '',
        social: '',
        deposit: Number(u.deposit) || 0,
        moveInDate: u.moveInDate || null,
        moveOutDate: u.moveOutDate || null,
        unitId: u.id,
        tenantCode: u.tenantCode || null,
        active: !u.moveOutDate,
        createdAt: new Date().toISOString(),
      };
      s.tenants.push(tenant);
      legacyUnitIdToTenantId[u.id] = tenant.id;
    });
    // Re-key deposit movements from unitId to tenantId where possible
    s.depositMovements.forEach(dm => {
      if (dm.unitId && !dm.tenantId) {
        const tid = legacyUnitIdToTenantId[dm.unitId];
        if (tid) {
          dm.tenantId = tid;
          delete dm.unitId;
        }
      }
    });
  }

  // Strip legacy tenant fields off units, normalize new schema.
  // Collect any "other charges" into a single array regardless of source:
  //   • new shape: unit.otherCharges = [{label, amount}]
  //   • legacy v3 shape: unit.otherChargeLabel + unit.otherChargeAmount (single entry)
  //   • legacy v2 shape: unit.wifi (number)
  s.units = s.units.map(u => {
    let otherCharges = Array.isArray(u.otherCharges) ? u.otherCharges.filter(x => x && (x.label || Number(x.amount) > 0)).map(x => ({
      label: String(x.label || ''),
      amount: Number(x.amount) || 0,
    })) : [];
    if (otherCharges.length === 0 && (u.otherChargeLabel || Number(u.otherChargeAmount) > 0)) {
      otherCharges = [{
        label: u.otherChargeLabel || '',
        amount: Number(u.otherChargeAmount) || 0,
      }];
    }
    if (otherCharges.length === 0 && Number(u.wifi) > 0) {
      otherCharges = [{ label: 'WiFi', amount: Number(u.wifi) }];
    }
    return {
      id: u.id,
      name: u.name || 'Unit',
      rent: Number(u.rent) || 0,
      otherCharges,
      colorKey: u.colorKey || null,
      startElectric: Number(u.startElectric) || 0,
      startWater: Number(u.startWater) || 0,
      active: u.active !== false,
      rentHistory: (Array.isArray(u.rentHistory) ? u.rentHistory : []).map(e => ({
        from: e.from,
        rent: Number(e.rent) || 0,
        // If existing entry has its own otherCharges snapshot, keep it.
        // Otherwise inherit the current/base otherCharges so historical behavior is preserved.
        otherCharges: Array.isArray(e.otherCharges)
          ? e.otherCharges.map(x => ({ label: String(x.label || ''), amount: Number(x.amount) || 0 }))
          : otherCharges.map(x => ({ label: x.label, amount: x.amount })),
      })),
    };
  });

  // Ensure tenants have all required defaults
  s.tenants = s.tenants.map(t => Object.assign({
    contactNumber: '', social: '', deposit: 0, advance: 0, dueDay: null,
    moveInDate: null, moveOutDate: null, unitId: null,
    tenantCode: null, active: true, createdAt: new Date().toISOString(),
  }, t));

  // Ensure tenant codes exist
  s.tenants.forEach(t => {
    if (!t.tenantCode) t.tenantCode = slugify(t.name) + '-' + Math.random().toString(36).slice(2,6);
  });

  // Backfill deposit movements: if a tenant has a recorded deposit > 0 but no
  // movements exist, create an initial 'in' movement so the balance matches.
  // This fixes legacy tenants whose deposit was set via Edit (which used to
  // update t.deposit without creating a movement).
  if (!Array.isArray(s.depositMovements)) s.depositMovements = [];
  s.tenants.forEach(t => {
    if (!(t.deposit > 0)) return;
    const movements = s.depositMovements.filter(m => m.tenantId === t.id);
    const balance = movements.reduce((acc, m) => acc + (m.type === 'in' ? Number(m.amount) || 0 : -(Number(m.amount) || 0)), 0);
    if (balance === 0) {
      s.depositMovements.push({
        id: 'dep-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
        tenantId: t.id,
        date: t.moveInDate || new Date().toISOString().slice(0,10),
        type: 'in',
        amount: t.deposit,
        notes: 'Security deposit (restored from record)'
      });
    }
  });

  // Reverse the previous auto-applied advance payments (the old behavior
  // applied the advance to the move-in calendar month, which was incorrect —
  // the advance covers the FINAL month of tenancy, not the first). Find any
  // payment with method='Advance' and notes referencing "move-in", remove it,
  // and restore the amount back onto the tenant's advance field.
  if (Array.isArray(s.payments) && s.payments.length) {
    const survivors = [];
    s.payments.forEach(p => {
      const isAutoMoveInAdvance =
        p.method === 'Advance' &&
        typeof p.notes === 'string' &&
        /move-in/i.test(p.notes);
      if (!isAutoMoveInAdvance) {
        survivors.push(p);
        return;
      }
      // Find the tenant this belongs to
      const tenant = s.tenants.find(tt =>
        tt.unitId === p.unitId &&
        (tt.moveInDate || '1970-01-01') <= (p.date || '9999-12-31') &&
        (tt.moveOutDate || '9999-12-31') >= (p.date || '0000-01-01')
      );
      if (tenant) {
        tenant.advance = (Number(tenant.advance) || 0) + (Number(p.amount) || 0);
      } else {
        // No tenant matched — keep the payment to avoid losing data
        survivors.push(p);
      }
    });
    s.payments = survivors;
  }

  s.meta.schemaVersion = SCHEMA_VERSION;
  return s;
}

// ============================================================================
// 6. SEED DATA
// ============================================================================
// Returns an empty, ready-to-use state. No demo units or history.
function seedData() {
  return {
    meta: { schemaVersion: SCHEMA_VERSION, lastSavedAt: null, lastExportedAt: null },
    settings: {
      propertyName: '',
      currency: CURRENCY,
      adminPasswordHash: null,
      waterBaseRate: 250,
      waterBaseCubic: 10,
      waterPerExtra: 30,
      waterRateHistory: [],
      defaultDueDay: 5,
      supabaseUrl: '',
      supabaseKey: '',
    },
    units: [],
    tenants: [],
    months: [],
    payments: [],
    depositMovements: [],
  };
}

// ============================================================================
// 6.5 CLOUD SYNC (Supabase)
// ============================================================================
// Stores the entire `state` JSON in a single Supabase row (id='main') so it
// can be pulled/pushed from any device. Conflict policy: last-write-wins.
//
// Setup the user does once:
//   1. Sign up at supabase.com (free, no card needed)
//   2. New project → wait ~1 min
//   3. SQL Editor → run:
//        create table if not exists app_state (
//          id text primary key,
//          state jsonb not null,
//          updated_at timestamptz not null default now()
//        );
//   4. Settings → API → copy "Project URL" and "anon public" key
//   5. Paste in our Settings → Cloud Sync section, click Connect
//
// Trade-offs we made:
//   - We do NOT enable Supabase Row-Level Security. The admin password gates
//     the app; that's the practical security layer. Anyone who finds the
//     URL+anon key in source could read/write the table directly. That's an
//     acceptable risk for a personal rental tracker — it's not card data.
//     If the user wants RLS later, we add it.
//   - Local first: every change persists to localStorage immediately. Cloud
//     push is debounced ~1.5s (so rapid edits batch into one push).
//   - Pull on app load: if cloud's updated_at > local's lastSavedAt, replace
//     local with cloud. Else push local. Equal → no-op.
//   - We strip supabaseUrl/Key from the cloud copy and re-inject them on
//     pull, so device-specific config never travels.

const cloudSync = {
  client: null,
  enabled: false,                // true after a successful initCloudSync
  status: 'idle',                // 'idle' | 'syncing' | 'success' | 'error' | 'offline'
  lastError: null,
  pushTimer: null,
};

// Lazy-load the Supabase JS SDK from a CDN. Only happens when sync is on.
// We use the UMD build via <script> tag (not ES module dynamic import) because
// Safari has flaky behavior with esm.sh — it errors with "TypeError: Load
// failed" on TLS/MIME edge cases. UMD via jsDelivr works in every browser.
async function loadSupabaseSdk() {
  if (window.supabase && window.supabase.createClient) return window.supabase;
  // If a previous attempt failed, remove its tag so we can retry cleanly
  const existing = document.getElementById('supabaseSdkScript');
  if (existing) existing.remove();
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.id = 'supabaseSdkScript';
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js';
    script.crossOrigin = 'anonymous';
    script.onload = () => {
      if (window.supabase && window.supabase.createClient) {
        resolve(window.supabase);
      } else {
        reject(new Error('Supabase loaded but createClient not found'));
      }
    };
    script.onerror = () => {
      reject(new Error('Could not download Supabase library — check your internet connection or a content blocker'));
    };
    document.head.appendChild(script);
  });
}

function setSyncStatus(status, error = null) {
  cloudSync.status = status;
  cloudSync.lastError = error;
  // Update header indicator if the DOM has rendered
  const el = document.getElementById('syncIndicator');
  if (el) el.outerHTML = renderSyncIndicator();
  // Refresh the Cloud Sync card on settings if visible
  const settingsCard = document.getElementById('cloudSyncCard');
  if (settingsCard && parseRoute().name === 'settings') {
    const fresh = renderCloudSyncCard();
    settingsCard.outerHTML = fresh;
    wireCloudSyncCard();
  }
}

// Build the small status pill that lives in the header next to Refresh/Logout.
function renderSyncIndicator() {
  if (!cloudSync.enabled) {
    return `<span id="syncIndicator" class="hidden"></span>`;
  }
  const last = state?.meta?.lastSyncedAt;
  let icon, label, cls;
  switch (cloudSync.status) {
    case 'syncing':
      icon = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3B82F6;animation:pulse 1.2s infinite"></span>';
      label = 'Syncing…'; cls = 'chip-muted'; break;
    case 'error':
      icon = icons.alert;
      label = 'Sync error'; cls = 'chip-unpaid'; break;
    case 'offline':
      icon = icons.alert;
      label = 'Offline'; cls = 'chip-muted'; break;
    case 'success':
    default:
      icon = '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#10B981"></span>';
      label = last ? `Synced ${fmtRelative(last)}` : 'Synced'; cls = 'chip-paid';
  }
  return `<a href="#/settings" id="syncIndicator" class="chip ${cls} no-print" title="${cloudSync.lastError ? h(cloudSync.lastError) : 'Click to manage cloud sync'}" style="text-decoration:none;cursor:pointer">${icon}<span class="hidden sm:inline">${label}</span></a>`;
}

// Try to (re)create the Supabase client from current settings.
async function initCloudSync() {
  const url = (state.settings.supabaseUrl || '').trim();
  const key = (state.settings.supabaseKey || '').trim();
  if (!url || !key) {
    cloudSync.enabled = false;
    cloudSync.client = null;
    return false;
  }
  try {
    const sdk = await loadSupabaseSdk();
    cloudSync.client = sdk.createClient(url, key, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    cloudSync.enabled = true;
    cloudSync.lastError = null;
    return true;
  } catch (err) {
    cloudSync.enabled = false;
    cloudSync.client = null;
    setSyncStatus('error', err.message);
    return false;
  }
}

function disableCloudSync() {
  cloudSync.client = null;
  cloudSync.enabled = false;
  cloudSync.status = 'idle';
  cloudSync.lastError = null;
  if (cloudSync.pushTimer) { clearTimeout(cloudSync.pushTimer); cloudSync.pushTimer = null; }
}

// PULL: fetch the cloud row. Returns { state, updated_at } or null if no row.
async function cloudPull() {
  if (!cloudSync.enabled || !cloudSync.client) return null;
  setSyncStatus('syncing');
  try {
    const { data, error } = await cloudSync.client
      .from('app_state')
      .select('state, updated_at')
      .eq('id', 'main')
      .maybeSingle();
    if (error) throw error;
    setSyncStatus('success');
    return data || null;
  } catch (err) {
    // Network error vs query error — treat both as recoverable
    setSyncStatus('error', err.message || String(err));
    return null;
  }
}

// PUSH: upsert the entire local state into the cloud row.
// `silent=true` skips success status (used by debounce so rapid pushes don't
// flicker the indicator on every keystroke).
async function cloudPush() {
  if (!cloudSync.enabled || !cloudSync.client) return false;
  setSyncStatus('syncing');
  try {
    const stateToPush = JSON.parse(JSON.stringify(state));
    // Strip device-only settings — these don't travel
    if (stateToPush.settings) {
      delete stateToPush.settings.supabaseUrl;
      delete stateToPush.settings.supabaseKey;
    }
    const now = new Date().toISOString();
    const { error } = await cloudSync.client
      .from('app_state')
      .upsert({ id: 'main', state: stateToPush, updated_at: now });
    if (error) throw error;
    state.meta = state.meta || {};
    state.meta.lastSyncedAt = now;
    saveStateLocal();
    setSyncStatus('success');
    // Take a daily snapshot (best-effort; failures don't break the main push).
    // Snapshot table rotates by a YYYY-MM-DD key — only one row per day.
    maybeWriteDailySnapshot(stateToPush, now).catch(err => console.warn('Snapshot skipped:', err));
    return true;
  } catch (err) {
    setSyncStatus('error', err.message || String(err));
    return false;
  }
}

// Write today's snapshot if not already written. Keeps last 7 days only.
async function maybeWriteDailySnapshot(snapshotState, isoNow) {
  if (!cloudSync.enabled || !cloudSync.client) return;
  const dayKey = (isoNow || new Date().toISOString()).slice(0, 10); // YYYY-MM-DD
  // Upsert today's snapshot — writes once, then quietly skips repeated calls
  // for the same day because the row already exists with that day key.
  const { error: upErr } = await cloudSync.client
    .from('app_state_history')
    .upsert({ day: dayKey, state: snapshotState, created_at: isoNow });
  if (upErr) {
    // Most common case: table doesn't exist yet (user hasn't run the snapshot
    // table SQL). Silently no-op so existing users aren't surprised.
    return;
  }
  // Trim: keep newest 7 rows. Delete anything older than the 7th most recent day.
  const { data: keep, error: listErr } = await cloudSync.client
    .from('app_state_history')
    .select('day')
    .order('day', { ascending: false })
    .limit(7);
  if (listErr || !keep || keep.length < 7) return;
  const cutoffDay = keep[keep.length - 1].day;
  await cloudSync.client.from('app_state_history').delete().lt('day', cutoffDay);
}

async function cloudListSnapshots() {
  if (!cloudSync.enabled || !cloudSync.client) return [];
  const { data, error } = await cloudSync.client
    .from('app_state_history')
    .select('day, created_at')
    .order('day', { ascending: false });
  if (error) {
    console.warn('Could not list snapshots:', error.message);
    return [];
  }
  return data || [];
}
window.cloudListSnapshots = cloudListSnapshots;

async function cloudRestoreSnapshot(dayKey) {
  if (!cloudSync.enabled || !cloudSync.client) return false;
  const { data, error } = await cloudSync.client
    .from('app_state_history')
    .select('state, created_at')
    .eq('day', dayKey)
    .maybeSingle();
  if (error || !data) {
    toast('Could not load that snapshot', 'warn');
    return false;
  }
  applyCloudData({ state: data.state, updated_at: data.created_at });
  // Push the restored state back as the new "main" so all devices see it
  await cloudPush();
  toast(`Restored snapshot from ${fmtDate(dayKey)}`, 'success');
  render();
  return true;
}
window.cloudRestoreSnapshot = cloudRestoreSnapshot;

// UI wrapper: populates the Backups list in Settings
async function loadBackupsList() {
  const wrap = document.getElementById('backupsList');
  if (!wrap) return;
  wrap.innerHTML = '<div class="italic">Loading…</div>';
  const snaps = await cloudListSnapshots();
  if (!snaps.length) {
    wrap.innerHTML = '<div class="italic">No snapshots yet — they appear after the next push (max 1 per day).</div>';
    return;
  }
  wrap.innerHTML = `
    <div class="rounded-md overflow-hidden" style="border:1px solid #E5E7EB">
      ${snaps.map(s => `
        <div class="flex items-center justify-between px-3 py-2.5 ${snaps.indexOf(s) > 0 ? 'border-t border-line' : ''}" style="background:#FFFFFF">
          <div>
            <div class="font-semibold text-ink">${fmtDate(s.day)}</div>
            <div class="text-xs text-ink-5 mt-0.5">Saved ${fmtRelative(s.created_at)}</div>
          </div>
          <button onclick="confirmRestoreSnapshot('${s.day}')" class="btn btn-secondary btn-sm">Restore</button>
        </div>
      `).join('')}
    </div>
    <p class="text-[11px] text-ink-5 mt-2">Restoring will replace your current data on every device. Your current data is pushed to the cloud first as a safety net.</p>
  `;
}
window.loadBackupsList = loadBackupsList;

function confirmRestoreSnapshot(dayKey) {
  confirmDestructive({
    title: `Restore from ${fmtDate(dayKey)}?`,
    message: 'This replaces all current data with the snapshot from that day.',
    warningList: [
      'All current data will be replaced',
      'Other devices will pick up the restored state on next sync',
      'A push of your CURRENT data is taken first as safety',
    ],
    confirmWord: 'RESTORE',
    onConfirm: async () => {
      // Take a safety push of current state first (this will become a snapshot
      // tomorrow if today's already exists, but at least the main row carries
      // the current data until restore overwrites it).
      await cloudPush();
      await cloudRestoreSnapshot(dayKey);
    }
  });
}
window.confirmRestoreSnapshot = confirmRestoreSnapshot;

// Apply a cloud row to local state. Preserves device-only settings.
function applyCloudData(cloudRow) {
  if (!cloudRow || !cloudRow.state) return;
  const localUrl = state.settings.supabaseUrl;
  const localKey = state.settings.supabaseKey;
  let pulled = JSON.parse(JSON.stringify(cloudRow.state));
  pulled = migrateState(pulled) || pulled;
  state = pulled;
  state.settings = state.settings || {};
  state.settings.supabaseUrl = localUrl;
  state.settings.supabaseKey = localKey;
  state.meta = state.meta || {};
  state.meta.lastSyncedAt = cloudRow.updated_at || new Date().toISOString();
  saveStateLocal();
}

// Debounced push: called by saveState() on every state change.
function schedulePush() {
  if (!cloudSync.enabled) return;
  if (cloudSync.pushTimer) clearTimeout(cloudSync.pushTimer);
  cloudSync.pushTimer = setTimeout(() => {
    cloudSync.pushTimer = null;
    cloudPush();
  }, 1500);
}

// Initial sync on app load. Decide who's newer and reconcile.
async function initialCloudSync() {
  const ok = await initCloudSync();
  if (!ok) return;
  const cloudRow = await cloudPull();
  if (!cloudRow) {
    // Cloud is empty — push local up to seed it
    await cloudPush();
    return;
  }
  const cloudT = new Date(cloudRow.updated_at).getTime();
  const localT = state.meta?.lastSavedAt ? new Date(state.meta.lastSavedAt).getTime() : 0;
  // Within 2 seconds of each other = treat as equal (clock skew tolerance)
  if (cloudT > localT + 2000) {
    applyCloudData(cloudRow);
    toast('Pulled latest from cloud', 'success');
    render();
  } else if (localT > cloudT + 2000) {
    await cloudPush();
  }
  // else: in sync, nothing to do
}

// Manual button: force a fresh pull and apply
async function manualCloudPull() {
  if (!cloudSync.enabled) { toast('Cloud sync not connected', 'warn'); return; }
  const row = await cloudPull();
  if (!row) {
    if (cloudSync.status === 'error') {
      toast('Could not reach cloud — see Settings', 'warn');
    } else {
      toast('Cloud is empty — nothing to pull', 'info');
    }
    return;
  }
  applyCloudData(row);
  toast('Pulled latest from cloud', 'success');
  render();
}
window.manualCloudPull = manualCloudPull;

// Manual button: force push local up
async function manualCloudPush() {
  if (!cloudSync.enabled) { toast('Cloud sync not connected', 'warn'); return; }
  const ok = await cloudPush();
  if (ok) toast('Synced to cloud', 'success');
  else toast(cloudSync.lastError || 'Sync failed', 'warn');
}
window.manualCloudPush = manualCloudPush;

// Connect with the values currently in the form fields
async function connectCloudSync() {
  const url = ($('#cloudUrl')?.value || '').trim();
  const key = ($('#cloudKey')?.value || '').trim();
  if (!url || !key) { toast('Both URL and key are required', 'warn'); return; }
  state.settings.supabaseUrl = url;
  state.settings.supabaseKey = key;
  saveStateLocal();
  const ok = await initCloudSync();
  if (!ok) {
    toast(cloudSync.lastError || 'Connection failed', 'warn');
    return;
  }
  // Test connection by attempting a pull. If table doesn't exist, surface a
  // friendly hint about running the SQL setup.
  const testRow = await cloudPull();
  if (cloudSync.status === 'error') {
    const err = cloudSync.lastError || '';
    if (err.includes('relation') || err.includes('does not exist') || err.includes('schema cache')) {
      toast('Connected, but table missing — run the SQL in setup instructions', 'warn');
    } else if (err.toLowerCase().includes('row-level security') || err.toLowerCase().includes('row level security') || err.toLowerCase().includes('rls')) {
      toast('Connected, but RLS is blocking writes — run the disable-RLS line in setup instructions', 'warn');
    } else {
      toast('Connection failed: ' + err, 'warn');
    }
    return;
  }
  if (testRow) {
    // Cloud has data — does the user want to keep local or replace?
    const cloudT = new Date(testRow.updated_at).getTime();
    const localT = state.meta?.lastSavedAt ? new Date(state.meta.lastSavedAt).getTime() : 0;
    if (cloudT > localT + 2000) {
      applyCloudData(testRow);
      toast('Connected · pulled cloud data', 'success');
    } else {
      await cloudPush();
      toast('Connected · pushed local data', 'success');
    }
  } else {
    await cloudPush();
    toast('Connected · cloud seeded with local data', 'success');
  }
  render();
}
window.connectCloudSync = connectCloudSync;

function disconnectCloudSync() {
  if (!confirm('Disconnect cloud sync? Your local data is kept; nothing is deleted from the cloud.')) return;
  state.settings.supabaseUrl = '';
  state.settings.supabaseKey = '';
  disableCloudSync();
  saveStateLocal();
  toast('Cloud sync disconnected', 'success');
  render();
}
window.disconnectCloudSync = disconnectCloudSync;

// Renders the Cloud Sync card on the Settings page. Pulled out so we can
// re-render just the card when status changes.
function renderCloudSyncCard() {
  const url = state.settings.supabaseUrl || '';
  const key = state.settings.supabaseKey || '';
  const isConnected = cloudSync.enabled;
  const last = state.meta?.lastSyncedAt;
  let statusLine;
  if (!isConnected) {
    statusLine = `<span class="text-ink-5">Not connected</span>`;
  } else {
    const dot = (color) => `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px"></span>`;
    if (cloudSync.status === 'error') {
      statusLine = `${dot('#DC2626')}<span style="color:#DC2626">Error: ${h(cloudSync.lastError || 'unknown')}</span>`;
    } else if (cloudSync.status === 'syncing') {
      statusLine = `${dot('#3B82F6')}<span>Syncing…</span>`;
    } else {
      statusLine = `${dot('#10B981')}<span>Connected${last ? ` · last synced ${fmtRelative(last)}` : ''}</span>`;
    }
  }
  return `
    <div id="cloudSyncCard" class="card p-5 mb-4">
      <div class="flex items-start justify-between gap-3 mb-3 flex-wrap">
        <div>
          <h3 class="section-h">Cloud sync</h3>
          <p class="section-sub">Keep this tracker in sync across your devices via Supabase (free).</p>
        </div>
        <div class="text-sm">${statusLine}</div>
      </div>

      <div class="space-y-3">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Supabase Project URL</label>
          <input type="text" id="cloudUrl" class="input-base text-xs" style="font-family:'SFMono-Regular','Menlo',monospace" value="${h(url)}" placeholder="https://xxxxxxxxxxxx.supabase.co" />
        </div>
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Anon (public) Key</label>
          <input type="password" id="cloudKey" class="input-base text-xs" style="font-family:'SFMono-Regular','Menlo',monospace" value="${h(key)}" placeholder="eyJhbGciOiJIUzI1NiIs…" />
          <p class="text-[11px] text-ink-5 mt-1">Find these in Supabase: Settings → API. The anon key is safe in client code.</p>
        </div>
        <div class="flex flex-wrap gap-2">
          ${isConnected
            ? `<button onclick="manualCloudPush()" class="btn btn-primary">${icons.check}Sync now</button>
               <button onclick="manualCloudPull()" class="btn btn-secondary">${icons.refresh}Pull from cloud</button>
               <button onclick="connectCloudSync()" class="btn btn-secondary">Update keys</button>
               <button onclick="disconnectCloudSync()" class="btn btn-secondary" style="color:#991B1B">Disconnect</button>`
            : `<button onclick="connectCloudSync()" class="btn btn-primary">${icons.check}Connect</button>`
          }
        </div>
      </div>

      <details class="mt-4 pt-3" style="border-top:1px solid #E5E7EB">
        <summary class="cursor-pointer text-sm font-semibold text-ink hover:text-ink-4">Setup instructions (5 mins, one-time)</summary>
        <ol class="list-decimal list-inside text-sm space-y-2 mt-3 text-ink-4">
          <li>Sign up at <a href="https://supabase.com" target="_blank" rel="noopener" class="underline" style="color:#1D4ED8">supabase.com</a> (free, no card needed).</li>
          <li>Click <strong>New project</strong>. Pick any name, any region close to you, set a database password (save it for your records — you won't need it for the app). Wait ~1 minute for provisioning.</li>
          <li>In the left sidebar, open <strong>SQL Editor</strong>. Paste this and click <strong>Run</strong>:
<pre style="background:#0F172A;color:#E2E8F0;padding:10px 12px;border-radius:6px;font-size:12px;overflow-x:auto;margin-top:6px;line-height:1.45">create table if not exists app_state (
  id text primary key,
  state jsonb not null,
  updated_at timestamptz not null default now()
);

-- Daily snapshot history (last 7 days) for disaster recovery
create table if not exists app_state_history (
  day text primary key,
  state jsonb not null,
  created_at timestamptz not null default now()
);

-- Supabase enables RLS by default; we don't need it here because
-- the app's admin password is the practical access gate.
alter table app_state disable row level security;
alter table app_state_history disable row level security;</pre>
          </li>
          <li>In the left sidebar, click the <strong>gear icon (Settings) → API</strong>.</li>
          <li>Copy the <strong>Project URL</strong> and the <strong>anon public</strong> key. Paste them in the fields above and click <strong>Connect</strong>.</li>
          <li>On any other device: open this app → Settings → Cloud sync → paste the same two values → Connect. Done.</li>
        </ol>
        <p class="text-xs text-ink-5 mt-3"><strong>Honest trade-off:</strong> the anon key sits in client-side code, so anyone who finds your app's URL could read/write the table directly via SQL. The admin password gates the app, but not the database. For a personal rental tracker this risk is acceptable. If you later want stricter access control, we can add Row-Level Security policies — just ask.</p>
      </details>
    </div>
  `;
}

// 8. ROUTER
// ============================================================================
function parseRoute() {
  const hash = location.hash.replace(/^#\/?/, '');
  if (!hash) return { name: 'home' };
  const [path, qs] = hash.split('?');
  const parts = path.split('/').filter(Boolean);
  const query = {};
  if (qs) qs.split('&').forEach(p => { const [k,v] = p.split('='); query[k] = decodeURIComponent(v||''); });
  return { name: parts[0]||'home', parts, query };
}
function navigate(hash) {
  if (location.hash === hash) { render(); return; }
  location.hash = hash;
}
window.addEventListener('hashchange', render);

function showModal(contentHtml) {
  closeModal();
  const b = document.createElement('div');
  b.className = 'modal-backdrop no-print';
  b.id = 'modalBackdrop';
  b.innerHTML = `<div class="modal-panel fade-in">${contentHtml}</div>`;
  b.addEventListener('click', (e) => { if (e.target === b) closeModal(); });
  document.body.appendChild(b);
}
function closeModal() {
  const m = $('#modalBackdrop');
  if (m) m.remove();
}
window.closeModal = closeModal;

function toast(msg, kind='info') {
  const colors = {
    info:    'background:#111827;color:#FFFFFF',
    success: 'background:#3F9D2D;color:#FFFFFF',
    warn:    'background:#D97706;color:#FFFFFF',
    error:   'background:#DC2626;color:#FFFFFF',
  };
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:6px;font-size:14px;font-weight:600;z-index:100;box-shadow:0 6px 20px rgba(15,23,42,0.15);${colors[kind]||colors.info}`;
  t.className = 'fade-in';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// Two-step destructive confirmation with backup offer.
function confirmDestructive({ title, message, warningList=[], confirmWord='DELETE', onConfirm }) {
  const lastExp = state.meta?.lastExportedAt;
  const expAgo = lastExp ? fmtRelative(lastExp) : 'never';
  showModal(`
    <div class="p-6">
      <div class="flex items-start gap-3 mb-3">
        <div class="text-danger-strong mt-0.5">${icons.alert}</div>
        <div>
          <h3 class="text-lg font-bold text-ink">${h(title)}</h3>
          <p class="text-sm text-ink-4 mt-1">${h(message)}</p>
        </div>
      </div>
      ${warningList.length ? `<ul class="list-disc list-inside text-sm text-ink-4 space-y-1 pl-6 mb-4">${warningList.map(w => `<li>${h(w)}</li>`).join('')}</ul>` : ''}
      <div class="banner banner-warn mb-4">
        <span>${icons.info}</span>
        <div class="text-xs">
          Last exported backup: <strong>${h(expAgo)}</strong>. Export now to keep a safe copy before proceeding.
          <div class="mt-2">
            <button onclick="exportData()" class="btn btn-secondary btn-sm">${icons.download}Download backup</button>
          </div>
        </div>
      </div>
      <div class="mb-4">
        <label class="text-xs font-semibold text-ink-4 uppercase block mb-1.5">Type <code class="kbd">${h(confirmWord)}</code> to confirm</label>
        <input type="text" id="confirmText" class="input-base" autocomplete="off" autofocus />
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
        <button id="confirmBtn" disabled class="btn btn-danger" style="opacity:0.5">${icons.trash}Confirm delete</button>
      </div>
    </div>
  `);
  const input = $('#confirmText');
  const btn = $('#confirmBtn');
  input.addEventListener('input', () => {
    const ok = input.value.trim() === confirmWord;
    btn.disabled = !ok;
    btn.style.opacity = ok ? '1' : '0.5';
  });
  btn.addEventListener('click', () => {
    if (input.value.trim() !== confirmWord) return;
    closeModal();
    onConfirm();
  });
}

// Hard-reload the app — pulls any newly-deployed version from the server, bypassing cache.
function refreshApp() {
  try {
    // Save current state first so nothing in-flight is lost
    if (typeof saveState === 'function' && state) saveState();
  } catch {}
  // Append a cache-busting query param so static hosts (e.g. GitHub Pages) re-fetch index.html
  const url = new URL(window.location.href);
  url.searchParams.set('_r', Date.now().toString(36));
  window.location.replace(url.toString());
}
window.refreshApp = refreshApp;

// 12. VIEW: DASHBOARD (readings, payments, recent months) (readings entry + payments)
// ============================================================================
function renderMonth(monthId) {
  if (!monthId) monthId = currentMonthId();
  let month = monthById(monthId);
  if (!month) {
    month = { id: monthId, kwhRate: null, actualElectricBill: null, dueDate: null, readings: {}, createdAt: new Date().toISOString() };
    state.months.push(month);
    saveState();
  }
  const units = activeUnits();

  // ─── Empty state: no units yet ────────────────────────────────────────────
  if (!units.length) {
    $('#app').innerHTML = layoutShell(`
      <div class="card p-12 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-2 text-ink-5 mb-3">${icons.building}</div>
        <h3 class="text-lg font-bold text-ink mb-1">No units yet</h3>
        <p class="text-sm text-ink-5 mb-4">Add your first unit to start tracking rent and utilities.</p>
        <a href="#/units" class="btn btn-primary">${icons.plus}Add unit</a>
      </div>
    `);
    return;
  }

  const prevId = prevMonthId(monthId);
  const nextId = nextMonthId(monthId);
  const isCurrentMonth = monthId === currentMonthId();

  // ─── Dashboard-style stats + banners (only for current month) ────────────
  // Month-level summary (current / selected month charges / payments)
  let monthBilled = 0, monthCollected = 0;
  units.forEach(u => {
    const ch = computeCharges(u.id, monthId);
    if (ch && ch.hasReadings && !ch.vacant) monthBilled += ch.total;
    monthCollected += paymentsTotalForUnitMonth(u.id, monthId);
  });

  // Lifetime outstanding
  let totalOutstanding = 0, unpaidUnitsCount = 0, missingCount = 0;
  units.forEach(u => {
    const ledger = computeLedger(u.id);
    const outstanding = ledger.length ? ledger[ledger.length-1].endBal : 0;
    if (outstanding > 0.01) { totalOutstanding += outstanding; unpaidUnitsCount++; }
    const monthRow = ledger.find(r => r.monthId === monthId);
    if (!monthRow) missingCount++;
  });

  const banners = [];
  if (unpaidUnitsCount > 0) {
    banners.push(`<div class="banner banner-danger"><span>${icons.alert}</span><div><strong>${unpaidUnitsCount} unit${unpaidUnitsCount===1?'':'s'}</strong> with an outstanding balance · total <strong class="num">${fmtMoney(totalOutstanding)}</strong></div></div>`);
  }
  if (missingCount > 0 && isCurrentMonth) {
    banners.push(`<div class="banner banner-warn"><span>${icons.info}</span><div><strong>${missingCount} unit${missingCount===1?'':'s'}</strong> missing readings for ${monthLabel(monthId)} — enter them below.</div></div>`);
  }
  const bannersBlock = banners.length ? `<div class="space-y-2 mb-5">${banners.join('')}</div>` : '';

  // Upcoming due dates (next 14 days from today). For each active tenant
  // who has unpaid balance, compute their due date for their latest unpaid
  // month and surface it. Sorted soonest-first.
  const upcoming = (() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const horizon = new Date(today.getTime() + 14*24*60*60*1000);
    const items = [];
    state.tenants.forEach(t => {
      if (!t.unitId || t.moveOutDate) return;
      const outstanding = tenantOutstanding(t.id);
      if (outstanding < 0.01) return;
      const monthId = latestUnpaidMonthIdForTenant(t.id);
      const dueIso = tenantDueDateFor(t.id, monthId);
      const due = new Date(dueIso); due.setHours(0,0,0,0);
      const daysOut = Math.round((due.getTime() - today.getTime()) / (24*60*60*1000));
      // Show overdue (<=0) and within next 14 days
      if (daysOut > 14) return;
      const unit = unitById(t.unitId);
      items.push({ tenant: t, unit, dueIso, daysOut, outstanding });
    });
    items.sort((a, b) => a.dueIso.localeCompare(b.dueIso));
    return items;
  })();

  const upcomingBlock = upcoming.length ? `
    <div class="card p-5 mb-6">
      <div class="flex items-center justify-between mb-3">
        <div>
          <div class="stat-label">Upcoming due dates</div>
          <h3 class="section-h">Next 14 days</h3>
        </div>
        <span class="chip chip-muted">${upcoming.length} tenant${upcoming.length===1?'':'s'}</span>
      </div>
      <div class="space-y-2">
        ${upcoming.map(it => {
          const overdue = it.daysOut < 0;
          const todayDue = it.daysOut === 0;
          const accent = unitAccent(it.unit.id);
          let dayBadge;
          if (overdue) dayBadge = `<span style="color:#DC2626;font-weight:700">${Math.abs(it.daysOut)}d overdue</span>`;
          else if (todayDue) dayBadge = `<span style="color:#DC2626;font-weight:700">Due today</span>`;
          else if (it.daysOut <= 3) dayBadge = `<span style="color:#D97706;font-weight:600">In ${it.daysOut}d</span>`;
          else dayBadge = `<span class="text-ink-5">In ${it.daysOut}d</span>`;
          return `
