            <input type="file" accept=".json,application/json" class="hidden" onchange="importData(this)" />
          </label>
          <button onclick="confirmClearData()" class="btn btn-danger">${icons.trash}Clear all data</button>
        </div>
      </div>
    </div>

    ${renderCloudSyncCard()}

    ${cloudSync.enabled ? `
      <div class="card p-5 mb-4" id="backupsCard">
        <div class="flex items-start justify-between gap-3 mb-3 flex-wrap">
          <div>
            <h3 class="section-h">Cloud backups</h3>
            <p class="section-sub">A snapshot is taken automatically once per day. The last 7 days are kept.</p>
          </div>
          <button onclick="loadBackupsList()" class="btn btn-secondary btn-sm">${icons.refresh}Refresh</button>
        </div>
        <div id="backupsList" class="text-sm text-ink-5 italic">Click Refresh to load available snapshots.</div>
      </div>
    ` : ''}

    <div class="card p-5 mb-4">
      <h3 class="section-h mb-3">GitHub Pages hosting</h3>
      <ol class="list-decimal list-inside text-sm space-y-1.5 text-ink-4">
        <li>Create a GitHub repo (private recommended).</li>
        <li>Upload <code class="kbd">index.html</code> to the repo root.</li>
        <li>In <strong>Settings → Pages</strong>, enable Pages on your branch at <code class="kbd">/ (root)</code>.</li>
        <li>To publish updates: click <strong>Download data.json</strong> above, then commit that file to the repo root.</li>
        <li>Share tenant links from the Units page — they resolve to <code class="kbd">…/#/tenant?code=xxx</code>.</li>
      </ol>
    </div>

    <div class="card p-5">
      <h3 class="section-h mb-3">Stats</h3>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
        <div><div class="stat-label">Units</div><div class="text-xl font-bold text-ink mt-1">${state.units.length}</div></div>
        <div><div class="stat-label">Months</div><div class="text-xl font-bold text-ink mt-1">${state.months.length}</div></div>
        <div><div class="stat-label">Payments</div><div class="text-xl font-bold text-ink mt-1">${state.payments.length}</div></div>
        <div><div class="stat-label">Storage</div><div class="text-xl font-bold text-ink mt-1">${(JSON.stringify(state).length/1024).toFixed(1)} KB</div></div>
      </div>
    </div>
  `;
  $('#app').innerHTML = layoutShell(body);

  $('#pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const oldHash = await sha256($('#pwOld').value);
    if (oldHash !== state.settings.adminPasswordHash) {
      const el = $('#pwError'); el.textContent = 'Current password is incorrect.'; el.classList.remove('hidden');
      return;
    }
    state.settings.adminPasswordHash = await sha256($('#pwNew').value);
    saveState();
    toast('Password updated', 'success');
    render();
  });

  // Water rate history: working copy + render + handlers
  let waterRateHistory = JSON.parse(JSON.stringify(state.settings.waterRateHistory || []));

  function renderWaterRateHistory() {
    const area = document.getElementById('waterRateHistoryArea');
    if (!area) return;
    if (!waterRateHistory.length) {
      area.innerHTML = `<div class="text-[11px] text-ink-5 italic py-1">No rate changes recorded.</div>`;
      return;
    }
    // Sort by from descending so newest is on top
    const sorted = waterRateHistory.slice().sort((a,b) => b.from.localeCompare(a.from));
    area.innerHTML = sorted.map(entry => `
      <div class="flex items-center justify-between gap-2 py-1.5 ${sorted.indexOf(entry) > 0 ? 'border-t border-line' : ''}">
        <div class="flex-1 min-w-0 text-xs">
          <div class="font-semibold text-ink">From ${monthLabel(entry.from)}</div>
          <div class="text-ink-5 mt-0.5">${CURRENCY}${fmtNum(entry.baseRate, 0)} up to ${fmtNum(entry.baseCubic, 0)} m³, +${CURRENCY}${fmtNum(entry.perExtra, 0)} per extra m³</div>
        </div>
        <button type="button" class="btn btn-secondary btn-icon btn-sm" data-wrh-remove="${entry.from}" title="Remove">${icons.trash}</button>
      </div>
    `).join('');
    // Wire remove buttons
    area.querySelectorAll('[data-wrh-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        const from = btn.dataset.wrhRemove;
        if (!confirm(`Remove the rate change starting from ${monthLabel(from)}?`)) return;
        waterRateHistory = waterRateHistory.filter(e => e.from !== from);
        state.settings.waterRateHistory = JSON.parse(JSON.stringify(waterRateHistory));
        saveState();
        toast('Rate change removed', 'success');
        render();
      });
    });
  }

  if (document.getElementById('wrhToggleAdd')) {
    renderWaterRateHistory();

    // "Add change" button toggles an inline form right below it
    const toggleBtn = document.getElementById('wrhToggleAdd');
    toggleBtn.addEventListener('click', () => {
      const area = document.getElementById('waterRateHistoryArea');
      if (!area) return;
      // If form already visible, do nothing
      if (area.querySelector('#wrhAddForm')) return;
      // Default `from` = current month, prefilled with current settings
      const defaultFrom = currentMonthId();
      const formHtml = `
        <div id="wrhAddForm" class="rounded-md p-3 mt-2" style="background:#FFFFFF;border:1px solid #BFDBFE">
          <div class="text-xs font-semibold text-ink mb-2">New rate change</div>
          <div class="space-y-2 mb-3">
            <div>
              <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Effective from month</label>
              <input type="month" id="wrhFrom" class="input-base text-sm" value="${defaultFrom}" />
            </div>
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Base rate</label>
                <input type="number" step="0.01" id="wrhBaseRate" class="input-base text-sm" value="${state.settings.waterBaseRate}" />
              </div>
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Base m³</label>
                <input type="number" step="0.1" id="wrhBaseCubic" class="input-base text-sm" value="${state.settings.waterBaseCubic}" />
              </div>
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Per extra m³</label>
                <input type="number" step="0.01" id="wrhPerExtra" class="input-base text-sm" value="${state.settings.waterPerExtra}" />
              </div>
            </div>
          </div>
          <div class="flex gap-2 justify-end">
            <button type="button" id="wrhCancel" class="btn btn-secondary btn-sm">Cancel</button>
            <button type="button" id="wrhSave" class="btn btn-primary btn-sm">${icons.check}Save change</button>
          </div>
        </div>
      `;
      area.insertAdjacentHTML('beforeend', formHtml);

      document.getElementById('wrhCancel').addEventListener('click', () => {
        document.getElementById('wrhAddForm').remove();
      });
      document.getElementById('wrhSave').addEventListener('click', () => {
        const from = document.getElementById('wrhFrom').value;
        const baseRate = parseFloat(document.getElementById('wrhBaseRate').value);
        const baseCubic = parseFloat(document.getElementById('wrhBaseCubic').value);
        const perExtra = parseFloat(document.getElementById('wrhPerExtra').value);
        if (!/^\d{4}-\d{2}$/.test(from || '')) { toast('Pick a valid month', 'warn'); return; }
        if (isNaN(baseRate) || isNaN(baseCubic) || isNaN(perExtra)) { toast('All three values required', 'warn'); return; }
        // If an entry already exists for that from, replace it
        const idx = waterRateHistory.findIndex(e => e.from === from);
        const newEntry = { from, baseRate, baseCubic, perExtra };
        if (idx >= 0) waterRateHistory[idx] = newEntry;
        else waterRateHistory.push(newEntry);
        state.settings.waterRateHistory = JSON.parse(JSON.stringify(waterRateHistory));
        saveState();
        toast(idx >= 0 ? 'Rate change updated' : 'Rate change added', 'success');
        render();
      });
    });
  }
}

function savePropertyName() {
  state.settings.propertyName = $('#propName').value || 'Apartments';
  state.settings.defaultDueDay = parseInt($('#dueDay').value) || 5;
  saveState();
  toast('Saved', 'success');
  render();
}
window.savePropertyName = savePropertyName;

function saveWaterRates() {
  state.settings.waterBaseRate = parseFloat($('#wBase').value) || 0;
  state.settings.waterBaseCubic = parseFloat($('#wCubic').value) || 0;
  state.settings.waterPerExtra = parseFloat($('#wExtra').value) || 0;
  saveState();
  toast('Water rates saved', 'success');
  render();
}
window.saveWaterRates = saveWaterRates;

function exportData() {
  state.meta = state.meta || {};
  state.meta.lastExportedAt = new Date().toISOString();
  saveState();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded', 'success');
}
window.exportData = exportData;

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.units || !data.months) throw new Error('Invalid file (missing units or months)');
      confirmDestructive({
        title: 'Replace all current data?',
        message: 'Importing will overwrite everything currently in this browser with the contents of the file.',
        warningList: ['This cannot be undone without another backup', 'Export a backup of the current state first if unsure'],
        confirmWord: 'REPLACE',
        onConfirm: () => {
          state = migrateState(data);
          saveState();
          toast('Data imported', 'success');
          render();
        }
      });
    } catch (e) {
      alert('Could not import: ' + e.message);
    }
  };
  reader.readAsText(file);
  input.value = ''; // allow re-uploading same file
}
window.importData = importData;

function confirmClearData() {
  confirmDestructive({
    title: 'Clear all data?',
    message: 'Removes every unit, reading, payment and deposit record from this browser. Your settings (property name, water rates, password) are kept.',
    warningList: [
      'All unit history will be permanently deleted',
      'All payments and deposit records will be lost',
      'Settings, password, and water formula are preserved',
      'Export a backup first if you want to keep a copy',
    ],
    confirmWord: 'CLEAR',
    onConfirm: () => {
      state.units = [];
      state.months = [];
      state.payments = [];
      state.depositMovements = [];
      saveState();
      toast('All data cleared', 'success');
      navigate('#/');
    }
  });
}
window.confirmClearData = confirmClearData;

function renderTenant(code) {
  const closeBtn = `<div class="max-w-md mx-auto mb-4"><button onclick="goBackFromTenantView()" class="btn btn-secondary btn-sm">${icons.left}Close</button></div>`;
  const tenant = tenantByCode(code);
  if (!tenant) {
    $('#app').innerHTML = layoutShell(`
      ${closeBtn}
      <div class="max-w-md mx-auto mt-16 card p-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-2 text-ink-5 mb-4" style="transform:scale(1.5)">${icons.info}</div>
        <h2 class="text-2xl font-bold text-ink mb-2">Tenant not found</h2>
        <p class="text-base text-ink-5">Please double-check the link from your landlord.</p>
      </div>
    `);
    return;
  }
  const u = tenant.unitId ? unitById(tenant.unitId) : null;
  if (!u) {
    $('#app').innerHTML = layoutShell(`
      ${closeBtn}
      <div class="max-w-md mx-auto mt-16 card p-10 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-2 text-ink-5 mb-4" style="transform:scale(1.5)">${icons.info}</div>
        <h2 class="text-2xl font-bold text-ink mb-2">Hello, ${h(tenant.name)}</h2>
        <p class="text-base text-ink-5">Your account isn't assigned to a unit yet. Please contact your landlord.</p>
      </div>
    `);
    return;
  }

  // Ledger scoped to this tenant's tenancy window (so a new tenant doesn't see past tenants' bills).
  // We filter by month, then re-chain the running balance over the filtered rows only.
  const tenancyStart = tenant.moveInDate ? tenant.moveInDate.slice(0,7) : null;
  const tenancyEnd = tenant.moveOutDate ? tenant.moveOutDate.slice(0,7) : null;
  const unitLedger = computeLedger(u.id).filter(r => {
    if (tenancyStart && r.monthId < tenancyStart) return false;
    if (tenancyEnd && r.monthId > tenancyEnd) return false;
    return true;
  });
  let _runningBal = 0;
  const ledger = unitLedger.map(r => {
    const row = { ...r, prevBal: _runningBal, endBal: _runningBal + r.charges - r.payments };
    _runningBal = row.endBal;
    return row;
  });
  const latest = ledger.length ? ledger[ledger.length-1] : null;
  const outstanding = latest ? latest.endBal : 0;
  const dep = depositBalance(tenant.id);

  // Compute due date for the latest bill using the tenant's per-tenant due day
  let dueDateStr = null;
  if (latest) {
    dueDateStr = fmtDate(tenantDueDateFor(tenant.id, latest.monthId));
  }

  // Amount banner — compact horizontal strip
  let amountBanner = '';
  if (outstanding > 0.01) {
    amountBanner = `
      <div class="rounded-lg px-4 sm:px-5 py-3 mb-5 flex items-center justify-between gap-3" style="background:#FEF2F2;border:1px solid #FECACA">
        <div>
          <div class="text-xs font-semibold uppercase tracking-wider" style="color:#991B1B">Amount to pay</div>
          ${dueDateStr ? `<div class="text-xs mt-0.5" style="color:#991B1B">Please pay by <strong>${dueDateStr}</strong></div>` : ''}
        </div>
        <div class="num font-bold" style="color:#DC2626;font-size:22px;line-height:1.1">${fmtMoney(outstanding)}</div>
      </div>
    `;
  } else if (latest) {
    amountBanner = `
      <div class="rounded-lg px-4 sm:px-5 py-3 mb-5 flex items-center justify-between gap-3" style="background:#ECFDF5;border:1px solid #A7F3D0">
        <div class="flex items-center gap-2">
          <span style="color:#3F9D2D">${icons.check}</span>
          <div class="text-sm font-semibold" style="color:#065F46">Paid · account up to date</div>
        </div>
        <div class="text-xs" style="color:#065F46">Thank you!</div>
      </div>
    `;
  }

  // ─── New unified ledger table (replaces bill card + utility history + payment history) ─────
  // The tenant view now shows a year-paged table with one 2-row group per month:
  //   Top row: Month / Rent / Other / Total / Status / [✎ admin only][👁]
  //   Sub row: ↳ Electric usage + bill, ↳ Water usage + bill
  // Admin can click ✎ to flip a row into inline-edit mode. Tenants see view-only.

  const isAdminView = session.authed === true;
  const yearsAvailable = tenantYears(tenant);
  const currentYear = String(new Date().getFullYear());
  const requestedYear = parseRoute().query?.year;
  const selectedYear = (requestedYear && yearsAvailable.includes(requestedYear)) ? requestedYear
                      : (yearsAvailable.includes(currentYear) ? currentYear : yearsAvailable[yearsAvailable.length-1]);
  const yearIdx = yearsAvailable.indexOf(selectedYear);
  const prevYearAvail = yearIdx > 0 ? yearsAvailable[yearIdx - 1] : null;
  const nextYearAvail = yearIdx < yearsAvailable.length - 1 ? yearsAvailable[yearIdx + 1] : null;

  const monthsForYear = tenantMonthsForYear(tenant, selectedYear);

  // Build map from monthId → ledger entry (so we can show payments + status)
  const ledgerByMonth = {};
  ledger.forEach(r => { ledgerByMonth[r.monthId] = r; });

  // Helper to build one row group for a given monthId
  const buildLedgerRow = (mid) => {
    const ledgerRow = ledgerByMonth[mid];
    const ch = computeCharges(u.id, mid);
    const cm = ch ? ch.cm : computeMonthReadings(u.id, mid);
    const month = monthById(mid);
    const r = month ? (month.readings[u.id] || {}) : {};
    const hasReadings = ch && ch.hasReadings && !ch.vacant;
    const isVacant = ch && ch.vacant;
    const isEmpty = !ch || (!ch.hasReadings && !ch.vacant);

    // Status chip
    let statusChip;
    if (isVacant) statusChip = `<span class="chip chip-muted">Vacant</span>`;
    else if (isEmpty) statusChip = `<span class="chip chip-muted">No readings</span>`;
    else if (ledgerRow && ledgerRow.endBal > 0.01) statusChip = `<span class="chip chip-unpaid">Unpaid</span>`;
    else if (ledgerRow && ledgerRow.payments > 0) statusChip = `<span class="chip chip-paid">Paid</span>`;
    else statusChip = `<span class="chip chip-muted">—</span>`;

    // Pre-fill values for edit mode
    const prevElectric = previousReading(u.id, mid, 'electricReading').value;
    const prevWater = previousReading(u.id, mid, 'waterReading').value;
    const curElectricVal = r.electricReading != null ? r.electricReading : '';
    const curWaterVal = r.waterReading != null ? r.waterReading : '';
    const kwhRateVal = month && month.kwhRate != null ? month.kwhRate : '';

    // Rent + Other amounts (resolve via rate-history at this month)
    const rentAmt = (hasReadings || isEmpty) ? rentForUnit(u.id, mid) : 0;
    const otherCharges = otherChargesForUnit(u.id, mid) || [];
    const otherSum = otherCharges.reduce((a,c) => a + (Number(c.amount)||0), 0);
    const otherLabels = otherCharges.filter(o => Number(o.amount) > 0).map(o => o.label || 'Other').join(', ');

    // Money display helper — muted dash if no value
    const moneyOrDash = (v) => v != null && v > 0 ? fmtMoney(v) : '<span class="text-ink-5">—</span>';

    // Total display
    let totalDisplay;
    if (isVacant) totalDisplay = '<span class="text-ink-5">—</span>';
    else if (hasReadings) totalDisplay = fmtMoney(ch.total);
    else totalDisplay = '<span class="text-ink-5">—</span>';

    // Action buttons (admin only) — icon-only, horizontal under Total
    const actionsHtml = isAdminView ? `
      <button onclick="enterLedgerEditMode('${u.id}','${mid}')" class="btn btn-secondary btn-icon btn-sm" title="Edit readings">${icons.edit}</button>
      ${hasReadings ? `<button onclick="openStatement('${u.id}','${mid}')" class="btn btn-secondary btn-icon btn-sm" title="View bill">${icons.eye}</button>` : ''}
    ` : (hasReadings ? `<button onclick="openStatement('${u.id}','${mid}')" class="btn btn-secondary btn-icon btn-sm" title="View bill">${icons.eye}</button>` : '');

    // Each month is a block of 4 sub-rows (Rent / Electric / Water / Other),
    // with Month / Total+Status+Actions cells spanning all 4 via rowspan.
    const blockBorder = 'border-bottom:1px solid #E5E7EB';
    const noBorder = 'border-bottom:none';

    const electricUsedDisplay = (cm && cm.kwUsed != null) ? fmtNum(cm.kwUsed, 0) : '<span class="text-ink-5">—</span>';
    const waterUsedDisplay = (cm && cm.cubicUsed != null) ? fmtNum(cm.cubicUsed, 0) : '<span class="text-ink-5">—</span>';
    const electricReadingDisplay = (cm && cm.currElectric != null) ? fmtNum(cm.currElectric, 0) : '<span class="text-ink-5">—</span>';
    const waterReadingDisplay = (cm && cm.currWater != null) ? fmtNum(cm.currWater, 0) : '<span class="text-ink-5">—</span>';

    // Color dots for charge categories (matches existing bill-card palette)
    const dotRent = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4A90E2;margin-right:8px;vertical-align:middle"></span>';
    const dotElec = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#E07B0A;margin-right:8px;vertical-align:middle"></span>';
    const dotWater = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#0EA5A5;margin-right:8px;vertical-align:middle"></span>';
    const dotOther = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7E3FE3;margin-right:8px;vertical-align:middle"></span>';

    // Combined Total + Status + Actions cell. Status appears under the total
    // amount as a small chip, with optional balance line for partial payments,
    // and edit/view buttons at the bottom.
    let totalStatusCell;
    if (isVacant) {
      totalStatusCell = `
        <div class="num text-ink-5">—</div>
        <div class="mt-1">${statusChip}</div>
        ${actionsHtml ? `<div class="inline-flex gap-1 mt-2">${actionsHtml}</div>` : ''}
      `;
    } else if (hasReadings) {
      const showBalance = ledgerRow && ledgerRow.endBal > 0.01 && ledgerRow.payments > 0;
      totalStatusCell = `
        <div class="num font-bold" style="font-size:15px">${fmtMoney(ch.total)}</div>
        <div class="mt-1.5">${statusChip}</div>
        ${showBalance ? `<div class="text-[11px] mt-1" style="color:#DC2626">Balance <strong class="num">${fmtMoney(ledgerRow.endBal)}</strong></div>` : ''}
        ${actionsHtml ? `<div class="inline-flex gap-1 mt-2">${actionsHtml}</div>` : ''}
      `;
    } else {
      totalStatusCell = `
        <div class="num text-ink-5">—</div>
        <div class="mt-1">${statusChip}</div>
        ${actionsHtml ? `<div class="inline-flex gap-1 mt-2">${actionsHtml}</div>` : ''}
      `;
    }

    return `
      <tr data-ledger-row="${mid}" data-sub="rent">
        <td rowspan="4" style="font-weight:600;vertical-align:middle;text-align:center;${blockBorder};border-right:1px solid #E5E7EB;padding:8px 12px">${monthLabel(mid)}</td>
        <td style="${noBorder};padding:8px 12px;font-weight:500">${dotRent}Rent</td>
        <td style="${noBorder};text-align:center;padding:8px 4px;color:#9CA3AF">—</td>
        <td style="${noBorder};text-align:center;padding:8px 4px;color:#9CA3AF">—</td>
        <td class="num" style="${noBorder};text-align:right;padding:8px 12px">${moneyOrDash(rentAmt)}</td>
        <td rowspan="4" style="${blockBorder};text-align:center;padding:8px 12px;vertical-align:middle;border-left:1px solid #E5E7EB">${totalStatusCell}</td>
      </tr>
      <tr data-ledger-row="${mid}" data-sub="electric">
        <td style="${noBorder};padding:8px 12px">
          <div style="font-weight:500">${dotElec}Electric</div>
          ${kwhRateVal !== '' ? `<div class="text-[11px] text-ink-5 mt-0.5" style="margin-left:16px">kWh Rate: ${CURRENCY}${fmtNum(kwhRateVal, 2)}</div>` : ''}
        </td>
        <td class="num" style="${noBorder};text-align:center;padding:8px 4px">${electricReadingDisplay}</td>
        <td class="num" style="${noBorder};text-align:center;padding:8px 4px">${electricUsedDisplay}</td>
        <td class="num" style="${noBorder};text-align:right;padding:8px 12px">${moneyOrDash(hasReadings ? ch.electricBill : null)}</td>
      </tr>
      <tr data-ledger-row="${mid}" data-sub="water">
        <td style="${noBorder};padding:8px 12px;font-weight:500">${dotWater}Water</td>
        <td class="num" style="${noBorder};text-align:center;padding:8px 4px">${waterReadingDisplay}</td>
        <td class="num" style="${noBorder};text-align:center;padding:8px 4px">${waterUsedDisplay}</td>
        <td class="num" style="${noBorder};text-align:right;padding:8px 12px">${moneyOrDash(hasReadings ? ch.waterBill : null)}</td>
      </tr>
      <tr data-ledger-row="${mid}" data-sub="other">
        <td style="${blockBorder};padding:8px 12px">
          <div style="font-weight:500">${dotOther}Other</div>
          ${otherSum > 0 && otherLabels ? `<div class="text-[11px] text-ink-5 mt-0.5" style="margin-left:16px">${h(otherLabels)}</div>` : ''}
        </td>
        <td style="${blockBorder};text-align:center;padding:8px 4px;color:#9CA3AF">—</td>
        <td style="${blockBorder};text-align:center;padding:8px 4px;color:#9CA3AF">—</td>
        <td class="num" style="${blockBorder};text-align:right;padding:8px 12px">${moneyOrDash(hasReadings ? otherSum : null)}</td>
      </tr>

          p.unitId === u.id &&

        // Render the "advance" half based on its state

              <div class="text-[11px] text-ink-5 mt-1">Applied to ${h(appliedTo)} rent.</div>

// ──────────── Tenant ledger inline edit handlers ────────────
// Flips a ledger month-block from view → edit mode. The 4 sub-rows hide,
// the hidden edit row reveals, and a live-preview listener wires up.
// Handles BOTH desktop (table) and mobile (card) layouts simultaneously,
// since CSS only renders one at a time. We wire whichever is visible.
function enterLedgerEditMode(unitId, monthId) {
  const editRowDesktop = document.querySelector(`tr[data-ledger-edit="${monthId}"]`);
  const editPanelMobile = document.querySelector(`[data-ledger-edit-mobile="${monthId}"]`);
  // Hide all 4 desktop view sub-rows
  document.querySelectorAll(`tr[data-ledger-row="${monthId}"]`).forEach(el => el.classList.add('hidden'));
  // Hide the entire mobile card body content (we'll show only the edit panel)
  const mobileCard = document.querySelector(`[data-mobile-card="${monthId}"]`);
  if (mobileCard) {
    mobileCard.querySelectorAll(':scope > div').forEach(child => {
      if (child !== editPanelMobile) child.classList.add('hidden');
    });
  }
  if (editRowDesktop) editRowDesktop.classList.remove('hidden');
  if (editPanelMobile) editPanelMobile.classList.remove('hidden');

  // Wire live preview on whichever panel is the active one (or both — only the
  // visible one renders, but updating both is harmless)
  const wirePreview = (panel) => {
    if (!panel) return;
    const updatePreview = () => {
      const prevE = parseFloat(panel.dataset.prevE) || 0;
      const prevW = parseFloat(panel.dataset.prevW) || 0;
      const newE = parseFloat(panel.querySelector('[data-field="electricReading"]').value);
      const newW = parseFloat(panel.querySelector('[data-field="waterReading"]').value);
      const rate = parseFloat(panel.querySelector('[data-field="kwhRate"]').value);
      const vacant = panel.querySelector('[data-field="vacant"]').checked;
      let elec = null, water = null, total = 0;
      if (!vacant) {
        if (!isNaN(newE) && !isNaN(rate)) elec = (newE - prevE) * rate;
        if (!isNaN(newW)) water = waterBillFrom(newW - prevW, monthId);
        const ch = computeCharges(unitId, monthId);
        const rent = ch ? rentForUnit(unitId, monthId) : 0;
        const otherSum = ch ? (ch.otherCharges || []).reduce((a,c) => a + (Number(c.amount)||0), 0) : 0;
        total = rent + otherSum + (elec || 0) + (water || 0);
      }
      panel.querySelector('[data-preview="electric"]').textContent = elec != null ? fmtMoney(elec) : '—';
      panel.querySelector('[data-preview="water"]').textContent    = water != null ? fmtMoney(water) : '—';
      panel.querySelector('[data-preview="total"]').textContent    = vacant ? 'Vacant' : fmtMoney(total);
    };
    panel.querySelectorAll('input').forEach(el => el.addEventListener('input', updatePreview));
    updatePreview();
  };
  wirePreview(editRowDesktop);
  wirePreview(editPanelMobile);

  // Focus the first empty number input in whichever panel is visible
  const visiblePanel = window.matchMedia('(max-width: 640px)').matches ? editPanelMobile : editRowDesktop;
  if (visiblePanel) {
    const firstEmpty = Array.from(visiblePanel.querySelectorAll('input[type="number"]')).find(i => !i.value);
    (firstEmpty || visiblePanel.querySelector('input'))?.focus();
  }
}
window.enterLedgerEditMode = enterLedgerEditMode;

function cancelLedgerEdit(monthId) {
  const editRowDesktop = document.querySelector(`tr[data-ledger-edit="${monthId}"]`);
  const editPanelMobile = document.querySelector(`[data-ledger-edit-mobile="${monthId}"]`);
  if (editRowDesktop) editRowDesktop.classList.add('hidden');
  if (editPanelMobile) editPanelMobile.classList.add('hidden');
  // Reveal the desktop view sub-rows
  document.querySelectorAll(`tr[data-ledger-row="${monthId}"]`).forEach(el => el.classList.remove('hidden'));
  // Reveal mobile card body content
  const mobileCard = document.querySelector(`[data-mobile-card="${monthId}"]`);
  if (mobileCard) {
    mobileCard.querySelectorAll(':scope > div').forEach(child => {
      if (child !== editPanelMobile) child.classList.remove('hidden');
    });
  }
}
window.cancelLedgerEdit = cancelLedgerEdit;

// saveLedgerRow needs to read inputs from whichever panel is currently visible
function saveLedgerRow(unitId, monthId) {
  // Pick the visible panel based on viewport
  const isMobile = window.matchMedia('(max-width: 640px)').matches;
  const panel = isMobile
    ? document.querySelector(`[data-ledger-edit-mobile="${monthId}"]`)
    : document.querySelector(`tr[data-ledger-edit="${monthId}"]`);
  if (!panel) return;

  const newE = parseFloat(panel.querySelector('[data-field="electricReading"]').value);
  const newW = parseFloat(panel.querySelector('[data-field="waterReading"]').value);
  const rate = parseFloat(panel.querySelector('[data-field="kwhRate"]').value);
  const vacant = panel.querySelector('[data-field="vacant"]').checked;

  let month = monthById(monthId);
  if (!month) {
    month = { id: monthId, kwhRate: null, actualElectricBill: null, dueDate: null, readings: {}, createdAt: new Date().toISOString() };
    state.months.push(month);
  }
  if (!isNaN(rate)) month.kwhRate = rate;

  const existing = month.readings[unitId] || {};
  if (vacant) {
    month.readings[unitId] = { electricReading: null, waterReading: null, vacant: true, notes: existing.notes || '' };
  } else if (isNaN(newE) && isNaN(newW)) {
    delete month.readings[unitId];
  } else {
    month.readings[unitId] = {
      electricReading: isNaN(newE) ? null : newE,
      waterReading: isNaN(newW) ? null : newW,
      vacant: false,
      notes: existing.notes || ''
    };
  }
  saveState();
  toast(`${monthLabel(monthId)} saved`, 'success');
  render();
}
window.saveLedgerRow = saveLedgerRow;

// ============================================================================
// 19. STATEMENT (printable)
// ============================================================================
function openStatement(unitId, monthId) {
  const u = unitById(unitId);
  const ledger = computeLedger(unitId);
  if (!ledger.length) { toast('No activity to print', 'warn'); return; }
  let row;
  if (monthId) {
    row = ledger.find(r => r.monthId === monthId);
  } else {
    row = ledger[ledger.length - 1];
    monthId = row.monthId;
  }
  if (!row) { toast('Statement not found', 'warn'); return; }
  const month = monthById(monthId);
  const cm = row.cm;
  const pays = paymentsForUnitMonth(unitId, monthId);
  const b = row.breakdown;

  const dueDate = unitDueDateFor(unitId, monthId);

  // Build the simple, senior-friendly line items.
  // Each line carries a small color dot matching the in-app palette so the
  // categories are scannable at a glance.
  const lineItems = [];
  if (row.prevBal > 0.01) {
    lineItems.push({ label: 'Unpaid from before', hint: '', amount: row.prevBal, color: '#9CA3AF' });
  }
  if (!row.vacant) {
    if (b.rent > 0) lineItems.push({ label: 'Rent', hint: '', amount: b.rent, color: '#4A90E2' });
    if (b.electricBill > 0 || (cm && cm.kwUsed != null)) {
      const hintParts = [];
      if (cm && cm.kwUsed != null) hintParts.push(`${fmtNum(cm.kwUsed, 2)} kWh used`);
      if (cm && cm.rate != null) hintParts.push(`Rate: ${CURRENCY}${fmtNum(cm.rate, 2)} per kWh`);
      lineItems.push({
        label: 'Electricity',
        hint: hintParts.join(' · '),
        amount: b.electricBill,
        color: '#E07B0A'
      });
    }
    if (b.waterBill > 0 || (cm && cm.cubicUsed != null)) {
      const wr = waterRateForMonth(monthId);
      const rateDesc = `Rate: ${CURRENCY}${fmtNum(wr.baseRate, 0)} up to ${fmtNum(wr.baseCubic, 0)} m³, then +${CURRENCY}${fmtNum(wr.perExtra, 0)} per extra m³`;
      const hintParts = [];
      if (cm && cm.cubicUsed != null) hintParts.push(`${fmtNum(cm.cubicUsed, 2)} m³ used`);
      hintParts.push(rateDesc);
      lineItems.push({
        label: 'Water',
        hint: hintParts.join(' · '),
        amount: b.waterBill,
        color: '#0EA5A5'
      });
    }
    (b.otherCharges || []).forEach(oc => {
      if ((Number(oc.amount) || 0) > 0) lineItems.push({ label: oc.label || 'Other', hint: '', amount: oc.amount, color: '#7E3FE3' });
    });
  }

  const totalBeforePayments = row.prevBal + row.charges;
  const amountDue = row.endBal;
  const dueColor = amountDue > 0.01 ? '#DC2626' : '#111827';

  // Derive tenant name — use whichever tenant was occupying this unit during this month.
  // Fall back to current tenant, then to a generic label.
  const tenantForMonth = (() => {
    const [y, mo] = monthId.split('-').map(Number);
    const mStart = new Date(y, mo-1, 1);
    const mEnd = new Date(y, mo, 0);
    const found = state.tenants.find(t => {
      if (t.unitId !== u.id) return false;
      const mi = t.moveInDate ? new Date(t.moveInDate) : null;
      const mo2 = t.moveOutDate ? new Date(t.moveOutDate) : null;
      if (mi && mi > mEnd) return false;
      if (mo2 && mo2 < mStart) return false;
      return true;
    });
    return found || currentTenantForUnit(u.id);
  })();
  const tenantDisplayName = tenantForMonth ? tenantForMonth.name : '(Vacant)';

  // Safe filename for image download (no special chars). Timestamp suffix
  // prevents collisions when downloading multiple statements for the same
  // tenant/month in one session.
  const safeName = tenantDisplayName.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-|-$/g, '') || 'tenant';
  const ts = new Date().toISOString().slice(0,16).replace(/[:T-]/g, '').slice(2); // yymmddhhmm
  const filename = `statement-${safeName}-${monthId}-${ts}.jpg`;

  const html = `
    <div class="fixed inset-0 overflow-y-auto z-50 p-4 sm:p-8" id="statementRoot" style="background:#F7F8FA">
      <div class="max-w-2xl mx-auto">
        <div class="flex justify-between mb-4 no-print">
          <button onclick="closeStatement()" class="btn btn-secondary btn-icon" title="Close" style="color:#9CA3AF">${icons.x}</button>
          <div class="flex gap-2 flex-wrap justify-end">
            <button onclick="shareStatementJPG(this)" data-filename="${h(filename)}" class="btn btn-secondary btn-icon hidden" id="shareStatementBtn" title="Share">${icons.share}</button>
            <button onclick="downloadStatementJPG(this)" data-filename="${h(filename)}" class="btn btn-secondary btn-icon" id="dlStatementBtn" title="Download JPG">${icons.download}</button>
            <button onclick="window.print()" class="btn btn-primary btn-icon" title="Print">${icons.print}</button>
          </div>
        </div>

        <div class="card p-8 sm:p-10" id="statementCard" style="background:#FFFFFF;font-family:'Manrope',system-ui,sans-serif;color:#111827">

          <!-- Header -->
          <div class="flex items-start justify-between mb-6 pb-5" style="border-bottom:2px solid #111827">
            <div>
              <div style="font-size:20px;font-weight:800;color:#111827;letter-spacing:-0.01em">${h(state.settings.propertyName)}</div>
              <div style="font-size:13px;color:#6B7280;font-weight:500;margin-top:2px">Statement of Account</div>
            </div>
            <div class="text-right">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#6B7280">Statement for</div>
              <div style="font-size:16px;font-weight:700;color:#111827;margin-top:2px">${monthLabel(monthId)}</div>
              <div style="font-size:12px;color:#6B7280;font-weight:500;margin-top:4px">Issued: ${fmtDate(new Date().toISOString())}</div>
            </div>
          </div>

          <!-- Tenant info + Hero AMOUNT TO PAY -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 items-stretch">
            <div>
              <div style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#6B7280;margin-bottom:4px">Prepared for</div>
              <div style="font-size:18px;font-weight:700;color:#111827;line-height:1.2">${h(tenantDisplayName)}</div>
              <div style="font-size:13px;color:#6B7280;margin-top:4px;font-weight:500">Unit: <strong style="color:#111827;font-weight:700">${h(u.name)}</strong></div>
            </div>
            <div class="rounded-lg p-4 text-center sm:text-right" style="background:${amountDue > 0.01 ? '#FEF2F2' : '#ECFDF5'};border:1px solid ${amountDue > 0.01 ? '#FECACA' : '#A7F3D0'}">
              <div style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:${amountDue > 0.01 ? '#991B1B' : '#065F46'}">Amount to Pay</div>
              <div style="font-variant-numeric:tabular-nums;font-weight:800;color:${dueColor};font-size:28px;line-height:1.1;margin-top:4px;letter-spacing:-0.02em">${fmtMoney(Math.abs(amountDue))}</div>
              ${amountDue > 0.01 ? `
                <div style="font-size:12px;color:#991B1B;margin-top:4px;font-weight:500">Please pay by <strong style="font-weight:700">${fmtDate(dueDate)}</strong></div>
              ` : amountDue < -0.01 ? `
                <div style="font-size:12px;color:#065F46;margin-top:4px;font-weight:500">Credit on your account</div>
              ` : `
                <div style="font-size:12px;color:#065F46;margin-top:4px;font-weight:500">Paid in full. Thank you!</div>
              `}
            </div>
          </div>

          <!-- Bill breakdown -->
          <div class="mb-4">
            <div style="font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#6B7280;margin-bottom:8px">Your bill</div>
            ${row.vacant ? `
              <div style="padding:16px 0;text-align:center;font-style:italic;color:#6B7280;font-size:14px">Vacant this month — no charges</div>
            ` : ''}
            ${row.prevBal > 0.01 || !row.vacant ? `
              <table class="w-full" style="font-size:14px;border-collapse:collapse">
                <tbody>
                  ${lineItems.map(it => `
                    <tr style="border-bottom:1px solid #E5E7EB">
                      <td style="padding:10px 0;vertical-align:top">
                        <div style="color:#111827;font-weight:600;display:flex;align-items:center;gap:8px">
                          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${it.color || '#9CA3AF'};flex-shrink:0"></span>
                          <span>${h(it.label)}</span>
                        </div>
                        ${it.hint ? `<div style="font-size:12px;color:#6B7280;margin-top:2px;font-weight:500;margin-left:16px">${h(it.hint)}</div>` : ''}
                      </td>
                      <td style="padding:10px 0;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;vertical-align:top">${fmtMoney(it.amount)}</td>
                    </tr>
                  `).join('')}
                  <tr style="background:#F7F8FA;border-bottom:2px solid #111827">
                    <td style="padding:12px 8px;font-weight:700;color:#111827">Total charges</td>
                    <td style="padding:12px 8px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;color:#111827;font-size:15px">${fmtMoney(totalBeforePayments)}</td>
                  </tr>
                  ${pays.length > 0 ? `
                    <tr>
                      <td colspan="2" style="padding:12px 0 4px">
                        <div style="font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#3F9D2D">Payments you made</div>
                      </td>
                    </tr>
                    ${pays.map(p => `
                      <tr style="border-bottom:1px solid #E5E7EB">
                        <td style="padding:8px 0;font-size:12px;color:#374151;font-weight:500">• ${fmtDate(p.date)}${p.method ? ` (${h(p.method)})` : ''}${p.notes ? ` — ${h(p.notes)}` : ''}</td>
                        <td style="padding:8px 0;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:#3F9D2D">−${fmtMoney(p.amount).replace('−','')}</td>
                      </tr>
                    `).join('')}
                    <tr style="border-bottom:1px solid #E5E7EB">
                      <td style="padding:8px 0;font-weight:700;font-size:14px;color:#3F9D2D">Total paid</td>
                      <td style="padding:8px 0;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:#3F9D2D">−${fmtMoney(row.payments).replace('−','')}</td>
                    </tr>
                  ` : row.payments > 0.01 ? `
                    <tr style="border-bottom:1px solid #E5E7EB">
                      <td style="padding:10px 0;font-weight:700;font-size:14px;color:#3F9D2D">Payments you made</td>
                      <td style="padding:10px 0;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:#3F9D2D">−${fmtMoney(row.payments).replace('−','')}</td>
                    </tr>
                  ` : ''}
                  <tr style="border-top:3px solid #111827">
                    <td style="padding:16px 0 8px;font-weight:800;font-size:15px;letter-spacing:0.02em;text-transform:uppercase;color:#111827">Amount to Pay</td>
                    <td style="padding:16px 0 8px;text-align:right;font-variant-numeric:tabular-nums;font-weight:800;color:${dueColor};font-size:24px;line-height:1.1;letter-spacing:-0.02em">${fmtMoney(Math.abs(amountDue))}</td>
                  </tr>
                  ${amountDue > 0.01 ? `
                    <tr><td colspan="2" style="padding-top:4px"><div style="font-size:12px;text-align:right;color:#991B1B;font-weight:500">Please pay by <strong style="font-weight:700">${fmtDate(dueDate)}</strong></div></td></tr>
                  ` : ''}
                </tbody>
              </table>
            ` : ''}
          </div>

          <!-- Footer -->
          <div class="mt-6 pt-4 text-center" style="border-top:1px solid #E5E7EB">
            <div style="font-size:12px;color:#6B7280;font-weight:500">For any questions about this bill, please contact your landlord.</div>
          </div>

        </div>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);

  // Feature-detect file sharing (Web Share API with file support).
  // Do the check with a sample jpeg File — some browsers canShare() text/url but not files.
  if (navigator.canShare) {
    try {
      const testFile = new File([new Blob([''], {type:'image/jpeg'})], 'test.jpg', {type:'image/jpeg'});
      if (navigator.canShare({ files: [testFile] })) {
        const btn = document.getElementById('shareStatementBtn');
        if (btn) btn.classList.remove('hidden');
      }
    } catch {}
  }
}
window.openStatement = openStatement;

function closeStatement() {
  const el = $('#statementRoot');
  if (el) el.remove();
}
window.closeStatement = closeStatement;

// Lazy-load html2canvas and export the statement card as a JPG.
async function loadHtml2Canvas() {
  if (window.html2canvas) return window.html2canvas;
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => resolve(window.html2canvas);
    s.onerror = () => reject(new Error('Could not load image library. Please check your internet connection.'));
    document.head.appendChild(s);
  });
}

async function downloadStatementJPG(btn) {
  const filename = btn?.dataset?.filename || 'statement.jpg';
  const card = $('#statementCard');
  if (!card) { toast('Statement not found', 'error'); return; }

  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.innerHTML = 'Preparing…';

  try {
    const h2c = await loadHtml2Canvas();
    const canvas = await h2c(card, {
      scale: 2,                 // higher resolution
      backgroundColor: '#FFFFFF',
      logging: false,
      useCORS: true,
    });
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const link = document.createElement('a');
    link.download = filename;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    link.remove();
    toast('Statement downloaded', 'success');
  } catch (e) {
    console.error(e);
    toast(e.message || 'Could not generate image', 'error');
  } finally {
    btn.disabled = false;
    btn.style.opacity = '';
    btn.innerHTML = originalText;
  }
}
window.downloadStatementJPG = downloadStatementJPG;

// Share the statement as a JPG file via the Web Share API (iOS/Android native share sheet,
// which lets the user pick Messenger, SMS, WhatsApp, Viber, etc.).
async function shareStatementJPG(btn) {
  const filename = btn?.dataset?.filename || 'statement.jpg';
  const card = $('#statementCard');
  if (!card) { toast('Statement not found', 'error'); return; }

  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.innerHTML = 'Preparing…';

  try {
    const h2c = await loadHtml2Canvas();
    const canvas = await h2c(card, {
      scale: 2,
      backgroundColor: '#FFFFFF',
      logging: false,
      useCORS: true,
    });
    const blob = await new Promise((res, rej) => {
      canvas.toBlob(b => b ? res(b) : rej(new Error('Could not create image')), 'image/jpeg', 0.95);
    });
    const file = new File([blob], filename, { type: 'image/jpeg' });
    const shareData = {
      files: [file],
      title: 'Statement of Account',
      text: `${state.settings.propertyName} — Statement of Account`,
    };
    if (!navigator.canShare || !navigator.canShare(shareData)) {
      throw new Error('Sharing files not supported on this device');
    }
    await navigator.share(shareData);
    toast('Shared', 'success');
  } catch (e) {
    if (e.name === 'AbortError') {
      // User cancelled the share sheet — no error toast
    } else {
      console.error(e);
      toast(e.message || 'Could not share', 'error');
    }
  } finally {
    btn.disabled = false;
    btn.style.opacity = '';
    btn.innerHTML = originalText;
  }
}
window.shareStatementJPG = shareStatementJPG;

// ============================================================================
// 20. ROUTER RENDER + INIT
// ============================================================================
function render() {
  const route = parseRoute();

  if (route.name === 'tenant') {
    session.mode = 'tenant';
    saveSession();
    renderTenant(route.query?.code);
    return;
  }

  if (!session.authed) { renderLogin(); return; }
  session.mode = 'admin';

  switch (route.name) {
    case 'month':    renderMonth(route.parts[1]); break;
    case 'units':    renderUnits(); break;
    case 'unit':     renderUnitDetail(route.parts[1]); break;
    case 'tenants':  renderTenants(); break;
    case 'reports':  renderReports(); break;
    case 'settings': renderSettings(); break;
    default:         renderMonth(currentMonthId());
  }
}

async function init() {
  session = loadSession();

  const local = loadState();
  if (local) {
    state = migrateState(local);
  } else {
    // Try fetching published data.json, fall back to seed
    try {
      const resp = await fetch(DATA_URL, { cache: 'no-store' });
      if (resp.ok) {
        const remote = await resp.json();
        if (remote && remote.units) {
          state = migrateState(remote);
        }
      }
    } catch {}
    if (!state) state = seedData();
  }

  // Ensure tenant codes exist on all tenants (migration also handles this; this is a safety net)
  state.tenants.forEach(t => {
    if (!t.tenantCode) t.tenantCode = slugify(t.name) + '-' + Math.random().toString(36).slice(2,6);
  });

  saveStateLocal();
  render();

  // Cloud sync: if configured, fetch the cloud row in the background.
  // initialCloudSync() will reconcile and re-render if cloud is newer.
  if (state.settings.supabaseUrl && state.settings.supabaseKey) {
    initialCloudSync().catch(err => console.error('Cloud sync init failed:', err));
  }
}

init();
</script>
