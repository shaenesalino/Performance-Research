// Does a month have any reading data entered? Used to swap + / Edit button labels.
function hasAnyReadings(monthId) {
  const m = monthById(monthId);
  if (!m) return false;
  if (m.kwhRate != null || m.actualElectricBill != null) return true;
  return Object.keys(m.readings || {}).length > 0;
}

// Recent months table — extracted so both the unified view and standalone month views can use it.
function buildRecentMonthsTable(excludeMonthId) {
  const units = activeUnits();
  const recentIds = sortedMonthIds().filter(id => id !== excludeMonthId).slice(-6).reverse();
  if (!recentIds.length) return '';
  return `
    <div class="mt-10">
      <div class="flex items-end justify-between mb-3">
        <div>
          <h2 class="section-h">Recent Months</h2>
          <p class="section-sub">Jump to an earlier month to review or edit</p>
        </div>
      </div>
      <div class="card overflow-x-auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>Month</th>
              ${units.map(u => {
                const ac = unitAccent(u.id);
                return `<th class="num-cell"><span class="inline-flex items-center gap-1.5 justify-end"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${ac.color}"></span>${h(u.name)}</span></th>`;
              }).join('')}
              <th class="num-cell">Billed</th>
              <th class="num-cell">Collected</th>
              <th class="num-cell">Status</th>
            </tr>
          </thead>
          <tbody>
            ${recentIds.map(mid => {
              let billed = 0, collected = 0, statusCount = { paid: 0, unpaid: 0, partial: 0, vacant: 0 };
              const unitCells = units.map(u => {
                const ch = computeCharges(u.id, mid);
                const st = monthPaymentStatus(u.id, mid);
                if (ch && ch.hasReadings && !ch.vacant) billed += ch.total;
                collected += paymentsTotalForUnitMonth(u.id, mid);
                statusCount[st.status] = (statusCount[st.status]||0)+1;
                if (!ch || !ch.hasReadings) return `<td class="num-cell text-ink-5">—</td>`;
                if (ch.vacant) return `<td class="num-cell text-ink-5 italic">Vacant</td>`;
                // Find tenant who occupied this unit during this month
                const occupant = state.tenants.find(t =>
                  t.unitId === u.id &&
                  (!t.moveInDate || t.moveInDate.slice(0,7) <= mid) &&
                  (!t.moveOutDate || t.moveOutDate.slice(0,7) >= mid)
                );
                return `<td class="num-cell">
                  <div>${fmtMoney(ch.total)}</div>
                  ${occupant ? `<div class="text-[11px] text-ink-5 font-normal mt-0.5" style="font-variant-numeric:normal">${h(occupant.name)}</div>` : ''}
                </td>`;
              }).join('');
              const allPaid = statusCount.unpaid === 0 && statusCount.partial === 0 && (statusCount.paid + statusCount.vacant) > 0;
              const chip = allPaid ? `<span class="chip chip-paid">${icons.check}All paid</span>` : statusCount.unpaid > 0 ? `<span class="chip chip-unpaid">${statusCount.unpaid} unpaid</span>` : `<span class="chip chip-partial">Partial</span>`;
              return `
                <tr onclick="location.hash='#/month/${mid}'" class="cursor-pointer hover:bg-surface-2">
                  <td class="font-semibold">${monthLabel(mid)}</td>
                  ${unitCells}
                  <td class="num-cell">${fmtMoney(billed)}</td>
                  <td class="num-cell" style="color:#3F9D2D">${fmtMoney(collected)}</td>
                  <td class="num-cell">${chip}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function wireMonthFormReactivity(monthId) {
  const rateInput = $('#kwhRate');
  const actualInput = $('#actualBill');

  const recompute = () => {
    const rate = parseFloat(rateInput.value);
    const hasRate = !isNaN(rate);
    rateInput.classList.toggle('input-error', !hasRate);

    let sumE = 0, sumW = 0, sumAll = 0, anyReading = false;

    $$('#readingsBody [data-unit-id]').forEach(tr => {
      const unitId = tr.dataset.unitId;
      const u = unitById(unitId);
      const get = (field) => {
        const el = tr.querySelector(`input[data-field="${field}"]`);
        if (!el || el.value === '') return null;
        if (el.type === 'checkbox') return el.checked;
        return parseFloat(el.value);
      };
      const newE = get('electricReading');
      const newW = get('waterReading');
      const vacant = get('vacant');

      // prev readings from state (chronological)
      const prevE = previousReading(unitId, monthId, 'electricReading').value;
      const prevW = previousReading(unitId, monthId, 'waterReading').value;

      const kwUsed = (newE != null && prevE != null) ? (newE - prevE) : null;
      const cubicUsed = (newW != null && prevW != null) ? (newW - prevW) : null;
      const electricBill = (kwUsed != null && hasRate) ? kwUsed * rate : null;
      const waterBill = cubicUsed != null ? waterBillFrom(cubicUsed, monthId) : null;

      const hasReading = newE != null || newW != null;
      const otherChargeSum = (u.otherCharges || []).reduce((a,c) => a + (Number(c.amount)||0), 0);
      const total = vacant ? 0 : ((electricBill||0) + (waterBill||0) + (u.rent||0) + otherChargeSum);

      const set = (selector, text, extraClass='') => {
        const el = tr.querySelector(selector);
        el.textContent = text;
        el.className = el.className.replace(/cell-warn|cell-danger|cell-success/g, '').trim() + (extraClass ? ' ' + extraClass : '');
      };

      set('[data-out="kwUsed"]', kwUsed != null ? fmtNum(kwUsed, 2) : '—', kwUsed != null && kwUsed < 0 ? 'cell-danger' : '');
      set('[data-out="electricBill"]', electricBill != null ? fmtMoney(electricBill) : '—');
      set('[data-out="cubicUsed"]', cubicUsed != null ? fmtNum(cubicUsed, 2) : '—', cubicUsed != null && cubicUsed < 0 ? 'cell-danger' : '');
      set('[data-out="waterBill"]', waterBill != null ? fmtMoney(waterBill) : '—');
      set('[data-out="total"]', vacant ? 'Vacant' : (hasReading ? fmtMoney(total) : '—'));

      // Highlight inputs
      tr.querySelectorAll('input.reading-input').forEach(inp => {
        const val = inp.value === '' ? null : parseFloat(inp.value);
        const field = inp.dataset.field;
        const prev = field === 'electricReading' ? prevE : prevW;
        inp.classList.toggle('input-error', val != null && prev != null && val < prev && !vacant);
      });

      // Row opacity when vacant
      tr.style.opacity = vacant ? '0.5' : '1';

      if (electricBill != null && !vacant) sumE += electricBill;
      if (waterBill != null && !vacant) sumW += waterBill;
      if (hasReading && !vacant) { sumAll += total; anyReading = true; }
    });

    $('#totalElectric').textContent = sumE ? fmtMoney(sumE) : '—';
    $('#totalWater').textContent = sumW ? fmtMoney(sumW) : '—';
    $('#totalAll').textContent = anyReading ? fmtMoney(sumAll) : '—';

    const actual = parseFloat(actualInput.value);
    const diffEl = $('#diffElectric');
    const hintEl = $('#diffHint');
    if (!isNaN(actual) && sumE) {
      const diff = sumE - actual;
      diffEl.textContent = fmtMoney(diff);
      diffEl.className = 'num font-semibold ml-1 ' + (diff > 0.5 ? 'cell-success' : diff < -0.5 ? 'cell-danger' : '');
      hintEl.textContent = diff > 0.5 ? '(collected more than the actual bill)'
                         : diff < -0.5 ? '(collected less than the actual bill)' : '(matched)';
    } else {
      diffEl.textContent = '—'; diffEl.className = 'num font-semibold ml-1';
      hintEl.textContent = '';
    }
  };

  rateInput.addEventListener('input', recompute);
  actualInput.addEventListener('input', recompute);
  $$('.reading-input').forEach(i => i.addEventListener('input', recompute));
  $$('.vacant-input').forEach(i => i.addEventListener('change', recompute));
  recompute();
}

// Applies a tenant's advance payment to a specific month's rent. Called from
// the Move Out modal — when a tenant is moving out, their pre-paid advance
// covers their final month's rent. The deposit stays separate for damages.
//
// Side effects: creates a payment record (method='Advance') and zeros out
// tenant.advance. Returns true on success, false if there's nothing to apply.
function applyAdvanceForFinalMonth(tenantId, monthId) {
  const t = tenantById(tenantId);
  if (!t || !(t.advance > 0) || !t.unitId) return false;
  // Make sure the target month exists so the payment has somewhere to land
  if (!monthById(monthId)) {
    state.months.push({
      id: monthId, kwhRate: null, actualElectricBill: null,
      dueDate: null, readings: {}, createdAt: new Date().toISOString()
    });
  }
  state.payments.push({
    id: uid('pay'),
    unitId: t.unitId,
    monthId: monthId,
    amount: t.advance,
    date: t.moveOutDate || new Date().toISOString().slice(0,10),
    method: 'Advance',
    notes: `Advance payment applied to final month (${monthLabel(monthId)})`,
    createdAt: new Date().toISOString()
  });
  t.advance = 0;
  return true;
}

function saveMonthForm(monthId) {
  const month = monthById(monthId);
  const rate = parseFloat($('#kwhRate').value);
  month.kwhRate = isNaN(rate) ? null : rate;
  const ab = parseFloat($('#actualBill').value);
  month.actualElectricBill = isNaN(ab) ? null : ab;

  $$('#readingsBody [data-unit-id]').forEach(tr => {
    const unitId = tr.dataset.unitId;
    const get = (f) => {
      const el = tr.querySelector(`input[data-field="${f}"]`);
      if (!el) return null;
      if (el.type === 'checkbox') return el.checked;
      if (el.value === '') return null;
      return parseFloat(el.value);
    };
    const newE = get('electricReading');
    const newW = get('waterReading');
    const vacant = get('vacant');
    const existing = month.readings[unitId] || {};

    if (newE == null && newW == null && !vacant) {
      delete month.readings[unitId];
    } else {
      month.readings[unitId] = {
        electricReading: newE,
        waterReading: newW,
        vacant: !!vacant,
        notes: existing.notes || ''
      };
    }
  });

  saveState();
  toast('Month saved', 'success');
  render();
}

function confirmDeleteMonth(monthId) {
  const pays = state.payments.filter(p => p.monthId === monthId).length;

    title: `Delete ${monthLabel(monthId)}?`,
    message: 'This permanently removes all readings and payments for this month.',

  const advance = Number(t.advance) || 0;

  showModal(`

      <h3 class="text-lg font-bold text-ink mb-1">Mark tenant as moved out</h3>

        </div>

        ${advance > 0 && t.unitId ? `
          <div class="rounded-md p-3" style="background:#F0FDF4;border:1px solid #BBF7D0">
            <label class="flex items-start gap-2 cursor-pointer">
              <input type="checkbox" id="applyAdvance" checked class="mt-0.5" />
              <div class="flex-1 text-sm">
                <div class="font-semibold" style="color:#166534">Apply advance payment to final month's rent</div>
                <div class="text-xs mt-1" style="color:#166534">
                  ${fmtMoney(advance)} will be recorded as a payment toward
                  <select id="finalMonthId" class="input-base text-xs inline-block py-0.5 px-1.5 ml-1" style="width:auto;min-width:140px;display:inline-block" onclick="event.stopPropagation()">
                    ${(() => {
                      // Build options: tenancy window months that exist or current/this month
                      const start = (t.moveInDate || '').slice(0,7) || '0000-00';
                      const candidates = new Set();
                      // Add all months in state that fall in tenancy
                      state.months.forEach(m => { if (m.id >= start) candidates.add(m.id); });
                      // Add current month if not present
                      candidates.add(todayMonth);
                      // Sort descending
                      const sorted = Array.from(candidates).sort().reverse();
                      return sorted.map(id => `<option value="${id}"${id===todayMonth?' selected':''}>${monthLabel(id)}</option>`).join('');
                    })()}
                  </select>'s rent (utilities still owed separately).
                </div>
              </div>
            </label>
          </div>
        ` : ''}

        ${(outstanding > 0.01 || dep > 0) ? `
          <div class="bg-surface-2 border border-line rounded-md p-3 text-xs space-y-1.5">
            ${outstanding > 0.01 ? `<div class="flex justify-between"><span class="text-ink-5">Outstanding balance</span><strong class="num" style="color:#DC2626">${fmtMoney(outstanding)}</strong></div>` : ''}
            ${dep > 0 ? `<div class="flex justify-between"><span class="text-ink-5">Security deposit on hand</span><strong class="num" style="color:#C9920C">${fmtMoney(dep)}</strong></div>` : ''}
            <div class="text-ink-5 pt-1.5 border-t border-line"><strong class="text-ink">Tip:</strong> ${dep > 0 ? 'The deposit is for damages — use <strong>Deposit entry → Out (refund)</strong> after this to record any refund.' : ''}${outstanding > 0.01 ? ' Outstanding utility/rent charges still apply — record any final payments separately.' : ''}</div>
          </div>
        ` : ''}

        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary" style="background:#DC2626;border-color:#DC2626">${icons.check}Confirm move-out</button>
        </div>
      </form>
    </div>
  `);
  $('#moveOutForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const date = $('#moveOutDate').value;
    if (!date) { toast('Pick a move-out date', 'warn'); return; }
    t.moveOutDate = date;
    let appliedAdvance = false;
    if (advance > 0 && t.unitId && $('#applyAdvance')?.checked) {
      const finalMonthId = $('#finalMonthId')?.value || date.slice(0,7);
      appliedAdvance = applyAdvanceForFinalMonth(t.id, finalMonthId);
    }
    saveState();
    closeModal();
    toast(appliedAdvance ? 'Tenant moved out · advance applied to final month' : 'Tenant marked as moved out', 'success');
    render();
  });
}

              <button type="button" onclick="window.__removeRhEntry(${origIdx})" class="text-danger-strong hover:opacity-70 p-1" title="Remove">${icons.x}</button>
            </div>
          </div>
        </div>
      `;
    };

    // The inline form for adding/editing a rate change
    const formHtml = () => {
      const isEdit = rhMode === 'editing';
      const working = rhWorking || { from: '', rent: 0, otherCharges: [] };
      const ocList = (working.otherCharges || []).map((oc, idx) => `
        <div class="flex items-center justify-between py-1 px-2 rounded text-sm" style="background:#F7F8FA;border:1px solid #E5E7EB;margin-bottom:4px">
          <div class="flex-1 min-w-0">
            <strong class="text-ink">${h(oc.label) || '(unnamed)'}</strong>
            <span class="text-ink-5 mx-2">→</span>
            <span class="num font-semibold">${fmtMoney(oc.amount)}</span>
          </div>
          <button type="button" onclick="window.__rhOcRemove(${idx})" class="text-danger-strong hover:opacity-70 p-1" title="Remove">${icons.x}</button>
        </div>
      `).join('');
      return `
        <div class="rounded-md mb-2 overflow-hidden" style="background:#FFFFFF;border:2px solid #4A90E2">
          <div class="px-3 py-2" style="background:#EFF6FF;border-bottom:1px solid #BFDBFE">
            <div class="text-xs font-semibold uppercase tracking-wide" style="color:#1E40AF">${isEdit ? 'Edit rate change' : 'New rate change'}</div>
          </div>
          <div class="p-3">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-3">
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Effective from</label>
                <input type="month" id="rhFormFrom" class="input-base" value="${working.from || ''}" />
              </div>
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">New rent</label>
                <input type="number" step="0.01" id="rhFormRent" class="input-base" value="${working.rent || ''}" placeholder="e.g. 4500" />
              </div>
            </div>
            <div class="pt-2 mt-1" style="border-top:1px dashed #E5E7EB">
              <div class="text-[11px] font-semibold uppercase text-ink-5 mb-1.5">Other charges from this date</div>
              ${ocList || '<div class="text-[11px] text-ink-5 italic py-0.5 mb-1">No other charges yet.</div>'}
              <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_auto] gap-1.5 sm:items-end mt-2">
                <div>
                  <label class="text-[10px] font-semibold uppercase text-ink-5 block mb-0.5">Label</label>
                  <input type="text" id="rhFormOcLabel" class="input-base text-sm" placeholder="e.g. WiFi" />
                </div>
                <div>
                  <label class="text-[10px] font-semibold uppercase text-ink-5 block mb-0.5">Amount</label>
                  <input type="number" step="0.01" id="rhFormOcAmount" class="input-base text-sm" placeholder="0" />
                </div>
                <button type="button" id="rhFormOcAddBtn" class="btn btn-secondary btn-sm w-full sm:w-auto">${icons.plus}Add</button>
              </div>
            </div>
            <div class="flex justify-end gap-2 mt-3 pt-2" style="border-top:1px solid #E5E7EB">
              <button type="button" id="rhFormCancelBtn" class="btn btn-secondary btn-sm">Cancel</button>
              <button type="button" id="rhFormSaveBtn" class="btn btn-primary btn-sm">${icons.check}${isEdit ? 'Update' : 'Save'} change</button>
            </div>
          </div>
        </div>
      `;
    };

    const emptyState = sorted.length === 0 && rhMode === 'idle'
      ? `<div class="text-xs text-ink-5 italic py-1.5">No rate changes recorded. The base rent above applies to all months.</div>`
      : '';

    const listHtml = sorted.map((e) => {
      const origIdx = rentHistory.indexOf(e);
      if (rhMode === 'editing' && origIdx === rhEditIdx) return formHtml();
      return summaryHtml(e, origIdx);
    }).join('');

    wrap.innerHTML = (rhMode === 'adding' ? formHtml() : '') + listHtml + emptyState;

    // Toggle the "Add change" button state
    const toggleBtn = $('#rhToggleAdd');
    if (toggleBtn) {
      toggleBtn.innerHTML = rhMode !== 'idle' ? `${icons.x}Close` : `${icons.plus}Add change`;
    }

    // Wire form buttons (if form is rendered)
    if (rhMode !== 'idle') wireRateForm();
  };

  // Reads current form inputs into rhWorking. Called before any re-render so
  // the user's typing isn't lost.
  const syncFormToWorking = () => {
    if (!rhWorking) return;
    const fromEl = $('#rhFormFrom');
    const rentEl = $('#rhFormRent');
    if (fromEl) rhWorking.from = fromEl.value;
    if (rentEl) {
      const v = parseFloat(rentEl.value);
      rhWorking.rent = isNaN(v) ? 0 : v;
    }
  };

  const wireRateForm = () => {
    const cancelBtn = $('#rhFormCancelBtn');
    const saveBtn = $('#rhFormSaveBtn');
    const ocAddBtn = $('#rhFormOcAddBtn');

    if (cancelBtn) cancelBtn.onclick = () => {
      rhMode = 'idle'; rhEditIdx = -1; rhWorking = null;
      renderRentHistoryList();
    };

    if (ocAddBtn) ocAddBtn.onclick = () => {
      syncFormToWorking();
      const label = $('#rhFormOcLabel').value.trim();
      const amount = parseFloat($('#rhFormOcAmount').value);
      if (!label) { toast('Charge label is required', 'warn'); return; }
      if (!(amount > 0)) { toast('Enter a valid amount', 'warn'); return; }
      rhWorking.otherCharges.push({ label, amount });
      renderRentHistoryList();
    };

    if (saveBtn) saveBtn.onclick = () => {
      syncFormToWorking();
      const from = (rhWorking.from || '').trim();
      const rent = Number(rhWorking.rent) || 0;
      if (!/^\d{4}-\d{2}$/.test(from)) { toast('Pick an effective month', 'warn'); return; }
      if (rent <= 0) { toast('Enter a valid rent amount', 'warn'); return; }
      const entry = {
        from,
        rent,
        otherCharges: rhWorking.otherCharges.slice(),
      };
      if (rhMode === 'editing' && rhEditIdx >= 0) {
        rentHistory[rhEditIdx] = entry;
      } else {
        // Replace any existing entry with the same `from`
        rentHistory = rentHistory.filter(e => e.from !== from);
        rentHistory.push(entry);
      }
      rhMode = 'idle'; rhEditIdx = -1; rhWorking = null;
      renderRentHistoryList();
    };
  };

  // Window helpers scoped to this modal instance
  window.__removeRentChange = (idx) => {
    rentHistory.splice(idx, 1);
    if (rhMode === 'editing' && rhEditIdx === idx) {
      rhMode = 'idle'; rhEditIdx = -1; rhWorking = null;
    }
    renderRentHistoryList();
  };
  window.__removeRhEntry = window.__removeRentChange;
  window.__editRhEntry = (idx) => {
    const e = rentHistory[idx];
    if (!e) return;
    rhMode = 'editing';
    rhEditIdx = idx;
    rhWorking = {
      from: e.from || '',
      rent: Number(e.rent) || 0,
      otherCharges: Array.isArray(e.otherCharges) ? e.otherCharges.map(oc => ({ label: oc.label, amount: oc.amount })) : [],
    };
    renderRentHistoryList();
  };
  window.__rhOcRemove = (idx) => {
    if (!rhWorking) return;
    syncFormToWorking();
    rhWorking.otherCharges.splice(idx, 1);
    renderRentHistoryList();
  };

  window.__removeOtherCharge = (idx) => {
    otherCharges.splice(idx, 1);
    if (ocEditingIdx === idx) {
      ocEditingIdx = -1;
      $('#ocLabel').value = '';
      $('#ocAmount').value = '';
      $('#ocAddForm').classList.add('hidden');
      $('#ocAddBtnLabel').textContent = 'Add';
      $('#ocToggleAdd').innerHTML = `${icons.plus}Add charge`;
    }
    renderOtherChargesList();
  };
  window.__editOtherCharge = (idx) => {
    const oc = otherCharges[idx];
    if (!oc) return;
    ocEditingIdx = idx;
    $('#ocLabel').value = oc.label || '';
    $('#ocAmount').value = oc.amount != null ? String(oc.amount) : '';
    $('#ocAddForm').classList.remove('hidden');
    $('#ocAddBtnLabel').textContent = 'Save';
    $('#ocToggleAdd').innerHTML = `${icons.x}Close`;
    $('#ocLabel').focus();
  };

  showModal(`
    <div class="p-6">
      <h3 id="unitModalTitle" class="text-lg font-bold text-ink mb-1">${isNew ? 'Add unit' : 'Edit unit'}</h3>
      <p id="unitModalSubtitle" class="text-sm text-ink-5 mb-4">A unit is the physical property. Assign a tenant to it from the Tenants tab.</p>
      <form id="unitForm" class="space-y-3">
        <div class="unit-edit-group">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Unit name</label>
          <input type="text" id="unitName" class="input-base" value="${h(u.name)}" required placeholder="Unit #4" />
        </div>
        <div class="unit-edit-group">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Base rent (monthly)</label>
          <input type="number" step="0.01" id="rent" class="input-base" value="${u.rent}" required />
          <p class="text-[11px] text-ink-5 mt-1">Applies when no rate-change entry matches.</p>
        </div>

        <div id="rateChangesSection" class="rounded-md p-3 mt-1" style="background:#F7F8FA;border:1px solid #E5E7EB">
          <div class="flex items-center justify-between mb-2 gap-2">
            <div class="min-w-0">
              <div class="text-xs font-semibold uppercase tracking-wide text-ink-4">Rate changes over time</div>
              <p class="text-[11px] text-ink-5 mt-0.5">From a given month, set a new rent &amp; other charges</p>
            </div>
            <button type="button" id="rhToggleAdd" class="btn btn-secondary btn-sm flex-shrink-0">${icons.plus}Add change</button>
          </div>
          <div id="rentHistoryArea"></div>
        </div>

        <div class="rounded-md p-3 mt-1 unit-edit-group" style="background:#F7F8FA;border:1px solid #E5E7EB">
          <div class="flex items-center justify-between mb-2 gap-2">
            <div class="min-w-0">
              <div class="text-xs font-semibold uppercase tracking-wide text-ink-4">Other charges (current)</div>
              <p class="text-[11px] text-ink-5 mt-0.5">Applied when no rate-change entry matches</p>
            </div>
            <button type="button" id="ocToggleAdd" class="btn btn-secondary btn-sm flex-shrink-0">${icons.plus}Add charge</button>
          </div>
          <div id="ocAddForm" class="hidden mb-2 pb-2 border-b border-line">
            <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_auto] gap-2 sm:items-end">
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">What it is for</label>
                <input type="text" id="ocLabel" class="input-base" placeholder="e.g. WiFi" />
              </div>
              <div>
                <label class="text-[11px] font-semibold uppercase text-ink-5 block mb-1">Amount</label>
                <input type="number" step="0.01" id="ocAmount" class="input-base" placeholder="0" />
              </div>
              <button type="button" id="ocAddBtn" class="btn btn-primary btn-sm w-full sm:w-auto"><span id="ocAddBtnLabel">Add</span></button>
            </div>
          </div>
          <div id="otherChargesList"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 unit-edit-group">
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Start electric (kWh)</label>
            <input type="number" step="0.01" id="startElectric" class="input-base" value="${u.startElectric}" />
          </div>
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Start water (m³)</label>
            <input type="number" step="0.01" id="startWater" class="input-base" value="${u.startWater}" />
          </div>
        </div>
        <div class="unit-edit-group">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Card color</label>
          <div class="flex flex-wrap gap-2" id="colorSwatches">
            ${ACCENT_PALETTE.map(p => `
              <button type="button" data-color-key="${p.key}" class="color-swatch"
                style="width:32px;height:32px;border-radius:50%;background:${p.color};border:3px solid ${(u.colorKey === p.key) ? '#111827' : 'transparent'};box-shadow:0 0 0 1px #E5E7EB;cursor:pointer"
                title="${p.key}"></button>
            `).join('')}
            <button type="button" data-color-key="" class="color-swatch"
              style="width:32px;height:32px;border-radius:50%;background:#FFFFFF;border:3px solid ${!u.colorKey ? '#111827' : 'transparent'};box-shadow:0 0 0 1px #E5E7EB;cursor:pointer;font-size:18px;color:#6B7280;display:flex;align-items:center;justify-content:center"
              title="auto">A</button>
          </div>
          <p class="text-[11px] text-ink-5 mt-1">"A" = auto-assigned by unit position. Custom colors stay even if you reorder units.</p>
        </div>
        <label class="flex items-center gap-2 text-sm cursor-pointer unit-edit-group">
          <input type="checkbox" id="active" ${u.active ? 'checked':''} />
          <span>Active (uncheck to hide from dashboard but keep history)</span>
        </label>
        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">${icons.check}Save</button>
        </div>
      </form>
    </div>
  `);

  // Section visibility based on mode
  if (mode === 'rate-only') {
    // Show only the rate-changes UI; hide everything else and rename the title
    $$('.unit-edit-group').forEach(el => el.classList.add('hidden'));
    $('#unitModalTitle').textContent = `Rate changes — ${u.name || 'Unit'}`;
    $('#unitModalSubtitle').textContent = 'Set new rent and other charges effective from a specific month.';
    // Auto-open the "Add change" form (most common action)
    setTimeout(() => $('#rhToggleAdd')?.click(), 0);
  } else {
    // Default 'edit' — hide rate-changes section
    const rcs = $('#rateChangesSection');
    if (rcs) rcs.classList.add('hidden');
  }

  renderRentHistoryList();
  renderOtherChargesList();
  $('#rhToggleAdd').addEventListener('click', () => {
    if (rhMode !== 'idle') {
      // Close whatever's open
      rhMode = 'idle'; rhEditIdx = -1; rhWorking = null;
      renderRentHistoryList();
      return;
    }
    // Start "adding" — pre-populate from the latest rentHistory entry (or base)
    const sorted = rentHistory.slice().sort((a,b) => (b.from||'').localeCompare(a.from||''));
    const last = sorted[0];
    rhMode = 'adding';
    rhEditIdx = -1;
    rhWorking = {
      from: '',
      rent: last ? Number(last.rent) || 0 : (parseFloat($('#rent').value) || 0),
      otherCharges: last && Array.isArray(last.otherCharges)
        ? last.otherCharges.map(oc => ({ label: oc.label, amount: oc.amount }))
        : otherCharges.map(oc => ({ label: oc.label, amount: oc.amount })),
    };
    renderRentHistoryList();
    setTimeout(() => $('#rhFormFrom')?.focus(), 0);
  });

  // Base Other-charges add/edit/toggle
  $('#ocToggleAdd').addEventListener('click', () => {
    const isHidden = $('#ocAddForm').classList.contains('hidden');
    if (isHidden) {
      ocEditingIdx = -1;
      $('#ocLabel').value = '';
      $('#ocAmount').value = '';
      $('#ocAddBtnLabel').textContent = 'Add';
      $('#ocAddForm').classList.remove('hidden');
      $('#ocToggleAdd').innerHTML = `${icons.x}Close`;
      $('#ocLabel').focus();
    } else {
      $('#ocAddForm').classList.add('hidden');
      $('#ocToggleAdd').innerHTML = `${icons.plus}Add charge`;
      ocEditingIdx = -1;
    }
  });
  $('#ocAddBtn').addEventListener('click', () => {
    const label = $('#ocLabel').value.trim();
    const amount = parseFloat($('#ocAmount').value);
    if (!label) { toast('Charge label is required', 'warn'); return; }
    if (!(amount > 0)) { toast('Enter a valid amount', 'warn'); return; }
    if (ocEditingIdx >= 0 && otherCharges[ocEditingIdx]) {
      otherCharges[ocEditingIdx] = { label, amount };
    } else {
      otherCharges.push({ label, amount });
    }
    ocEditingIdx = -1;
    $('#ocLabel').value = '';
    $('#ocAmount').value = '';
    $('#ocAddForm').classList.add('hidden');
    $('#ocAddBtnLabel').textContent = 'Add';
    $('#ocToggleAdd').innerHTML = `${icons.plus}Add charge`;
    renderOtherChargesList();
  });

  // Color swatch picker
  let chosenColorKey = u.colorKey || '';
  const wireSwatches = () => {
    const wrap = document.getElementById('colorSwatches');
    if (!wrap) return;
    wrap.querySelectorAll('.color-swatch').forEach(btn => {
      btn.onclick = () => {
        chosenColorKey = btn.dataset.colorKey || '';
        // Re-render selection rings
        wrap.querySelectorAll('.color-swatch').forEach(b => {
          b.style.border = (b.dataset.colorKey === chosenColorKey) ? '3px solid #111827' : '3px solid transparent';
        });
      };
    });
  };
  wireSwatches();

  $('#unitForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
      id: u.id,
      name: $('#unitName').value,
      rent: parseFloat($('#rent').value) || 0,
      otherCharges: otherCharges,
      startElectric: parseFloat($('#startElectric').value) || 0,
      startWater: parseFloat($('#startWater').value) || 0,
      active: $('#active').checked,
      colorKey: chosenColorKey || null,
      rentHistory: rentHistory,
    };
    if (isNew) {
      state.units.push(data);
    } else {
      const i = state.units.findIndex(x => x.id === u.id);
      state.units[i] = data;
    }
    saveState();
    closeModal();
    toast(isNew ? 'Unit added' : 'Unit updated', 'success');
    render();
  });
}
window.openUnitModal = openUnitModal;

// Dedicated entry: opens the unit modal in rate-only mode (just rate-changes management).
function openRateChangesModal(unitId) {
  openUnitModal(unitId, 'rate-only');
}
window.openRateChangesModal = openRateChangesModal;

function confirmDeleteUnit(unitId) {
  const u = unitById(unitId);
  if (!u) return;
  const readingsCount = state.months.filter(m => m.readings[unitId]).length;
  const paysCount = state.payments.filter(p => p.unitId === unitId).length;
  const tenantsCount = tenantsForUnit(unitId).length;
  confirmDestructive({
    title: `Delete ${u.name}?`,
    message: 'This will permanently remove the unit and all associated data.',
    warningList: [
      `${readingsCount} month${readingsCount===1?'':'s'} of reading history`,
      `${paysCount} payment record${paysCount===1?'':'s'}`,
      tenantsCount > 0 ? `${tenantsCount} tenant record${tenantsCount===1?'':'s'} will be unassigned (not deleted)` : 'No tenants attached',
      'Tip: you can mark the unit Inactive to hide it while keeping history.',
    ],
    confirmWord: 'DELETE',
    onConfirm: () => {
      state.units = state.units.filter(x => x.id !== unitId);
      state.payments = state.payments.filter(p => p.unitId !== unitId);
      state.months.forEach(m => { delete m.readings[unitId]; });
      // Unlink tenants but keep them (they may be re-assigned)
      state.tenants.forEach(t => { if (t.unitId === unitId) t.unitId = null; });
      saveState();
      toast('Unit deleted', 'success');
      navigate('#/units');
    }
  });
}
window.confirmDeleteUnit = confirmDeleteUnit;

// 14b. VIEW: TENANTS  (people — contact info, deposits, unit assignment)
// ============================================================================
function renderTenants() {
  const tenants = state.tenants.slice().sort((a,b) => {
    // Active first, then by name
    const aA = !a.moveOutDate, bA = !b.moveOutDate;
    if (aA !== bA) return aA ? -1 : 1;
    return (a.name||'').localeCompare(b.name||'');
  });

    </div>

    ${state.units.length === 0 ? `
      <div class="banner banner-warn mb-5">
        <span>${icons.info}</span>
        <div class="text-sm">Add at least one Unit first, then come back here to assign a tenant to it.</div>
      </div>
    ` : ''}

    ${tenants.length === 0 ? `
      <div class="card p-12 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-2 text-ink-5 mb-3">${icons.wallet}</div>

      </div>
    ` : `
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      ${tenants.map(t => {
        const unit = t.unitId ? unitById(t.unitId) : null;
        const accent = unit ? unitAccent(unit.id) : { color: '#94A3B8' };
        const dep = depositBalance(t.id);
        const tenantUrl = `${location.origin}${location.pathname}#/tenant?code=${t.tenantCode}`;
        const movedOut = !!t.moveOutDate;
        const outstanding = tenantOutstanding(t.id);
        const lastPaid = tenantLastPaidDate(t.id);
        const isPaid = outstanding < 0.01;
        return `
          <div class="card overflow-hidden ${movedOut ? 'opacity-70' : ''}">
            <div style="height:3px;background:${accent.color}"></div>
            <div class="p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="flex items-start gap-2.5 min-w-0 flex-1">
                  <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${accent.color};margin-top:7px;flex-shrink:0"></span>
                  <div class="min-w-0">
                    <div class="text-lg font-bold text-ink truncate">${h(t.name)}</div>
                    <div class="text-sm text-ink-5 mt-0.5">
                      ${unit ? h(unit.name) : '<span class="italic">No unit</span>'}
                    </div>
                  </div>
                </div>
                <div class="flex gap-1 flex-shrink-0">
                  <button onclick="openTenantModal('${t.id}')" class="btn btn-secondary btn-icon" title="Edit">${icons.edit}</button>
                  <button onclick="confirmDeleteTenant('${t.id}')" class="btn btn-danger btn-icon" title="Delete">${icons.trash}</button>
                </div>
              </div>

              <div class="space-y-1.5 text-sm">
                ${t.contactNumber ? `<div class="flex justify-between"><span class="text-ink-5">Contact</span><span class="num text-sm">${h(t.contactNumber)}</span></div>` : ''}
                ${t.social ? `<div class="flex justify-between gap-2"><span class="text-ink-5">Social</span><span class="text-sm text-right truncate" style="max-width:60%" title="${h(t.social)}">${h(t.social)}</span></div>` : ''}
                <div class="flex justify-between"><span class="text-ink-5">Move-in</span><span>${t.moveInDate ? fmtDate(t.moveInDate) : '—'}</span></div>
                ${t.moveOutDate ? `<div class="flex justify-between"><span class="text-ink-5">Move-out</span><span>${fmtDate(t.moveOutDate)}</span></div>` : ''}
                <div class="flex justify-between pt-1.5 border-t border-line"><span class="text-ink-5 font-semibold">Security deposit</span><span class="num font-bold" style="color:#C9920C">${fmtMoney(dep)}</span></div>
                ${t.advance ? `<div class="flex justify-between"><span class="text-ink-5 font-semibold">Advance payment</span><span class="num font-bold" style="color:#C9920C">${fmtMoney(t.advance)}</span></div>` : ''}
              </div>

              <div class="border-t border-line my-3"></div>

              <div class="space-y-1.5 text-sm">
                <div class="flex justify-between"><span class="text-ink-5 font-semibold">Outstanding balance</span><span class="num font-bold" style="color:${isPaid ? '#3F9D2D' : '#DC2626'}">${fmtMoney(outstanding)}</span></div>
                ${isPaid
                  ? `<div class="flex justify-between"><span class="text-ink-5">Paid</span><span>${lastPaid ? fmtDate(lastPaid) : '<span class="text-ink-5 italic">—</span>'}</span></div>`
                  : `<div class="flex justify-between"><span class="text-ink-5">Due</span><span style="color:#DC2626;font-weight:600">${unit ? fmtDate(tenantDueDateFor(t.id, latestUnpaidMonthIdForTenant(t.id))) : '<span class="text-ink-5 italic">—</span>'}</span></div>`
                }
              </div>

              ${movedOut ? `
                <div class="w-full mt-3 px-4 py-2.5 rounded-md text-center font-semibold text-sm flex items-center justify-center gap-2" style="background:#FEF2F2;border:1.5px solid #FECACA;color:#991B1B">
                  ${icons.x}Moved out · ${fmtDate(t.moveOutDate)}
                </div>
              ` : isPaid && unit ? `
                <div class="w-full mt-3 px-4 py-2.5 rounded-md text-center font-semibold text-sm flex items-center justify-center gap-2" style="background:#ECFDF5;border:1.5px solid #A7F3D0;color:#065F46">
                  ${icons.check}Paid in full
                </div>
              ` : !movedOut && unit ? `
                <button onclick="markTenantAsPaid('${t.id}')" class="btn btn-primary w-full justify-center mt-3" style="background:#3F9D2D;border-color:#3F9D2D">${icons.check}Mark as paid</button>
              ` : ''}

              <div class="border-t border-line my-3"></div>

              <div>
                <div class="stat-label mb-1.5">Tenant link</div>
                <div class="flex gap-1">
                  <input type="text" readonly value="${tenantUrl}" class="input-base text-xs !py-1.5" onclick="this.select()" />
                  <button onclick="copyTenantUrl('${t.tenantCode}')" class="btn btn-secondary btn-icon" title="Copy link">${icons.copy}</button>
                </div>
                <a href="#/tenant?code=${t.tenantCode}" class="btn btn-secondary w-full justify-center btn-sm mt-2">${icons.eye}View bills &amp; payment</a>
              </div>

              <div class="flex gap-2 mt-3">
                <button onclick="openDepositModal('${t.id}')" class="btn btn-secondary ${movedOut ? 'w-full' : 'flex-1'} justify-center btn-sm">${icons.plus}Deposit entry</button>
                ${!movedOut ? `<button onclick="openMoveOutModal('${t.id}')" class="btn btn-secondary flex-1 justify-center btn-sm" style="color:#991B1B">Move out</button>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    `}
  `;
  $('#app').innerHTML = layoutShell(body);
}

function copyTenantUrl(code) {
  const url = `${location.origin}${location.pathname}#/tenant?code=${code}`;
  navigator.clipboard.writeText(url).then(() => toast('Tenant link copied', 'success'));
}
window.copyTenantUrl = copyTenantUrl;

function openTenantModal(tenantId) {
  const t = tenantId ? tenantById(tenantId) : {
    id: uid('ten'), name: '', contactNumber: '', social: '',
    deposit: 0, moveInDate: new Date().toISOString().slice(0,10),
    moveOutDate: null, unitId: null, tenantCode: '', active: true,
    createdAt: new Date().toISOString(),
  };
  const isNew = !tenantId;
  const availableUnits = state.units.filter(u => u.active);

  // Helper to compute first full month after move-in
  const firstFullMonth = (dateStr) => {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    const mId = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return nextMonthId(mId);
  };

  const defaultRent = () => {
    const unitSel = $('#tenantUnit');
    if (!unitSel) return 0;
    const u = unitById(unitSel.value);
    return u ? u.rent : 0;
  };

  showModal(`
    <div class="p-6">
      <h3 class="text-lg font-bold text-ink mb-4">${isNew ? 'Add tenant' : 'Edit tenant'}</h3>
      <form id="tenantForm" class="space-y-3">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Name</label>
          <input type="text" id="tenantName" class="input-base" value="${h(t.name)}" required />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Contact number</label>
            <input type="tel" id="tenantContact" class="input-base" value="${h(t.contactNumber || '')}" placeholder="+63 …" />
          </div>
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Social (FB / IG / URL)</label>
            <input type="text" id="tenantSocial" class="input-base" value="${h(t.social || '')}" placeholder="@handle or link" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Assigned unit</label>
            <select id="tenantUnit" class="input-base">
              <option value="">— Not assigned —</option>
              ${availableUnits.map(u => `<option value="${u.id}" ${t.unitId===u.id?'selected':''}>${h(u.name)} · ${CURRENCY}${fmtNum(u.rent, 0)}/mo</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Tenant URL code</label>
            <input type="text" id="tenantCode" class="input-base text-xs" style="font-weight:600" value="${h(t.tenantCode || '')}" placeholder="auto if blank" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Move-in date</label>
            <input type="date" id="moveInDate" class="input-base" value="${t.moveInDate || ''}" />
          </div>
          <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Move-out date (optional)</label>
            <input type="date" id="moveOutDate" class="input-base" value="${t.moveOutDate || ''}" />
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Rent due day of the month</label>
          <input type="number" min="1" max="31" id="dueDay" class="input-base" style="max-width:120px" value="${t.dueDay || ''}" placeholder="${state.settings.defaultDueDay || 5}" />
          <p class="text-[11px] text-ink-5 mt-1">e.g. 5, 15, or 30. Often matches the move-in day. Leave blank to use the default (${state.settings.defaultDueDay || 5}).</p>
        </div>

        ${isNew ? `
          <div class="rounded-md p-4 mt-2" style="background:#EFF6FF;border:1px solid #BFDBFE">
            <div class="flex items-start gap-2 mb-3" style="color:#1E40AF">
              <span>${icons.info}</span>
              <div class="text-xs flex-1">
                <strong>Move-in payment</strong> = security deposit + advance payment. Both are held by the landlord. The advance is applied to the tenant's <strong>final month's rent</strong> at move-out; the deposit is held for damages.
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Security deposit</label>
                <input type="number" step="0.01" id="deposit" class="input-base" value="0" />
                <p class="text-[11px] text-ink-5 mt-1">Held for damages / refundable</p>
              </div>
              <div>
                <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Advance payment</label>
                <input type="number" step="0.01" id="advance" class="input-base" value="0" />
                <p class="text-[11px] text-ink-5 mt-1">Used to cover the final month's rent at move-out</p>
              </div>
            </div>
            <div class="mt-3 pt-3 border-t" style="border-color:#BFDBFE">
              <div class="flex justify-between text-sm">
                <span class="font-semibold" style="color:#1E40AF">Total move-in payment</span>
                <span class="num font-bold" id="moveInTotal" style="color:#1E40AF">—</span>
              </div>
            </div>
          </div>
        ` : `
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Security deposit (held)</label>
              <input type="number" step="0.01" id="deposit" class="input-base" value="${depositBalance(t.id).toFixed(2)}" />
              <p class="text-[11px] text-ink-5 mt-1">Changing this creates an adjustment entry to match.</p>
            </div>
            <div>
              <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Advance payment</label>
              <input type="number" step="0.01" id="advance" class="input-base" value="${t.advance || 0}" />
              <p class="text-[11px] text-ink-5 mt-1">${(t.advance > 0) ? 'Held until move-out — applied to final month rent.' : 'Already applied (or none recorded).'}</p>
            </div>
          </div>
        `}

        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">${icons.check}Save</button>
        </div>
      </form>
    </div>
  `);

  if (isNew) {
    const setDefaultsFromUnit = () => {
      const rent = defaultRent();
      $('#deposit').value = rent.toFixed(2);
      $('#advance').value = rent.toFixed(2);
    };
    const updateSummary = () => {
      const dep = parseFloat($('#deposit').value) || 0;
      const adv = parseFloat($('#advance').value) || 0;
      $('#moveInTotal').textContent = fmtMoney(dep + adv);
    };
    // When the user picks a move-in date and the due-day field is still empty,
    // suggest the day-of-month from the move-in date as the default.
    const syncDueDayFromMoveIn = () => {
      const mi = $('#moveInDate').value;
      const dueDayEl = $('#dueDay');
      if (!mi || !dueDayEl || dueDayEl.value) return;
      const day = parseInt(mi.slice(8, 10));
      if (!isNaN(day) && day >= 1 && day <= 31) dueDayEl.value = day;
    };
    $('#tenantUnit').addEventListener('change', () => { setDefaultsFromUnit(); updateSummary(); });
    $('#deposit').addEventListener('input', updateSummary);
    $('#advance').addEventListener('input', updateSummary);
    $('#moveInDate').addEventListener('change', syncDueDayFromMoveIn);
    setDefaultsFromUnit();
    updateSummary();
  }

  $('#tenantForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
      id: t.id,
      name: $('#tenantName').value,
      contactNumber: $('#tenantContact').value,
      social: $('#tenantSocial').value,
      deposit: parseFloat($('#deposit').value) || 0,
      advance: parseFloat($('#advance')?.value || t.advance || 0) || 0,
      dueDay: (() => {
        const v = parseInt($('#dueDay').value);
        return (!isNaN(v) && v >= 1 && v <= 31) ? v : null;
      })(),
      moveInDate: $('#moveInDate').value || null,
      moveOutDate: $('#moveOutDate').value || null,
      unitId: $('#tenantUnit').value || null,
      tenantCode: $('#tenantCode').value.trim() || (slugify($('#tenantName').value) + '-' + Math.random().toString(36).slice(2,6)),
      active: !$('#moveOutDate').value,
      createdAt: t.createdAt || new Date().toISOString(),
    };
    if (isNew) {
      state.tenants.push(data);
      // Deposit → deposit movement (so it shows on the deposit ledger)
      if (data.deposit > 0) {
        state.depositMovements.push({
          id: uid('dep'), tenantId: data.id, date: data.moveInDate || new Date().toISOString().slice(0,10),
          type: 'in', amount: data.deposit, notes: 'Security deposit (move-in)'
        });
      }
      // NOTE: We deliberately do NOT auto-create a payment for the advance.
      // The advance is held on the tenant record (data.advance) and conceptually
      // represents 1 month rent paid up front. When billing each month, the
      // landlord records actual payments as they come in. The advance can be
      // applied manually (e.g., as a payment with method "Advance") when the
      // tenant moves out, or returned via Deposit entry.
    } else {
      const i = state.tenants.findIndex(x => x.id === t.id);
      // Reconcile deposit: if the typed value differs from the current held
      // balance, create a balancing movement so the card matches the input.
      const oldBalance = depositBalance(t.id);
      const newBalance = data.deposit;
      const diff = newBalance - oldBalance;
      if (Math.abs(diff) > 0.01) {
        state.depositMovements.push({
          id: uid('dep'),
          tenantId: t.id,
          date: new Date().toISOString().slice(0,10),
          type: diff > 0 ? 'in' : 'out',
          amount: Math.abs(diff),
          notes: 'Adjustment (Edit tenant)'
        });
      }
      state.tenants[i] = data;
    }
    saveState();
    closeModal();
    toast(isNew ? 'Tenant added' : 'Tenant updated', 'success');
    render();
  });
}
window.openTenantModal = openTenantModal;

function confirmDeleteTenant(tenantId) {
  const t = tenantById(tenantId);
  if (!t) return;
  const deps = state.depositMovements.filter(d => d.tenantId === tenantId).length;
  confirmDestructive({
    title: `Delete ${t.name}?`,
    message: 'This removes the tenant record. Payments recorded against their unit are kept (they are tied to the unit, not the tenant).',
    warningList: [
      `${deps} deposit movement${deps===1?'':'s'} will be removed`,
      'Payments and meter readings are preserved',
      'Tip: set a move-out date instead of deleting to keep their history.',
    ],
    confirmWord: 'DELETE',
    onConfirm: () => {
      state.tenants = state.tenants.filter(x => x.id !== tenantId);
      state.depositMovements = state.depositMovements.filter(d => d.tenantId !== tenantId);
      saveState();
      toast('Tenant deleted', 'success');
      navigate('#/tenants');
    }
  });
}
window.confirmDeleteTenant = confirmDeleteTenant;

// Deposit-entry modal — now scoped to a tenant. Called from the Tenant card.
function openDepositModal(tenantId) {
  const t = tenantId ? tenantById(tenantId) : null;
  if (!t) { toast('Pick a tenant first', 'warn'); return; }
  const u = t.unitId ? unitById(t.unitId) : null;
  const heldBalance = depositBalance(t.id);
  const curMonth = currentMonthId();
  const curRent = u ? rentForUnit(u.id, curMonth) : 0;

  showModal(`
    <div class="p-6">
      <h3 class="text-lg font-bold text-ink mb-1">Deposit entry</h3>
      <p class="text-sm text-ink-5 mb-4">${h(t.name)} · current held: <strong class="num">${fmtMoney(heldBalance)}</strong></p>
      <form id="depForm" class="space-y-3">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Type</label>
          <select id="depType" class="input-base">
            <option value="in">In (received)</option>
            <option value="out">Out (refund / deduction)</option>
            <option value="used"${!u ? ' disabled' : ''}>Used (rent payment)${!u ? ' — needs assigned unit' : ''}</option>
          </select>
        </div>

        <div id="depAmountWrap">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Amount</label>
          <input type="number" step="0.01" id="depAmount" class="input-base" />
        </div>

        <div id="depMonthWrap" class="hidden">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Month covered</label>
          <input type="month" id="depMonth" class="input-base" value="${curMonth}" style="max-width:240px" />
        </div>

        <div id="depWarning" class="hidden rounded-md p-3" style="background:#FEF3C7;border:1px solid #FCD34D">
          <div class="flex items-start gap-2 text-sm" style="color:#92400E">
            <span class="flex-shrink-0">${icons.alert}</span>
            <div>
              <strong>Heads up:</strong> The security deposit will be reduced by the rent amount and the selected month will be marked as paid for rent. Top up the deposit later if you want to keep the same security level.
            </div>
          </div>
          <div class="mt-2 pt-2 text-xs space-y-1" style="border-top:1px solid #FCD34D;color:#92400E">
            <div class="flex justify-between"><span>Rent for selected month</span><strong class="num" id="depRentPreview">${fmtMoney(curRent)}</strong></div>
            <div class="flex justify-between"><span>Deposit before</span><strong class="num">${fmtMoney(heldBalance)}</strong></div>
            <div class="flex justify-between"><span>Deposit after</span><strong class="num" id="depAfterPreview">${fmtMoney(heldBalance - curRent)}</strong></div>
          </div>
        </div>

        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Date</label>
          <input type="date" id="depDate" class="input-base" value="${new Date().toISOString().slice(0,10)}" required />
        </div>
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5 block mb-1.5">Notes</label>
          <input type="text" id="depNotes" class="input-base" placeholder="e.g. damage deduction" />
        </div>
        <div class="flex gap-2 justify-end pt-2">
          <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">${icons.check}Save</button>
        </div>
      </form>
    </div>
  `);

  const updateRentPreview = () => {
    if (!u) return;
    const monthId = $('#depMonth').value || curMonth;
    const rent = rentForUnit(u.id, monthId);
    const after = heldBalance - rent;
    $('#depRentPreview').textContent = fmtMoney(rent);
    $('#depAfterPreview').textContent = fmtMoney(after);
    $('#depAfterPreview').style.color = (rent > heldBalance + 0.01) ? '#DC2626' : '';
  };

  const updateMode = () => {
    const isUsed = $('#depType').value === 'used';
    $('#depAmountWrap').classList.toggle('hidden', isUsed);
    $('#depMonthWrap').classList.toggle('hidden', !isUsed);
    $('#depWarning').classList.toggle('hidden', !isUsed);
    // Amount is only required in non-used modes
    const amtEl = $('#depAmount');
    if (amtEl) amtEl.required = !isUsed;
    if (isUsed) updateRentPreview();
  };

  $('#depType').addEventListener('change', updateMode);
  $('#depMonth').addEventListener('change', updateRentPreview);
  // Initial state
  $('#depAmount').required = true;

  $('#depForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const type = $('#depType').value;
    const date = $('#depDate').value;
    const notes = $('#depNotes').value;

    if (type === 'used') {
      if (!u) { toast('Tenant has no unit assigned', 'warn'); return; }
      const monthId = $('#depMonth').value;
      if (!monthId) { toast('Pick a month covered', 'warn'); return; }
      const rent = rentForUnit(u.id, monthId);
      if (!(rent > 0)) { toast('No rent set for this month', 'warn'); return; }
      if (rent > heldBalance + 0.01) {
        toast(`Deposit only has ${fmtMoney(heldBalance)} — not enough for ${fmtMoney(rent)} rent`, 'warn');
        return;
      }
      // Make sure the target month exists so the payment has somewhere to land
      if (!monthById(monthId)) {
        state.months.push({
          id: monthId, kwhRate: null, actualElectricBill: null,
          dueDate: null, readings: {}, createdAt: new Date().toISOString()
        });
      }
      // 1) Reduce the deposit by recording an 'out' movement
      state.depositMovements.push({
        id: uid('dep'),
        tenantId: t.id,
        type: 'out',
        amount: rent,
        date,
        notes: notes || `Used for ${monthLabel(monthId)} rent`,
      });
      // 2) Record a payment so the month's bill reflects the rent as paid
      state.payments.push({
        id: uid('pay'),
        unitId: u.id,
        monthId,
        amount: rent,
        date,
        method: 'Deposit',
        notes: notes || `Paid from security deposit`,
        createdAt: new Date().toISOString()
      });
      saveState();
      closeModal();
      toast(`Deposit ${fmtMoney(rent)} applied to ${monthLabel(monthId)} rent`, 'success');
      render();
      return;
    }

    // Normal in/out movement
    const amount = parseFloat($('#depAmount').value);
    if (!(amount > 0)) { toast('Enter a valid amount', 'warn'); return; }
    state.depositMovements.push({
      id: uid('dep'),
      tenantId: t.id,
      type,
      amount,
      date,
      notes,
    });
    saveState();
    closeModal();
    toast('Deposit entry saved', 'success');
    render();
  });
}
window.openDepositModal = openDepositModal;


// ============================================================================
// 15. VIEW: UNIT DETAIL (ledger + charts)
// ============================================================================
function renderUnitDetail(unitId) {
  const u = unitById(unitId);
  if (!u) { navigate('#/units'); return; }

  const ledger = computeLedger(unitId);
  const totalCharges = ledger.reduce((a,r) => a + r.charges, 0);
  const totalPaid = ledger.reduce((a,r) => a + r.payments, 0);
  const outstanding = ledger.length ? ledger[ledger.length-1].endBal : 0;
  const dep = depositBalance(unitId);

  const body = `
    <a href="#/units" class="inline-flex items-center gap-1 text-sm text-ink-5 hover:text-ink mb-3">${icons.left}Back to units</a>
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-5">
      <div class="flex items-start gap-3">
        <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${unitAccent(u.id).color};margin-top:10px;flex-shrink:0"></span>
        <div>
          <div class="stat-label">Unit</div>
          <h2 class="text-2xl font-bold text-ink">${h(u.name)}</h2>
          ${(() => {
            const curT = currentTenantForUnit(u.id);
            const all = tenantsForUnit(u.id);
            if (curT) {
              return `<div class="text-sm text-ink-4 mt-0.5">Current tenant: <strong>${h(curT.name)}</strong>${curT.moveInDate ? ` · since ${fmtDate(curT.moveInDate)}` : ''}</div>`;
            }
            if (all.length) {
              const last = all.slice().sort((a,b) => (b.moveOutDate||'').localeCompare(a.moveOutDate||''))[0];
              return `<div class="text-sm text-ink-5 mt-0.5 italic">Vacant · last tenant: ${h(last.name)}${last.moveOutDate ? ` (moved out ${fmtDate(last.moveOutDate)})` : ''}</div>`;
            }
            return `<div class="text-sm text-ink-5 mt-0.5 italic">Vacant</div>`;
          })()}
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="openStatement('${u.id}')" class="btn btn-secondary">${icons.print}Print statement</button>
        <button onclick="openUnitModal('${u.id}')" class="btn btn-secondary">${icons.edit}Edit</button>
      </div>

function renderReports() {
  const allMonthIds = sortedMonthIds();
  // Available years inferred from data + always include current year
  const years = new Set();
  allMonthIds.forEach(id => years.add(id.slice(0, 4)));
  years.add(String(new Date().getFullYear()));
  const yearList = Array.from(years).sort().reverse();

  // Read selected year from URL hash query (?year=2026), default to current
  const selectedYear = parseRoute().query?.year || String(new Date().getFullYear());

  // Filter months in the selected year that are within tenancy / have data
  const yearMonths = allMonthIds.filter(id => id.startsWith(selectedYear + '-'));
  const units = state.units; // include inactive units for historical accuracy

  // Aggregate per-unit and overall
  let totalRent = 0, totalElectric = 0, totalWater = 0, totalOther = 0;
  let totalBilled = 0, totalCollected = 0;
  const unitRows = units.map(u => {
    let uRent = 0, uElectric = 0, uWater = 0, uOther = 0, uBilled = 0, uCollected = 0;
    const occupiedMonths = [];
    yearMonths.forEach(mid => {
      const ch = computeCharges(u.id, mid);
      if (!ch || ch.vacant || !ch.hasReadings) return;
      uRent += ch.rent || 0;
      uElectric += ch.electricBill || 0;
      uWater += ch.waterBill || 0;
      uOther += ch.otherCharge || 0;
      uBilled += ch.total || 0;
      uCollected += paymentsTotalForUnitMonth(u.id, mid);
      occupiedMonths.push(mid);
    });
    totalRent += uRent;
    totalElectric += uElectric;
    totalWater += uWater;
    totalOther += uOther;
    totalBilled += uBilled;
    totalCollected += uCollected;
    return { u, uRent, uElectric, uWater, uOther, uBilled, uCollected, monthsCount: occupiedMonths.length };
  });

  const totalOutstanding = totalBilled - totalCollected;
  const collectionRate = totalBilled > 0 ? (totalCollected / totalBilled * 100) : 0;

  // Per-month breakdown for the year (small table)
  const monthRows = yearMonths.map(mid => {
    let billed = 0, collected = 0;
    units.forEach(u => {
      const ch = computeCharges(u.id, mid);
      if (ch && ch.hasReadings && !ch.vacant) billed += ch.total;
      collected += paymentsTotalForUnitMonth(u.id, mid);
    });
    return { mid, billed, collected, balance: billed - collected };
  });

  // CSV download — all data in selected year
  const csvRows = [
    ['Month', 'Unit', 'Tenant', 'Rent', 'Electric', 'Water', 'Other', 'Total Billed', 'Collected', 'Balance']
  ];
  yearMonths.forEach(mid => {
    units.forEach(u => {
      const ch = computeCharges(u.id, mid);
      if (!ch || !ch.hasReadings) return;
      const occupant = state.tenants.find(t =>
        t.unitId === u.id &&
        (!t.moveInDate || t.moveInDate.slice(0,7) <= mid) &&
        (!t.moveOutDate || t.moveOutDate.slice(0,7) >= mid)
      );
      const collected = paymentsTotalForUnitMonth(u.id, mid);
      csvRows.push([
        mid,
        u.name,
        occupant?.name || (ch.vacant ? '(Vacant)' : ''),
        ch.rent || 0,
        ch.electricBill || 0,
        ch.waterBill || 0,
        ch.otherCharge || 0,
        ch.total || 0,
        collected,
        (ch.total || 0) - collected
      ]);
    });
  });

  const body = `
    <div>
      <div class="flex items-end justify-between gap-3 mb-5 flex-wrap">
        <div>
          <div class="stat-label">Reports</div>
          <h2 class="text-2xl font-bold text-ink">Annual summary</h2>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-xs font-semibold uppercase tracking-wide text-ink-5">Year</label>
          <select id="reportYear" class="input-base" style="width:auto;min-width:100px">
            ${yearList.map(y => `<option value="${y}"${y===selectedYear?' selected':''}>${y}</option>`).join('')}
          </select>
          <button onclick="downloadReportCsv('${selectedYear}')" class="btn btn-secondary btn-sm">${icons.download}<span class="hidden sm:inline">Download CSV</span></button>
        </div>
      </div>

      ${yearMonths.length === 0 ? `
        <div class="card p-10 text-center">
          <div class="text-ink-5 italic">No data recorded for ${selectedYear} yet.</div>
        </div>
      ` : `
        <!-- Summary cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
          <div class="card card-accent card-accent-blue p-5">
            <div class="stat-label">Total billed</div>
            <div class="stat-value num mt-1">${fmtMoney(totalBilled)}</div>
            <div class="text-xs text-ink-5 mt-1">${yearMonths.length} month${yearMonths.length===1?'':'s'} of data</div>
          </div>
          <div class="card card-accent card-accent-green p-5">
            <div class="stat-label">Collected</div>
            <div class="stat-value num mt-1" style="color:#3F9D2D">${fmtMoney(totalCollected)}</div>
            <div class="text-xs text-ink-5 mt-1">${collectionRate.toFixed(1)}% collection rate</div>
          </div>
          <div class="card card-accent card-accent-red p-5">
            <div class="stat-label">Still outstanding</div>
            <div class="stat-value num mt-1" style="color:${totalOutstanding > 0.01 ? '#DC2626' : '#111827'}">${fmtMoney(Math.max(0, totalOutstanding))}</div>
          </div>
          <div class="card card-accent card-accent-purple p-5">
            <div class="stat-label">Rent only (gross)</div>
            <div class="stat-value num mt-1">${fmtMoney(totalRent)}</div>
            <div class="text-xs text-ink-5 mt-1">Excludes utilities &amp; other</div>
          </div>
        </div>

        <!-- Per-unit breakdown -->
        <div class="card mb-6 overflow-x-auto">
          <div class="p-5 pb-3"><h3 class="section-h">By unit</h3></div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Unit</th>
                <th class="num-cell">Months</th>
                <th class="num-cell">Rent</th>
                <th class="num-cell">Electric</th>
                <th class="num-cell">Water</th>
                <th class="num-cell">Other</th>
                <th class="num-cell">Billed</th>
                <th class="num-cell">Collected</th>
              </tr>
            </thead>
            <tbody>
              ${unitRows.map(r => {
                const ac = unitAccent(r.u.id);
                return `
                  <tr>
                    <td>
                      <span class="inline-flex items-center gap-2">
                        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ac.color}"></span>
                        ${h(r.u.name)}
                      </span>
                    </td>
                    <td class="num-cell">${r.monthsCount}</td>
                    <td class="num-cell">${fmtMoney(r.uRent)}</td>
                    <td class="num-cell">${fmtMoney(r.uElectric)}</td>
                    <td class="num-cell">${fmtMoney(r.uWater)}</td>
                    <td class="num-cell">${fmtMoney(r.uOther)}</td>
                    <td class="num-cell font-semibold">${fmtMoney(r.uBilled)}</td>
                    <td class="num-cell" style="color:#3F9D2D">${fmtMoney(r.uCollected)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
            <tfoot>
              <tr style="border-top:2px solid #111827;font-weight:700">
                <td>Total</td>
                <td class="num-cell">—</td>
                <td class="num-cell">${fmtMoney(totalRent)}</td>
                <td class="num-cell">${fmtMoney(totalElectric)}</td>
                <td class="num-cell">${fmtMoney(totalWater)}</td>
                <td class="num-cell">${fmtMoney(totalOther)}</td>
                <td class="num-cell">${fmtMoney(totalBilled)}</td>
                <td class="num-cell" style="color:#3F9D2D">${fmtMoney(totalCollected)}</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <!-- Per-month breakdown -->
        <div class="card overflow-x-auto">
          <div class="p-5 pb-3"><h3 class="section-h">By month</h3></div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Month</th>
                <th class="num-cell">Billed</th>
                <th class="num-cell">Collected</th>
                <th class="num-cell">Balance</th>
              </tr>
            </thead>
            <tbody>
              ${monthRows.map(r => `
                <tr onclick="location.hash='#/month/${r.mid}'" class="cursor-pointer hover:bg-surface-2">
                  <td class="font-semibold">${monthLabel(r.mid)}</td>
                  <td class="num-cell">${fmtMoney(r.billed)}</td>
                  <td class="num-cell" style="color:#3F9D2D">${fmtMoney(r.collected)}</td>
                  <td class="num-cell" style="color:${r.balance > 0.01 ? '#DC2626' : '#111827'}">${fmtMoney(r.balance)}</td>
                </tr>

            </tbody>
          </table>
        </div>
      `}
    </div>
  `;

  $('#app').innerHTML = layoutShell(body);

  // Wire year selector
  const yearSel = document.getElementById('reportYear');
  if (yearSel) {
    yearSel.addEventListener('change', () => {
      location.hash = `#/reports?year=${yearSel.value}`;
    });
  }
}

// CSV download for the selected year. Builds rows on the fly to avoid stale
// closure data if the user switches years quickly.
function downloadReportCsv(year) {
  const allMonthIds = sortedMonthIds().filter(id => id.startsWith(year + '-'));
  const units = state.units;
  const rows = [
    ['Month', 'Unit', 'Tenant', 'Rent', 'Electric', 'Water', 'Other', 'Total Billed', 'Collected', 'Balance']
  ];
  allMonthIds.forEach(mid => {
    units.forEach(u => {
      const ch = computeCharges(u.id, mid);
      if (!ch || !ch.hasReadings) return;
      const occupant = state.tenants.find(t =>
        t.unitId === u.id &&
        (!t.moveInDate || t.moveInDate.slice(0,7) <= mid) &&
        (!t.moveOutDate || t.moveOutDate.slice(0,7) >= mid)
      );
      const collected = paymentsTotalForUnitMonth(u.id, mid);
      rows.push([
        mid,
        u.name,
        occupant?.name || (ch.vacant ? '(Vacant)' : ''),
        (ch.rent || 0).toFixed(2),
        (ch.electricBill || 0).toFixed(2),
        (ch.waterBill || 0).toFixed(2),
        (ch.otherCharge || 0).toFixed(2),
        (ch.total || 0).toFixed(2),
        collected.toFixed(2),
        ((ch.total || 0) - collected).toFixed(2)
      ]);
    });
  });
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `aptracker-report-${year}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV downloaded', 'success');
}
window.downloadReportCsv = downloadReportCsv;
