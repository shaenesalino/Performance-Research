<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#C9E8F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiny Tasks">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="I'M ON! Tiny Tasks">
<title>I'M ON! Tiny Tasks</title>
<style>
  :root {
    /* Palette */
    --blue: #4A90E2;
    --blue-2: #2563EB;
    --teal: #5BC0BE;
    --teal-d: #0EA5A5;
    --green: #7ED957;
    --green-d: #3F9D2D;
    --green-m: #2E9E5B;
    --yellow: #FFD93D;
    --yellow-d: #C9920C;
    --orange: #FF9F1C;
    --orange-d: #E07B0A;
    --amber: #D97706;
    --coral: #FF5A5F;
    --pink: #F72585;
    --pink-d: #D11D6C;
    --purple: #A855F7;
    --purple-d: #7E3FE3;
    --red: #DC2626;

    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-900: #111827;

    --bg: #F7F8FA;
    --bg-2: #F1F5F9;
    --border: #E5E7EB;
    --white: #FFFFFF;

    --slate-100: #F1F5F9;
    --slate-400: #94A3B8;
    --slate-700: #334155;
    --slate-800: #1E293B;
    --slate-900: #0F172A;

    --green-light: #ECFDF5;
    --red-light: #FEF2F2;
    --blue-light: #EFF6FF;
    --yellow-light: #FFFBEB;

    /* Categories */
    --cat-morning: #FFD93D;
    --cat-learning: #4A90E2;
    --cat-meals: #FF9F1C;
    --cat-play: #7ED957;
    --cat-rest: #A855F7;
    --cat-hygiene: #0EA5A5;
    --cat-evening: #1E293B;
    --cat-custom: #94A3B8;

    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 18px 40px rgba(15, 23, 42, 0.12);
    --radius: 18px;
    --radius-lg: 22px;
    --radius-xl: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    touch-action: manipulation; /* disables double-tap zoom on most touch surfaces */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  body {
    font-family: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN",
      Quicksand, Comfortaa, "Arial Rounded MT Bold", "Arial Rounded MT",
      Calibri, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--gray-900);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 16px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 16px; }

  #app {
    max-width: 980px;
    margin: 0 auto;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 110px);
    min-height: 100vh;
    position: relative;
  }

  /* ---------- Header ---------- */
  .app-header {
    padding: calc(env(safe-area-inset-top, 0px) + 18px) calc(env(safe-area-inset-right, 0px) + 22px) 18px calc(env(safe-area-inset-left, 0px) + 22px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(120deg, #E8F4FA 0%, #C9E8F2 55%, #A8DCE8 100%);
    border-radius: 0 0 28px 28px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(74, 144, 226, 0.12);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .app-title {
    display: flex;
    align-items: center;
  }
  .app-logo {
    height: 52px;
    width: auto;
    display: block;
    filter: drop-shadow(0 2px 4px rgba(30, 41, 59, 0.10));
  }

  .clock-pill {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 14px;
    color: #1E293B;
    border: 1px solid rgba(255, 255, 255, 0.8);
    font-variant-numeric: tabular-nums;
    box-shadow: 0 2px 6px rgba(74, 144, 226, 0.10);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .clock-pill svg { width: 14px; height: 14px; color: #5BC0BE; }

  /* ---------- Sections ---------- */
  .view { padding: 0 20px; }
  .section-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--slate-400);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 22px 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-label .right { color: var(--gray-500); font-size: 12px; }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-sm);
  }

  /* ---------- Current Activity ---------- */
  .current-card {
    background: var(--blue-light);
    border: 1.5px solid var(--blue);
    padding: 20px;
    border-radius: var(--radius-xl);
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 14px;
    transition: background 0.4s, border-color 0.4s;
    position: relative;
    overflow: hidden;
  }
  .current-card.ending-soon {
    background: var(--red-light);
    border-color: var(--coral);
  }
  .current-card.idle {
    background: var(--white);
    border: 1.5px dashed var(--border);
  }
  .current-card .top {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .current-card .meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
    flex: 1;
  }
  .current-card .title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .current-card .sub {
    color: var(--gray-500);
    font-weight: 600;
    font-size: 14px;
  }
  .current-card .remaining {
    font-size: 13px;
    color: var(--blue);
    font-weight: 700;
    margin-top: 2px;
  }
  .current-card.ending-soon .remaining { color: var(--coral); }
  .current-card.idle .title { color: var(--gray-500); font-size: 18px; }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    border: none;
    border-radius: 999px;
    padding: 12px 18px;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.1s, opacity 0.2s, background 0.2s, border-color 0.2s;
    user-select: none;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 16px; height: 16px; }
  .btn-primary {
    background: var(--gray-900);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--slate-700); }
  .btn-soft {
    background: var(--white);
    color: var(--gray-900);
    border: 1px solid var(--border);
  }
  .btn-soft:hover { background: var(--slate-100); }
  .btn-ghost {
    background: transparent;
    color: var(--gray-500);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--gray-900); background: var(--slate-100); }
  .btn-danger {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #FECACA;
  }
  .btn-danger:hover { background: #FFE4E4; }
  .btn-block { width: 100%; }
  .btn-sm { padding: 8px 12px; font-size: 13px; }

  /* ---------- Activity Icon ---------- */
  .act-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--white);
    box-shadow: var(--shadow-sm);
  }
  .act-icon svg { width: 28px; height: 28px; }
  .act-icon.sm { width: 40px; height: 40px; border-radius: 12px; }
  .act-icon.sm svg { width: 22px; height: 22px; }
  .act-icon.lg { width: 84px; height: 84px; border-radius: 22px; }
  .act-icon.lg svg { width: 40px; height: 40px; }
  .act-icon.xl { width: 100px; height: 100px; border-radius: 26px; }
  .act-icon.xl svg { width: 50px; height: 50px; }
  .act-icon.xs { width: 28px; height: 28px; border-radius: 8px; }
  .act-icon.xs svg { width: 16px; height: 16px; }
  .act-icon.dark-text { color: var(--slate-900); }

  /* ---------- Next Up ---------- */
  .nextup-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
  }
  .nextup-card .meta { flex: 1; min-width: 0; }
  .nextup-card .title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.2;
  }
  .nextup-card .sub {
    color: var(--gray-500);
    font-size: 13px;
    margin-top: 2px;
    font-weight: 600;
  }
  .nextup-card .countdown {
    background: var(--slate-100);
    color: var(--slate-700);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ---------- Timeline ---------- */
  .timeline {
    position: relative;
    padding-left: 64px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 56px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: var(--border);
    border-radius: 2px;
  }
  .tl-row {
    position: relative;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .tl-row:active { transform: scale(0.99); }
  .tl-time {
    position: absolute;
    left: -64px;
    top: 16px;
    width: 50px;
    text-align: right;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    font-variant-numeric: tabular-nums;
  }
  .tl-dot {
    position: absolute;
    left: -10px;
    top: 22px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--white);
    border: 2px solid var(--border);
    z-index: 2;
  }
  .tl-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.2s, background 0.2s;
  }
  .tl-card:hover { border-color: var(--slate-400); }
  .tl-card .meta { flex: 1; min-width: 0; }
  .tl-card .title {
    font-weight: 700;
    color: var(--gray-900);
    font-size: 15px;
    line-height: 1.3;
  }
  .tl-card .sub {
    color: var(--gray-500);
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  .tl-row.active .tl-card {
    background: var(--blue-light);
    border-color: var(--blue);
    border-width: 1.5px;
    box-shadow: 0 6px 18px rgba(74, 144, 226, 0.18);
  }
  .tl-row.active .tl-dot {
    background: var(--blue);
    border-color: var(--white);
    box-shadow: 0 0 0 3px var(--blue);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.45); }
    50% { box-shadow: 0 0 0 6px rgba(74, 144, 226, 0.18); }
  }
  .tl-row.done .tl-card { background: var(--slate-100); opacity: 0.85; }
  .tl-row.done .tl-card .title { text-decoration: line-through; color: var(--gray-500); }
  .tl-row.missed .tl-card { background: var(--white); opacity: 0.55; }
  .tl-row.missed .tl-card .title { color: var(--gray-500); }

  /* Hour-rail timeline (Today view) */
  .hours-timeline {
    display: flex;
    flex-direction: column;
  }
  .hr-row {
    display: grid;
    grid-template-columns: 56px 18px 1fr;
    align-items: stretch;
    min-height: 56px;
  }
  .hr-row .hr-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    text-align: right;
    padding: 10px 12px 0 0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .hr-rail {
    position: relative;
    width: 18px;
  }
  .hr-rail-bg {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    transform: translateX(-50%);
    background: var(--border);
    border-radius: 2px;
  }
  .hr-rail-fill {
    position: absolute;
    left: 50%;
    top: 0;
    width: 4px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom, var(--blue), var(--blue-2));
    border-radius: 2px;
    z-index: 1;
    box-shadow: 0 0 8px rgba(74, 144, 226, 0.25);
  }
  .hr-tick {
    position: absolute;
    left: 50%;
    top: 14px;
    width: 8px;
    height: 8px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: var(--white);
    border: 2px solid var(--border);
    z-index: 2;
  }
  .hr-row.past .hr-tick {
    background: var(--blue);
    border-color: var(--blue);
  }
  .hr-row.current .hr-tick {
    background: var(--blue);
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.18);
  }
  .hr-now-dot {
    position: absolute;
    left: 50%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--blue);
    border: 3px solid var(--white);
    transform: translate(-50%, -50%);
    z-index: 4;
    animation: pulse-now 2s ease-in-out infinite;
  }
  @keyframes pulse-now {
    0%, 100% { box-shadow: 0 0 0 2px var(--blue), 0 0 10px rgba(74, 144, 226, 0.4); }
    50%      { box-shadow: 0 0 0 4px var(--blue), 0 0 18px rgba(74, 144, 226, 0.65); }
  }
  .hr-items {
    padding: 6px 0 6px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .hr-row .tl-row { margin-bottom: 0; }
  .hr-empty {
    display: flex;
    align-items: center;
    height: 100%;
    min-height: 36px;
    padding: 0 6px;
  }
  .hr-empty-line {
    flex: 1;
    height: 1px;
    border-top: 1px dotted var(--border);
    opacity: 0.6;
  }
  .hr-row.past.gap .hr-empty-line { opacity: 0.3; }
  .hr-row.past.gap .hr-label { opacity: 0.5; }
  .hr-row.current .hr-label { color: var(--blue); font-weight: 800; }

  .tl-status-icon {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tl-status-icon svg { width: 14px; height: 14px; }
  .tl-status-done {
    background: var(--green-light);
    color: var(--green-m);
  }
  .tl-status-missed {
    background: var(--slate-100);
    color: var(--slate-400);
  }

  .tl-tag { display: none; }

  /* ---------- Day View ---------- */
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    margin-bottom: 16px;
  }
  .day-nav .mid {
    text-align: center;
    flex: 1;
    font-weight: 700;
    color: var(--gray-900);
    font-size: 14px;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--slate-100);
    color: var(--gray-900);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn.flip svg { transform: rotate(180deg); }

  .hour-grid {
    position: relative;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 12px 12px 56px;
    overflow: hidden;
  }
  .hour-row {
    position: relative;
    height: 60px;
    border-top: 1px dashed var(--border);
  }
  .hour-row:first-child { border-top: none; }
  .hour-label {
    position: absolute;
    left: -48px;
    top: -8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--slate-400);
    width: 40px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .hour-block {
    position: absolute;
    left: 6px;
    right: 6px;
    border-radius: 12px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--white);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    border: 2px solid transparent;
  }
  .hour-block:active { transform: scale(0.98); }
  .hour-block .name { line-height: 1.2; }
  .hour-block .time { font-size: 10px; font-weight: 600; opacity: 0.85; }
  .hour-block.active {
    border-color: var(--white);
    box-shadow: 0 0 0 2px var(--blue), 0 6px 16px rgba(74,144,226,0.25);
  }
  .now-line {
    position: absolute;
    left: 56px;
    right: 0;
    height: 2px;
    background: var(--coral);
    z-index: 5;
    pointer-events: none;
  }
  .now-line::before {
    content: "";
    position: absolute;
    left: -8px;
    top: -4px;
    width: 10px;
    height: 10px;
    background: var(--coral);
    border-radius: 50%;
  }
  .now-line .label {
    position: absolute;
    left: -52px;
    top: -10px;
    background: var(--coral);
    color: var(--white);
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Week View ---------- */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  @media (max-width: 700px) {
    .week-grid { grid-template-columns: repeat(7, minmax(110px, 1fr)); overflow-x: auto; padding-bottom: 8px; }
  }
  .week-day {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 10px;
    cursor: pointer;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s, transform 0.15s;
  }
  .week-day:hover { border-color: var(--slate-400); }
  .week-day:active { transform: scale(0.99); }
  .week-day.today {
    border-color: var(--blue);
    background: var(--blue-light);
    border-width: 1.5px;
  }
  .week-day .dow {
    font-size: 11px;
    font-weight: 800;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .week-day .num {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1;
  }
  .week-day.today .num { color: var(--blue); }
  .week-day .blocks { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .week-block {
    padding: 5px 7px;
    border-radius: 7px;
    font-size: 10px;
    font-weight: 700;
    color: var(--white);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }
  .week-block.done { opacity: 0.5; text-decoration: line-through; }
  .week-day .more { font-size: 10px; color: var(--gray-500); font-weight: 700; padding: 2px 7px; }
  .week-day .progress {
    margin-top: auto;
    height: 4px;
    background: var(--slate-100);
    border-radius: 4px;
    overflow: hidden;
  }
  .week-day .progress > span {
    display: block;
    height: 100%;
    background: var(--green-m);
    border-radius: 4px;
    transition: width 0.3s;
  }

  /* ---------- Month View ---------- */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .month-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 0 4px;
  }
  .month-cell {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 6px;
    aspect-ratio: 1 / 1.05;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    transition: border-color 0.2s;
    overflow: hidden;
  }
  .month-cell:hover { border-color: var(--slate-400); }
  .month-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .month-cell .num {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-900);
  }
  .month-cell.today { border-color: var(--blue); border-width: 1.5px; background: var(--blue-light); }
  .month-cell.today .num { color: var(--blue); }
  .month-cell.other { opacity: 0.4; }
  .month-cell .dots {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: auto;
  }
  .month-cell .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  @media (max-width: 600px) {
    .month-cell { padding: 6px 4px; border-radius: 10px; }
    .month-cell .num { font-size: 12px; }
    .month-cell .dot { width: 5px; height: 5px; }
  }

  /* ---------- Setup View ---------- */
  .setup-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .setup-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .setup-item .meta { flex: 1; min-width: 0; }
  .setup-item .name { font-weight: 700; font-size: 15px; color: var(--gray-900); }
  .setup-item .sub { color: var(--gray-500); font-size: 12px; font-weight: 600; margin-top: 2px; }
  .setup-item .row-actions { display: flex; gap: 6px; }

  .empty-state {
    background: var(--white);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 36px 20px;
    text-align: center;
    color: var(--gray-500);
  }
  .empty-state .title { font-weight: 700; font-size: 16px; color: var(--gray-900); margin-bottom: 6px; }
  .empty-state .desc { font-size: 14px; }

  /* ---------- Bottom Nav ---------- */
  .bottom-nav {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--white);
    border-radius: 999px;
    padding: 6px;
    display: flex;
    gap: 2px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    z-index: 35;
    max-width: calc(100vw - 24px);
  }
  .nav-btn {
    border: none;
    background: transparent;
    padding: 10px 14px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--gray-500);
    font-weight: 700;
    font-size: 13px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:hover { color: var(--gray-900); }
  .nav-btn.active {
    background: var(--gray-900);
    color: var(--white);
  }
  .nav-btn svg { width: 18px; height: 18px; }
  @media (max-width: 560px) {
    .nav-btn { padding: 10px 12px; }
    .nav-btn .nav-label { display: none; }
    .nav-btn.active .nav-label { display: inline; }
  }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn 0.2s;
  }
  .modal-backdrop[hidden] { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--white);
    border-radius: var(--radius-xl);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease-out;
    box-shadow: var(--shadow-lg);
  }
  .modal-lg { max-width: 560px; }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 1;
  }
  .modal-header .title { font-weight: 800; font-size: 17px; color: var(--gray-900); }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    position: sticky;
    bottom: 0;
    background: var(--white);
  }

  /* ---------- Timer Modal ---------- */
  .timer-modal { max-width: 420px; padding: 0; }
  .timer-body { padding: 28px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .timer-header-row {
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    text-align: left;
  }
  .timer-header-meta { flex: 1; min-width: 0; }
  .timer-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .timer-sub { color: var(--gray-500); font-weight: 700; font-size: 13px; margin-top: 2px; }
  .timer-actions { width: 100%; }

  .timer-ring-wrap {
    position: relative;
    width: min(240px, 70vw);
    height: min(240px, 70vw);
    aspect-ratio: 1;
    margin: 8px 0;
  }
  .timer-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
  .timer-ring .bg { stroke: var(--slate-100); }
  .timer-ring .fg {
    stroke: var(--blue);
    transition: stroke-dashoffset 0.4s linear, stroke 0.4s;
    stroke-linecap: round;
  }
  .timer-ring-wrap.warn .fg { stroke: var(--yellow); }
  .timer-ring-wrap.crit .fg { stroke: var(--coral); }

  .timer-readout {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .timer-readout .num {
    font-size: 40px;
    font-weight: 800;
    color: var(--gray-900);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .timer-readout .lbl {
    font-size: 12px;
    color: var(--gray-500);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .timer-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pre-timer {
    padding: 22px;
    text-align: center;
    background: var(--slate-100);
    border-radius: var(--radius);
    width: 100%;
  }
  .pre-timer .big {
    font-size: 32px;
    font-weight: 800;
    color: var(--gray-900);
    font-variant-numeric: tabular-nums;
  }
  .pre-timer .small { color: var(--gray-500); font-weight: 700; font-size: 13px; margin-top: 4px; }

  /* ---------- Form ---------- */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 8px;
  }
  .form-help {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 4px;
    font-weight: 600;
  }
  .input, .select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-900);
    background: var(--white);
    transition: border-color 0.2s;
  }
  .input:focus, .select:focus { outline: none; border-color: var(--blue); }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--gray-900);
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 13px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { border-color: var(--slate-400); }
  .chip.active {
    background: var(--gray-900);
    color: var(--white);
    border-color: var(--gray-900);
  }

  /* Color picker (edit modal) */
  .color-picker {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .color-swatch {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--white);
    box-shadow: 0 0 0 1.5px var(--border);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    padding: 0;
    position: relative;
  }
  .color-swatch:hover {
    transform: scale(1.06);
    box-shadow: 0 0 0 1.5px var(--slate-400);
  }
  .color-swatch.active {
    box-shadow: 0 0 0 2px var(--white), 0 0 0 4px var(--gray-900);
  }
  .color-swatch.default {
    background: repeating-conic-gradient(var(--slate-100) 0% 25%, var(--white) 0% 50%) 50% / 8px 8px;
    color: var(--gray-500);
    display: flex; align-items: center; justify-content: center;
  }
  .color-swatch.default .default-mark { display: flex; }
  .color-swatch.default .default-mark svg { width: 16px; height: 16px; }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) { .icon-grid { grid-template-columns: repeat(5, 1fr); } }
  .icon-pick {
    aspect-ratio: 1;
    background: var(--slate-100);
    border: 1.5px solid transparent;
    border-radius: 12px;
    color: var(--gray-600);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .icon-pick:hover { background: var(--border); }
  .icon-pick svg { width: 22px; height: 22px; }
  .icon-pick.active {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue);
  }

  .toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    background: var(--slate-100);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .toggle .lbl { font-weight: 700; font-size: 14px; color: var(--gray-900); }
  .toggle .desc { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-top: 2px; }
  .toggle .meta { flex: 1; padding-right: 12px; }
  .switch {
    position: relative;
    width: 44px;
    height: 26px;
    background: var(--border);
    border-radius: 999px;
    border: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: var(--white);
    border-radius: 50%;
    transition: left 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .switch.on { background: var(--blue); }
  .switch.on::after { left: 21px; }

  .day-toggles {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .day-toggle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-weight: 700;
    font-size: 12px;
    color: var(--gray-600);
    transition: all 0.2s;
  }
  .day-toggle.on {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }

  /* ---------- Toast ---------- */
  .toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    width: calc(100% - 32px);
    max-width: 420px;
  }
  .toast {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s ease-out;
    pointer-events: auto;
    border-left: 4px solid var(--blue);
  }
  .toast.warn { border-left-color: var(--orange); }
  .toast.alert { border-left-color: var(--coral); }
  @keyframes toastIn {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .toast .meta { flex: 1; min-width: 0; }
  .toast .title { font-weight: 700; font-size: 14px; color: var(--gray-900); line-height: 1.3; }
  .toast .body { font-size: 12px; color: var(--gray-500); font-weight: 600; margin-top: 2px; }
  .toast .icon-wrap {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--blue-light);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .toast.warn .icon-wrap { background: var(--yellow-light); color: var(--orange-d); }
  .toast.alert .icon-wrap { background: var(--red-light); color: var(--coral); }
  .toast .icon-wrap svg { width: 18px; height: 18px; }

  /* ---------- Misc ---------- */
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--slate-100);
    color: var(--slate-700);
    font-size: 11px;
    font-weight: 700;
  }
  .pill.live { background: var(--red-light); color: var(--coral); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulseDot 1.5s ease-in-out infinite; }
  @keyframes pulseDot { 50% { opacity: 0.3; } }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .focus-trap { outline: none; }

  /* Hide scroll on horizontal containers */
  .week-grid::-webkit-scrollbar { height: 6px; }
  .week-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  /* ============================================================
     HERO CURRENT-ACTIVITY CARD (Today view)
     ============================================================ */
  .current-card.hero {
    border-radius: 24px;
    border: 1.5px solid;
    padding: 18px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .current-card.hero:hover { transform: translateY(-1px); }
  .current-card.hero .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .current-card.hero .hero-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .current-card.hero .hero-pill .dot.pulse {
    animation: hero-pulse 1.6s ease-in-out infinite;
  }
  @keyframes hero-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.6); opacity: 0.5; }
  }
  .current-card.hero .hero-row {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 14px;
  }
  .current-card.hero .hero-meta { flex: 1; min-width: 0; }
  .current-card.hero .hero-title {
    font-size: 26px;
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .current-card.hero .hero-sub {
    font-size: 13px; font-weight: 700; color: var(--gray-500);
    margin-bottom: 6px;
  }
  .current-card.hero .hero-remaining {
    font-size: 15px; font-weight: 800; color: var(--gray-900);
    font-variant-numeric: tabular-nums;
  }
  .current-card.hero .hero-progress {
    height: 6px;
    background: rgba(255,255,255,0.55);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .current-card.hero .hero-progress > span {
    display: block; height: 100%; border-radius: 999px;
    transition: width 0.6s ease;
  }
  .current-card.hero .actions {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .current-card.hero .actions .btn { flex: 1; min-width: 140px; }
  @media (max-width: 480px) {
    .current-card.hero .hero-title { font-size: 22px; }
    .current-card.hero .act-icon.xl { width: 76px; height: 76px; border-radius: 22px; }
    .current-card.hero .act-icon.xl svg { width: 38px; height: 38px; }
  }
  /* ==========================================================
     SMALL MOBILE (≤420px) — tighten layout for narrow phones
     ========================================================== */
  @media (max-width: 420px) {
    /* App padding */
    .view { padding: 0 14px; }
    #app { padding-bottom: 100px; }

    /* Header */
    .app-header {
      padding: calc(env(safe-area-inset-top, 0px) + 14px) calc(env(safe-area-inset-right, 0px) + 16px) 14px calc(env(safe-area-inset-left, 0px) + 16px);
      border-radius: 0 0 22px 22px;
    }
    .app-logo { height: 42px; }
    .clock-pill { padding: 6px 10px; font-size: 12px; }

    /* Day nav pill */
    .day-nav .mid { font-size: 13px; min-width: 0; padding: 0 6px; }
    .day-nav .icon-btn { width: 32px; height: 32px; }
    .day-nav .icon-btn svg { width: 16px; height: 16px; }

    /* Hero card – tighten */
    .current-card.hero { padding: 14px; border-radius: 20px; }
    .current-card.hero .hero-row { gap: 12px; }
    .current-card.hero .hero-pill { font-size: 10px; padding: 4px 10px; margin-bottom: 10px; }
    .current-card.hero .act-icon.xl { width: 64px; height: 64px; border-radius: 18px; }
    .current-card.hero .act-icon.xl svg { width: 32px; height: 32px; }
    .current-card.hero .hero-title { font-size: 19px; }
    .current-card.hero .hero-sub { font-size: 12px; }
    .current-card.hero .hero-remaining { font-size: 13px; }
    .current-card.hero .actions .btn { min-width: 0; padding: 10px 12px; font-size: 13px; }

    /* Plan header / auto-follow */
    .plan-header { gap: 6px; }
    .plan-header .plan-controls { gap: 8px; flex-wrap: wrap; }
    .follow-toggle { padding: 5px 6px 5px 10px; font-size: 11px; }
    .follow-toggle .ft-state { font-size: 9px; padding: 2px 6px; }
    .plan-header .plan-count { font-size: 11px; }

    /* Hour rail – shrink time column */
    .hr-row { grid-template-columns: 40px 16px 1fr; }
    .hr-row .hr-label { font-size: 11px; padding-right: 8px; }
    .hr-items { padding-left: 8px; }
    .tl-card { padding: 10px; gap: 10px; }
    .tl-card .title { font-size: 14px; }
    .tl-card .sub { font-size: 11px; }
    .tl-tag, .now-tag { font-size: 8px; padding: 2px 6px; }

    /* Next-up strip */
    .nextup-strip { padding: 8px 10px; gap: 8px; }
    .nextup-strip .nu-name { font-size: 13px; }
    .nextup-strip .nu-time { font-size: 11px; }

    /* Modals */
    .modal { max-width: calc(100vw - 24px); margin: 12px; border-radius: 20px; }
    .modal-body { padding: 16px; }
    .modal-header, .modal-footer { padding: 12px 16px; }
    .timer-modal .timer-body { padding: 18px 16px 16px; }
    .timer-modal .timer-title { font-size: 18px; }
    .timer-readout .num { font-size: 32px; }

    /* Onboarding modal */
    .onboarding-modal { padding: 22px 18px; }
    .onboarding-modal .ob-title { font-size: 19px; }
    .onboarding-modal .ob-list li { padding: 8px 10px; gap: 10px; }
    .onboarding-modal .ob-list .dot { width: 32px; height: 32px; border-radius: 10px; }
    .onboarding-modal .ob-list div { font-size: 12px; }

    /* PIN gate */
    .pin-gate { margin: 24px auto; padding: 22px 16px; border-radius: 20px; }
    .pin-gate .pin-title { font-size: 19px; }
    .pin-gate .pin-input { font-size: 22px; padding: 12px 8px; letter-spacing: 0.4em; }

    /* Setup */
    .parent-banner { padding: 10px 12px; }
    .toolbar .btn { font-size: 12px; padding: 8px 10px; }
    .setup-item { padding: 10px; gap: 10px; }
    .setup-item .name { font-size: 13px; }
    .setup-item .sub { font-size: 11px; }

    /* Day chips */
    .day-chip { min-width: 0; padding: 6px 10px; font-size: 11px; }

    /* Section labels */
    .plan-header .plan-title, .section-label { font-size: 11px; }
  }

  /* ============================================================
     COMPACT NEXT-UP STRIP (Today view)
     ============================================================ */
  .nextup-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--white);
    margin-bottom: 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .nextup-strip:hover { border-color: var(--slate-400); }
  .nextup-strip:active { transform: scale(0.99); }
  .nextup-strip .nu-label {
    font-size: 10px; font-weight: 800;
    color: var(--gray-500); text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .nextup-strip .nu-icon {
    width: 28px; height: 28px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .nextup-strip .nu-icon svg { width: 16px; height: 16px; }
  .nextup-strip .nu-name {
    flex: 1;
    font-size: 14px; font-weight: 700; color: var(--gray-900);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .nextup-strip .nu-time {
    font-size: 12px; font-weight: 700; color: var(--gray-500);
    font-variant-numeric: tabular-nums;
  }

  /* ============================================================
     PLAN HEADER + AUTO-FOLLOW TOGGLE
     ============================================================ */
  .plan-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    margin: 6px 0 12px;
    flex-wrap: wrap;
  }
  .plan-header .plan-title {
    font-size: 13px; font-weight: 800;
    color: var(--gray-700, #475569);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .plan-header .plan-controls {
    display: flex; align-items: center; gap: 12px;
  }
  .plan-header .plan-count {
    font-size: 12px; font-weight: 700; color: var(--gray-500);
  }
  .follow-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 6px 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    background: var(--white);
    font-size: 12px; font-weight: 700;
    color: var(--gray-500);
    cursor: pointer;
    transition: all 0.2s;
  }
  .follow-toggle .ft-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--slate-400);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .follow-toggle .ft-label {
    font-weight: 700;
  }
  .follow-toggle .ft-state {
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--slate-100);
    color: var(--gray-500);
    letter-spacing: 0.08em;
    transition: background 0.2s, color 0.2s;
  }
  .follow-toggle.on {
    color: var(--blue);
    border-color: var(--blue);
    background: rgba(74, 144, 226, 0.06);
  }
  .follow-toggle.on .ft-dot {
    background: var(--blue);
    box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.18);
  }
  .follow-toggle.on .ft-state {
    background: var(--blue);
    color: var(--white);
  }

  /* ============================================================
     ACTIVE-NOW TAG (timeline row)
     ============================================================ */
  .now-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 9px; font-weight: 800;
    color: var(--white);
    text-transform: uppercase; letter-spacing: 0.1em;
    vertical-align: middle;
  }
  .now-tag svg { width: 9px; height: 9px; }
  .tl-now-side {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 6px; flex-shrink: 0; margin-left: 8px;
  }
  .tl-remaining {
    font-size: 13px; font-weight: 800;
    color: var(--gray-900);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .tl-row.active .tl-card {
    animation: tl-active-pulse 2.4s ease-in-out infinite;
  }
  @keyframes tl-active-pulse {
    0%, 100% { transform: translateZ(0); }
    50%      { transform: translateY(-1px); }
  }

  /* ============================================================
     PIN GATE
     ============================================================ */
  .pin-gate {
    max-width: 400px;
    margin: 40px auto;
    padding: 28px 22px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 24px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .pin-gate .pin-icon {
    width: 64px; height: 64px; border-radius: 20px;
    background: var(--blue-light, rgba(74,144,226,0.12));
    color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .pin-gate .pin-icon svg { width: 30px; height: 30px; }
  .pin-gate .pin-title {
    font-size: 22px; font-weight: 800; color: var(--gray-900);
    margin-bottom: 4px;
  }
  .pin-gate .pin-desc {
    font-size: 14px; color: var(--gray-500); font-weight: 600;
    margin-bottom: 20px;
  }
  .pin-gate .pin-input {
    width: 100%;
    text-align: center;
    font-size: 28px; font-weight: 700;
    letter-spacing: 0.5em;
    padding: 14px 12px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    background: var(--slate-50, #f8fafc);
    color: var(--gray-900);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .pin-gate .pin-input:focus {
    border-color: var(--blue);
    background: var(--white);
  }
  .pin-gate .pin-error {
    color: var(--coral);
    font-size: 13px; font-weight: 700;
    min-height: 18px;
    margin-top: 10px;
  }
  .pin-gate .pin-actions {
    display: flex; justify-content: center;
    margin-top: 14px;
  }
  .pin-gate .pin-actions .btn { min-width: 160px; }
  .pin-gate .pin-hint {
    margin-top: 18px;
    font-size: 12px; color: var(--gray-500); font-weight: 600;
  }

  /* ============================================================
     PARENT BANNER
     ============================================================ */
  .parent-banner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 14px;
  }
  .parent-banner .meta { flex: 1; min-width: 0; }
  .parent-banner .title {
    font-size: 14px; font-weight: 800; color: var(--gray-900);
  }
  .parent-banner .sub {
    font-size: 12px; font-weight: 600; color: var(--gray-500);
    margin-top: 2px;
  }

  /* ============================================================
     COPY SCHEDULE MODAL
     ============================================================ */
  .day-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 6px;
  }
  .day-chip {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    background: var(--white);
    font-size: 12px; font-weight: 700;
    color: var(--gray-700, #4b5563);
    cursor: pointer;
    transition: all 0.18s;
    min-width: 50px;
  }
  .day-chip:hover { border-color: var(--slate-400); }
  .day-chip.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }
  .copy-summary {
    margin-top: 8px;
    font-size: 12px; font-weight: 700; color: var(--gray-500);
  }
  .copy-help {
    margin-top: 12px;
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 12px;
    background: var(--slate-50, #f8fafc);
    border-radius: 12px;
    font-size: 12px; font-weight: 600; color: var(--gray-500);
  }
  .copy-help svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

  /* ============================================================
     MANAGE CATEGORIES MODAL
     ============================================================ */
  .cat-list {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .cat-row {
    display: flex; align-items: center;
    gap: 10px;
  }
  .cat-row .cat-name {
    flex: 1;
    min-width: 0;
  }
  .cat-row .cat-count {
    font-size: 11px; font-weight: 700;
    color: var(--gray-500);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-row .icon-btn {
    flex-shrink: 0;
    color: var(--gray-500);
  }
  .cat-row .icon-btn:hover {
    color: var(--coral);
    background: var(--red-light);
  }
  @media (max-width: 420px) {
    .cat-row { gap: 6px; }
    .cat-row .cat-count { font-size: 10px; }
  }

  /* ============================================================
     ONBOARDING MODAL
     ============================================================ */
  .onboarding-modal {
    max-width: 460px;
    padding: 28px 24px;
    text-align: center;
  }
  .onboarding-modal .ob-hero {
    width: 72px; height: 72px; border-radius: 22px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .onboarding-modal .ob-hero svg { width: 38px; height: 38px; }
  .onboarding-modal .ob-title {
    font-size: 22px; font-weight: 800; color: var(--gray-900);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .onboarding-modal .ob-title .mark {
    background: var(--yellow);
    padding: 0 6px;
    border-radius: 6px;
  }
  .onboarding-modal .ob-sub {
    font-size: 14px; color: var(--gray-500); font-weight: 600;
    margin-bottom: 18px;
  }
  .onboarding-modal .ob-list {
    list-style: none; padding: 0; margin: 0 0 20px;
    text-align: left;
    display: flex; flex-direction: column; gap: 12px;
  }
  .onboarding-modal .ob-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: var(--slate-50, #f8fafc);
    border-radius: 14px;
  }
  .onboarding-modal .ob-list .dot {
    width: 36px; height: 36px; border-radius: 12px;
    background: var(--white);
    color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .onboarding-modal .ob-list .dot svg { width: 18px; height: 18px; }
  .onboarding-modal .ob-list b {
    font-weight: 800; color: var(--gray-900);
  }
  .onboarding-modal .ob-list div {
    font-size: 13px; font-weight: 600; color: var(--gray-700, #475569);
    line-height: 1.4;
  }
  .onboarding-modal .ob-actions {
    display: flex; justify-content: center;
  }
  .onboarding-modal .ob-actions .btn { min-width: 160px; }

  /* ============================================================
     WARN BADGE (used in confirmActionHTML)
     ============================================================ */
  .warn-badge {
    width: 32px; height: 32px; border-radius: 10px;
    background: rgba(255, 159, 28, 0.16);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .warn-badge svg { width: 18px; height: 18px; }

  /* ============================================================
     END
     ============================================================ */
</style>
</head>

const HEADER_LOGO_URL = 'data:image/webp;base64,' + HEADER_LOGO_B64;

(function setupAppIcon() {
  function setLink(rel, href, attrs) {
    let el = document.querySelector(`link[rel="${rel}"]`);
    if (!el) {
      el = document.createElement('link');
      el.rel = rel;
      document.head.appendChild(el);
    }
    el.href = href;
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
  }
  setLink('icon', APP_ICON_URL, { type: 'image/png', sizes: '192x192' });
  setLink('apple-touch-icon', APP_ICON_URL, { sizes: '192x192' });

  /* Build manifest as a Blob so we don't have to base64-double-encode */
  const manifest = {
    name: "I'M ON! Tiny Tasks",
    short_name: "Tiny Tasks",
    description: "A calm visual routine for your child.",
    start_url: "./",
    scope: "./",
    display: "standalone",
    orientation: "portrait",
    background_color: "#F7F8FA",
    theme_color: "#4A90E2",
    icons: [
      { src: APP_ICON_URL, sizes: "192x192", type: "image/png", purpose: "any" },
      { src: APP_ICON_URL, sizes: "512x512", type: "image/png", purpose: "any" }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    setLink('manifest', URL.createObjectURL(blob));
  } catch(e) { /* manifest is best-effort */ }

  /* Fill any <img.app-logo> in the document */
  document.querySelectorAll('img.app-logo').forEach(img => { img.src = HEADER_LOGO_URL; });
})();

/* ============================================================
   DISABLE PINCH / DOUBLE-TAP ZOOM
   ============================================================ */
(function disableZoom() {
  /* iOS Safari ignores user-scalable=no in normal browser mode but fires
     gesturestart/change/end for pinches — preventDefault on those blocks zoom. */
  ['gesturestart', 'gesturechange', 'gestureend'].forEach(evt => {
    document.addEventListener(evt, e => e.preventDefault(), { passive: false });
  });

  /* Block multi-touch zoom on touch devices that don't fire gesture events */
  document.addEventListener('touchmove', e => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  /* Belt-and-suspenders double-tap zoom blocker for iOS Safari.
     touch-action:manipulation handles most cases but not text/link selections. */
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 350) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  /* Lock browser zoom level via Ctrl/Cmd + scroll on desktop */
  document.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) e.preventDefault();
  }, { passive: false });

  /* Lock keyboard zoom shortcuts on desktop (Cmd/Ctrl with +/-/0) */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && ['=','+','-','_','0'].includes(e.key)) {
      e.preventDefault();
    }
  });
})();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed.activities)) state.activities = parsed.activities;
      else state.activities = JSON.parse(JSON.stringify(DEFAULT_ACTIVITIES));
      state.completions = parsed.completions || {};
      if (Array.isArray(parsed.categories) && parsed.categories.length) {
        state.categories = parsed.categories;
      } else {
        state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
      }
      if (parsed.prefs && typeof parsed.prefs === 'object') {
        state.prefs = Object.assign({}, state.prefs, parsed.prefs);
      }
    } else {
      state.activities = JSON.parse(JSON.stringify(DEFAULT_ACTIVITIES));
      state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
      state.completions = {};
    }
  } catch (e) {
    state.activities = JSON.parse(JSON.stringify(DEFAULT_ACTIVITIES));
    state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    state.completions = {};
  }
  /* Migrations:
     1. Strip flexible-block / tasks fields from any legacy activity.
     2. If activity has no explicit color, give it one based on its legacy category. */
  state.activities = state.activities.map(a => {
    const { type, tasks, ...rest } = a;
    if (!rest.color) rest.color = LEGACY_CATEGORY_COLORS[rest.category] || FALLBACK_COLOR;
    return rest;
  });
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      activities: state.activities,
      categories: state.categories,
      completions: state.completions,
      prefs: state.prefs
    }));
  } catch (e) { console.warn('Save failed', e); }
}

function dateKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function parseHM(str) {
  const [h, m] = (str || '00:00').split(':').map(Number);
  return h * 60 + m;
}
function fmtHM(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return `${pad2(h)}:${pad2(m)}`;
}
function fmtTime12(min) {
  let h = Math.floor(min / 60), m = min % 60;
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${pad2(m)} ${ap}`;
}
function fmtRange(s, e) { return `${fmtTime12(parseHM(s))} – ${fmtTime12(parseHM(e))}`; }
function nowMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes() + d.getSeconds()/60;
}
function fmtRemaining(min) {
  if (min <= 0) return 'now';
  if (min < 1) return 'less than a minute';
  if (min < 60) return `${Math.ceil(min)} min`;
  const h = Math.floor(min/60); const m = Math.round(min - h*60);
  return m ? `${h}h ${m}m` : `${h}h`;
}
function fmtMMSS(seconds) {
  if (seconds < 0) seconds = 0;
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${pad2(m)}:${pad2(s)}`;
}
function fmtHMS(seconds) {
  if (seconds < 0) seconds = 0;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  return `${h}:${pad2(m)}:${pad2(s)}`;
}

/* ============================================================
   ACTIVITY HELPERS
   ============================================================ */
function categoryOf(id) {
  return state.categories.find(c => c.id === id)
      || state.categories[state.categories.length - 1]
      || { id: 'custom', label: 'Custom' };
}
/* Returns the activity's display info: { label, color }.
   Color comes from the activity itself (categories no longer carry colors). */
function catDisplay(act) {
  const base = categoryOf(act ? act.category : null);
  return {
    id: base.id,
    label: base.label,
    color: (act && act.color) || FALLBACK_COLOR
  };
}
function hexRgba(hex, a) {
  const h = hex.replace('#','');
  const r = parseInt(h.substr(0,2),16);
  const g = parseInt(h.substr(2,2),16);
  const b = parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
}
/* Returns true if the given hex color is light (would benefit from dark text). */
function isLightColor(hex) {
  if (!hex) return false;
  const h = hex.replace('#','');
  const r = parseInt(h.substr(0,2),16);
  const g = parseInt(h.substr(2,2),16);
  const b = parseInt(h.substr(4,2),16);
  return (r*299 + g*587 + b*114) / 1000 >= 165;
}
function isScheduledOn(act, date) {
  const dow = date.getDay(); // 0=Sun..6=Sat
  switch (act.repeat) {
    case 'daily':    return true;
    case 'weekdays': return dow >= 1 && dow <= 5;
    case 'weekends': return dow === 0 || dow === 6;
    case 'custom':   return Array.isArray(act.customDays) && act.customDays.includes(dow);
    default: return true;
  }
}
/* Return Set of weekday indices (0-6) on which an activity is scheduled */
function daysScheduledFor(act) {
  const out = new Set();
  switch (act.repeat) {
    case 'daily':    [0,1,2,3,4,5,6].forEach(d => out.add(d)); break;
    case 'weekdays': [1,2,3,4,5].forEach(d => out.add(d)); break;
    case 'weekends': [0,6].forEach(d => out.add(d)); break;
    case 'custom':
      (act.customDays || []).forEach(d => out.add(d));
      break;
    default: [0,1,2,3,4,5,6].forEach(d => out.add(d));
  }
  return out;
}
/* Return list of activities that overlap with the given activity
   on at least one shared scheduled weekday. Excludes the activity itself. */
function findStrictOverlaps(target) {
  const tStart = parseHM(target.startTime);
  const tEnd = parseHM(target.endTime);
  const tDays = daysScheduledFor(target);
  const conflicts = [];
  for (const other of state.activities) {
    if (other.id === target.id) continue;
    const oDays = daysScheduledFor(other);
    let shareDay = false;
    for (const d of tDays) { if (oDays.has(d)) { shareDay = true; break; } }
    if (!shareDay) continue;
    const oStart = parseHM(other.startTime);
    const oEnd = parseHM(other.endTime);
    if (oStart < tEnd && oEnd > tStart) {
      const sharedDayLabels = [...tDays].filter(d => oDays.has(d)).sort().map(d => DAY_LABELS[d]).join(', ');
      conflicts.push({ other, sharedDayLabels });
    }
  }
  return conflicts;
}
function activitiesForDate(date) {
  return state.activities
    .filter(a => isScheduledOn(a, date))
    .slice()
    .sort((a, b) => parseHM(a.startTime) - parseHM(b.startTime));
}
function statusFor(act, date, nowMin) {
  const key = dateKey(date);
  const done = (state.completions[key] || []).includes(act.id);
  if (done) return 'done';
  const today = new Date();
  if (!isSameDay(date, today)) {
    if (date < today) return 'missed';
    return 'upcoming';
  }
  const s = parseHM(act.startTime);
  const e = parseHM(act.endTime);
  if (nowMin < s) return 'upcoming';
  if (nowMin >= e) return 'missed';
  return 'active';
}
function getActiveActivity(date, nowMin) {
  if (!isSameDay(date, new Date())) return null;
  return activitiesForDate(date).find(a => {
    const s = parseHM(a.startTime), e = parseHM(a.endTime);
    return nowMin >= s && nowMin < e && !(state.completions[dateKey(date)] || []).includes(a.id);
  }) || null;
}
function getNextActivity(date, nowMin) {
  if (!isSameDay(date, new Date())) return null;
  return activitiesForDate(date).find(a => parseHM(a.startTime) > nowMin) || null;
}
function isCompleted(actId, date) {
  return (state.completions[dateKey(date)] || []).includes(actId);
}
function toggleCompletion(actId, date) {
  const key = dateKey(date);
  const list = state.completions[key] || [];
  const idx = list.indexOf(actId);
  if (idx >= 0) list.splice(idx, 1);
  else list.push(actId);
  state.completions[key] = list;
  saveState();
}
function resetDay(date) {
  const key = dateKey(date);
  delete state.completions[key];
  saveState();
}

function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function escape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function iconChip(icon, category, size='md', colorOverride) {
  const color = colorOverride || FALLBACK_COLOR;
  const dark = isLightColor(color);
  const cls = 'act-icon ' + (size === 'sm' ? 'sm' : size === 'lg' ? 'lg' : size === 'xs' ? 'xs' : size === 'xl' ? 'xl' : '') + (dark ? ' dark-text' : '');
  return `<div class="${cls}" style="background:${color}">${I[icon] || I.smile}</div>`;
}

/* ============================================================
   TODAY VIEW
   ============================================================ */
const TODAY_START_HOUR = 6;
const TODAY_END_HOUR = 22;

function renderToday() {
  const main = document.getElementById('mainView');
  const today = new Date();
  const date = state.selectedDate || today;
  const isToday = isSameDay(date, today);
  const nowMin = nowMinutes();
  const acts = activitiesForDate(date);
  const active = isToday ? getActiveActivity(date, nowMin) : null;
  const next   = isToday ? getNextActivity(date, nowMin)   : null;
  const doneCount = acts.filter(a => isCompleted(a.id, date)).length;

  /* Header label */
  const dateLabel = isToday
    ? `Today, ${MONTH_LABELS[date.getMonth()]} ${date.getDate()}`
    : `${DAY_LABELS_FULL[date.getDay()]}, ${MONTH_LABELS[date.getMonth()]} ${date.getDate()}`;

  let html = `
    <div class="day-nav">
      <button class="icon-btn" data-action="today-shift" data-delta="-1" aria-label="Previous day">${I.arrow}</button>
      <div class="mid">${dateLabel}</div>
      <button class="icon-btn flip" data-action="today-shift" data-delta="1" aria-label="Next day">${I.arrow}</button>
    </div>`;

  if (!isToday) {
    html += `<div style="display:flex;justify-content:center;margin-bottom:14px">
      <button class="btn btn-soft btn-sm" data-action="today-jump">${I.navToday}<span>Jump to today</span></button>
    </div>`;
  }

  /* CURRENT ACTIVITY — strongest visual element */
  if (isToday) {
    if (active) {
      const cat = catDisplay(active);
      const e = parseHM(active.endTime);
      const s = parseHM(active.startTime);
      const total = e - s;
      const elapsedMin = Math.max(0, nowMin - s);
      const remaining = e - nowMin;
      const endingSoon = remaining <= 3;
      const progPct = total > 0 ? Math.min(100, (elapsedMin / total) * 100) : 0;
      html += `
        <div class="current-card hero ${endingSoon ? 'ending-soon' : ''}"
             style="background:linear-gradient(135deg, ${hexRgba(cat.color, 0.18)}, ${hexRgba(cat.color, 0.10)});border-color:${hexRgba(cat.color, 0.55)};box-shadow:0 14px 40px ${hexRgba(cat.color, 0.22)}"
             data-action="open-timer" data-activity-id="${active.id}">
          <div class="hero-pill" style="background:${hexRgba(cat.color, 0.22)};color:${cat.color}">
            <span class="dot pulse" style="background:${cat.color}"></span>
            <span>${endingSoon ? 'Almost done' : 'Happening now'}</span>
          </div>
          <div class="hero-row">
            ${iconChip(active.icon, active.category, 'xl', active.color)}
            <div class="hero-meta">
              <div class="hero-title">${escape(active.name)}</div>
              <div class="hero-sub">${fmtRange(active.startTime, active.endTime)}</div>
              <div class="hero-remaining">${fmtRemaining(remaining)} left</div>
            </div>
          </div>
          <div class="hero-progress"><span style="width:${progPct}%;background:${cat.color}"></span></div>
          <div class="actions">
            <button class="btn btn-primary" data-action="open-timer" data-activity-id="${active.id}">
              ${I.playArr}<span>Start Timer</span>
            </button>
            <button class="btn btn-soft" data-action="mark-done" data-activity-id="${active.id}">
              ${I.check}<span>Mark Done</span>
            </button>
          </div>
        </div>`;
    } else {
      const noActsToday = acts.length === 0;
      const idleCat = next ? catDisplay(next) : null;
      const idleStyle = idleCat
        ? `background:linear-gradient(135deg, ${hexRgba(idleCat.color, 0.16)}, ${hexRgba(idleCat.color, 0.08)});border-color:${hexRgba(idleCat.color, 0.45)}`
        : '';
      const idleIconStyle = idleCat
        ? `background:${hexRgba(idleCat.color, 0.22)};color:${idleCat.color}`
        : 'background:var(--slate-100); color:var(--slate-400)';
      html += `
        <div class="current-card idle" style="${idleStyle}">
          <div class="top">
            <div class="act-icon" style="${idleIconStyle}">${I.cloud}</div>
            <div class="meta">
              <div class="title">${noActsToday ? 'Nothing scheduled today' : 'A quiet moment'}</div>
              <div class="sub">${noActsToday ? 'Add activities in Parent Setup to get started.' : (next ? 'Your next activity is coming up.' : 'All done for today.')}</div>
            </div>
          </div>
        </div>`;
    }

    /* COMPACT next-up strip */
    if (next) {
      const startMin = parseHM(next.startTime);
      const until = startMin - nowMin;
      const cat = catDisplay(next);
      html += `
        <div class="nextup-strip"
             style="background:${hexRgba(cat.color, 0.10)};border-color:${hexRgba(cat.color, 0.40)}"
             data-action="open-timer" data-activity-id="${next.id}">
          <span class="nu-label" style="color:${cat.color}">Next</span>
          <span class="nu-icon" style="background:${hexRgba(cat.color, 0.25)};color:${cat.color}">${I[next.icon] || I.smile}</span>
          <span class="nu-name">${escape(next.name)}</span>
          <span class="nu-time">in ${fmtRemaining(until)}</span>
        </div>`;
    }
  }

  /* Plan label + auto-follow toggle */
  html += `
    <div class="plan-header">
      <div class="plan-title">${isToday ? "Today's plan" : "The plan"}</div>
      <div class="plan-controls">
        ${isToday ? `<button class="follow-toggle ${state.prefs.autoFollow ? 'on' : ''}" data-action="toggle-autofollow" aria-pressed="${state.prefs.autoFollow}">
          <span class="ft-dot"></span>
          <span class="ft-label">Auto-follow</span>
          <span class="ft-state">${state.prefs.autoFollow ? 'ON' : 'OFF'}</span>
        </button>` : ''}
        <span class="plan-count">${doneCount} of ${acts.length} done</span>
      </div>
    </div>`;

  /* Hour-rail timeline */
  html += `<div class="hours-timeline" id="timeline">`;
  for (let h = TODAY_START_HOUR; h <= TODAY_END_HOUR; h++) {
    const hourMin = h * 60;
    const hourEndMin = hourMin + 60;
    const hourActs = acts.filter(a => {
      const s = parseHM(a.startTime);
      return s >= hourMin && s < hourEndMin;
    });
    const isCurrentHour = isToday && nowMin >= hourMin && nowMin < hourEndMin;
    const isPastHour    = isToday && hourEndMin <= nowMin;
    const nowPct = isCurrentHour ? ((nowMin - hourMin) / 60) * 100 : 0;

    let fillStyle = 'display:none';
    if (isPastHour)         fillStyle = 'height:100%';
    else if (isCurrentHour) fillStyle = `height:${nowPct}%`;

    const rowClasses = [
      'hr-row',
      isCurrentHour ? 'current' : '',
      isPastHour ? 'past' : '',
      hourActs.length === 0 ? 'gap' : ''
    ].filter(Boolean).join(' ');

    html += `<div class="${rowClasses}" data-hour="${h}">
      <div class="hr-label">${fmtTime12(hourMin).replace(':00','')}</div>
      <div class="hr-rail">
        <div class="hr-rail-bg"></div>
        <div class="hr-rail-fill" style="${fillStyle}"></div>
        <div class="hr-tick"></div>
        ${isCurrentHour ? `<div class="hr-now-dot" style="top:${nowPct}%"></div>` : ''}
      </div>
      <div class="hr-items">`;

    if (hourActs.length === 0) {
      html += `<div class="hr-empty"><span class="hr-empty-line"></span></div>`;
    } else {
      hourActs.forEach(a => {
        const status = statusFor(a, date, nowMin);
        const cat = catDisplay(a);
        let statusBadge = '';
        if (status === 'done')   statusBadge = `<div class="tl-status-icon tl-status-done">${I.check}</div>`;
        else if (status === 'missed') statusBadge = `<div class="tl-status-icon tl-status-missed">${I.close}</div>`;
        let cardStyle = '';
        if (status === 'active') {
          cardStyle = `background:${hexRgba(cat.color, 0.22)};border-color:${cat.color};border-width:2px;box-shadow:0 8px 22px ${hexRgba(cat.color, 0.32)}`;
        } else if (status !== 'done' && status !== 'missed') {
          cardStyle = `background:${hexRgba(cat.color, 0.10)};border-color:${hexRgba(cat.color, 0.35)}`;
        }
        let rightSide = '';
        if (status === 'active') {
          const aEnd = parseHM(a.endTime);
          const aRemaining = aEnd - nowMin;
          rightSide = `
            <div class="tl-now-side">
              <div class="tl-remaining">${fmtRemaining(aRemaining)} left</div>
              <span class="now-tag" style="background:${cat.color}">${I.playArr}<span>NOW</span></span>
            </div>`;
        } else if (statusBadge) {
          rightSide = statusBadge;
        }
        html += `
          <div class="tl-row ${status}" data-id="${a.id}" data-action="open-timer" data-activity-id="${a.id}">
            <div class="tl-card" style="${cardStyle}">
              ${iconChip(a.icon, a.category, 'sm', a.color)}
              <div class="meta">
                <div class="title">${escape(a.name)}</div>
                <div class="sub">${fmtRange(a.startTime, a.endTime)}</div>
              </div>
              ${rightSide}
            </div>
          </div>`;
      });
    }

    html += `</div></div>`;
  }
  html += `</div>`;

  if (acts.length === 0) {
    html += `<div class="empty-state" style="margin-top:14px">
      <div class="title">No activities for this day</div>
      <div class="desc">${isToday ? 'Head to Parent Setup to add your first routine.' : 'Nothing planned. Add activities in Parent Setup.'}</div>
    </div>`;
  }

  if (doneCount > 0 && isToday) {
    html += `<div style="margin-top:18px;display:flex;justify-content:center">
      <button class="btn btn-ghost btn-sm" data-action="reset-day">${I.reset}<span>Reset today</span></button>
    </div>`;
  }

  main.innerHTML = html;

  /* Auto-follow scroll */
  if (state.prefs.autoFollow) {
    setTimeout(() => {
      let node = null;
      if (active) {
        node = main.querySelector(`.tl-row[data-id="${active.id}"]`);
      } else if (isToday) {
        const curHour = main.querySelector('.hr-row.current');
        if (curHour) node = curHour;
      } else if (acts.length) {
        node = main.querySelector('.tl-row');
      }
      if (node) node.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }
}


/* ============================================================
   WEEK VIEW
   ============================================================ */
function startOfWeek(d) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - x.getDay()); // Sunday
  return x;
}
function renderWeek() {
  const main = document.getElementById('mainView');
  const cursor = state.weekCursor;
  const start = startOfWeek(cursor);
  const today = new Date();

  const monthStart = MONTH_LABELS[start.getMonth()];
  const endDay = new Date(start); endDay.setDate(start.getDate() + 6);
  const monthEnd = MONTH_LABELS[endDay.getMonth()];
  const titleRange = monthStart === monthEnd
    ? `${monthStart} ${start.getDate()} – ${endDay.getDate()}`
    : `${monthStart} ${start.getDate()} – ${monthEnd} ${endDay.getDate()}`;

  let html = `
    <div class="day-nav">
      <button class="icon-btn" data-action="week-shift" data-delta="-7" aria-label="Previous week">${I.arrow}</button>
      <div class="mid">${titleRange}</div>
      <button class="icon-btn flip" data-action="week-shift" data-delta="7" aria-label="Next week">${I.arrow}</button>
    </div>
    <div class="week-grid">`;

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const acts = activitiesForDate(d);
    const todayKey = dateKey(d);
    const completed = (state.completions[todayKey] || []).filter(k => !k.includes(':'));
    const doneCount = acts.filter(a => completed.includes(a.id)).length;
    const isToday = isSameDay(d, today);
    const blocks = acts.slice(0, 3).map(a => {
      const cat = catDisplay(a);
      const isDone = completed.includes(a.id);
      return `<div class="week-block ${isDone?'done':''}"
                style="background:${hexRgba(cat.color, 0.14)};border-left:3px solid ${cat.color};color:var(--gray-900)">${escape(a.name)}</div>`;
    }).join('');
    const more = acts.length > 3 ? `<div class="more">+${acts.length-3} more</div>` : '';
    const pct = acts.length ? Math.round((doneCount/acts.length)*100) : 0;
    html += `
      <div class="week-day ${isToday?'today':''}" data-action="week-pick" data-date="${dateKey(d)}">
        <div class="dow">${DAY_LABELS[d.getDay()]}</div>
        <div class="num">${d.getDate()}</div>
        <div class="blocks">${blocks}${more}</div>
        ${acts.length ? `<div class="progress" title="${doneCount} of ${acts.length} done"><span style="width:${pct}%"></span></div>` : ''}
      </div>`;
  }
  html += `</div>`;

  main.innerHTML = html;
}

/* ============================================================
   MONTH VIEW
   ============================================================ */
function renderMonth() {
  const main = document.getElementById('mainView');
  const c = state.monthCursor;
  const year = c.getFullYear(), month = c.getMonth();
  const today = new Date();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  let html = `
    <div class="day-nav">
      <button class="icon-btn" data-action="month-shift" data-delta="-1" aria-label="Previous month">${I.arrow}</button>
      <div class="mid">${MONTH_LABELS[month]} ${year}</div>
      <button class="icon-btn flip" data-action="month-shift" data-delta="1" aria-label="Next month">${I.arrow}</button>
    </div>
    <div class="month-grid">`;
  DAY_LABELS.forEach(d => { html += `<div class="month-dow">${d}</div>`; });

  /* Leading days (previous month) */
  for (let i = startDow - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    const d = new Date(year, month - 1, day);
    html += renderMonthCell(d, today, true);
  }
  /* Current month */
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    html += renderMonthCell(date, today, false);
  }
  /* Trailing days */
  const totalCells = startDow + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const date = new Date(year, month + 1, i);
    html += renderMonthCell(date, today, true);
  }
  html += `</div>`;
  main.innerHTML = html;
}
function renderMonthCell(date, today, other) {
  const acts = activitiesForDate(date);
  /* Collect up to 5 unique colors directly from the day's activities */
  const seen = new Set();
  const colors = [];
  for (const a of acts) {
    const col = (a.color) || FALLBACK_COLOR;
    if (!seen.has(col)) {
      seen.add(col);
      colors.push(col);
      if (colors.length >= 5) break;
    }
  }
  const isToday = isSameDay(date, today);
  return `
    <div class="month-cell ${isToday?'today':''} ${other?'other':''}" data-action="month-pick" data-date="${dateKey(date)}">
      <div class="num">${date.getDate()}</div>
      <div class="dots">
        ${colors.map(col => `<span class="dot" style="background:${hexRgba(col, 0.85)}"></span>`).join('')}
      </div>
    </div>`;
}

          <div>

            <input type="time" class="input" id="f_end" value="${a.endTime}"/>

        <div class="form-group">
          <label class="form-label">Repeats</label>
          <div class="chip-row">
            ${REPEAT_OPTIONS.map(r => `
              <button class="chip ${a.repeat===r.id?'active':''}" data-action="pick-repeat" data-repeat="${r.id}">${r.label}</button>
            `).join('')}

          ${a.repeat === 'custom' ? `

    if (el) {

function reminderToggle(key, label, desc, on) {
  return `
    <div class="toggle">
