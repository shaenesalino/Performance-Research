function closeEdit() {
  const m = document.getElementById('editModal');
  m.hidden = true;
  m.innerHTML = '';
  state.editing = null;
}
function saveEditingFromInputs() {
  const a = state.editing;
  if (!a) return;
  const name = document.getElementById('f_name')?.value?.trim();
  const startTime = document.getElementById('f_start')?.value;
  const endTime = document.getElementById('f_end')?.value;
  if (name !== undefined) a.name = name;
  if (startTime) a.startTime = startTime;
  if (endTime) a.endTime = endTime;
}
function commitActivity(skipOverlapCheck) {
  saveEditingFromInputs();
  const a = state.editing;
  if (!a) return;
  if (!a.name) { showToast('Please name this activity.', 'warn'); return; }
  if (parseHM(a.endTime) <= parseHM(a.startTime)) {
    showToast('End time must be after start time.', 'warn');
    return;
  }

  /* Overlap warning */
  if (!skipOverlapCheck) {
    const conflicts = findStrictOverlaps(a);
    if (conflicts.length) {
      const lines = conflicts.slice(0, 3).map(c =>
        `• ${escape(c.other.name)} (${fmtRange(c.other.startTime, c.other.endTime)}) on ${escape(c.sharedDayLabels)}`
      ).join('<br>');
      const more = conflicts.length > 3 ? `<br>…and ${conflicts.length - 3} more` : '';
      confirmActionHTML(
        'Schedule overlap',
        `This overlaps with:<br><br>${lines}${more}<br><br>You can save anyway, or cancel to adjust the time.`,
        'Save anyway',
        () => commitActivity(true)
      );
      return;
    }
  }

  const idx = state.activities.findIndex(x => x.id === a.id);
  if (idx >= 0) state.activities[idx] = a;
  else state.activities.push(a);
  saveState();
  closeEdit();
  render();
  showToast(idx >= 0 ? 'Activity updated.' : 'Activity added.');
}

/* ============================================================
   TIMER MODAL
   ============================================================ */
function openTimer(activityId) {
  const a = state.activities.find(x => x.id === activityId);
  if (!a) return;
  const today = new Date();
  const isToday = isSameDay(state.selectedDate, today);
  if (!isToday) {
    /* Just preview */
    state.timer = { activityId, mode:'preview' };
    renderTimerModal();
    return;
  }
  const nowMin = nowMinutes();
  const s = parseHM(a.startTime), e = parseHM(a.endTime);
  if (nowMin < s) {
    /* Compute the actual start moment as a Date.now()-style ms timestamp */
    const startDate = new Date(state.selectedDate);
    startDate.setHours(Math.floor(s/60), s%60, 0, 0);
    const endDate = new Date(state.selectedDate);
    endDate.setHours(Math.floor(e/60), e%60, 0, 0);
    state.timer = {
      activityId,
      mode:'pre',
      startsAtMs: startDate.getTime(),
      endsAtMs: endDate.getTime()
    };
  } else if (nowMin >= e) {
    state.timer = { activityId, mode:'post' };
  } else {
    /* Absolute timing: anchor the ring to the activity's real start moment so
       progress continues even after the modal is closed and reopened. */
    const startDate = new Date(state.selectedDate);
    startDate.setHours(Math.floor(s/60), s%60, 0, 0);
    state.timer = {
      activityId,
      mode: 'strict',
      durationMs: (e - s) * 60000,
      startedAt: startDate.getTime()
    };
  }
  renderTimerModal();
}
function closeTimer() {
  const m = document.getElementById('timerModal');
  m.hidden = true;
  m.innerHTML = '';
  state.timer = null;
  render();
}
function getTimerElapsed() {
  const t = state.timer;
  if (!t || !t.startedAt) return 0;
  return Date.now() - t.startedAt;
}
function renderTimerModal(soft) {
  const m = document.getElementById('timerModal');
  const t = state.timer;
  if (!t) { m.hidden = true; return; }
  const a = state.activities.find(x => x.id === t.activityId);
  if (!a) { m.hidden = true; return; }
  const cat = catDisplay(a);

  if (t.mode === 'pre') {
    const remainMs = Math.max(0, t.startsAtMs - Date.now());
    const remainSec = Math.floor(remainMs / 1000);

    if (soft) {
      const num = m.querySelector('.pre-timer .big');
      if (num) num.textContent = fmtHMS(remainSec);
      return;
    }

    m.innerHTML = `
      <div class="modal timer-modal" role="dialog" aria-modal="true">
        <div class="timer-body">
          <div class="timer-header-row">
            ${iconChip(a.icon, a.category, 'lg', a.color)}
            <div class="timer-header-meta">
              <div class="timer-title">${escape(a.name)}</div>
              <div class="timer-sub">${fmtRange(a.startTime, a.endTime)}</div>
            </div>
          </div>
          <div class="pre-timer">
            <div class="big">${fmtHMS(remainSec)}</div>
            <div class="small">until it begins</div>
          </div>
          <div class="timer-actions">
            <button class="btn btn-soft" data-action="close-timer">${I.arrow}<span>Back to Calendar</span></button>
          </div>
        </div>
      </div>`;
    m.hidden = false;
    return;
  }

  if (t.mode === 'post' || t.mode === 'preview') {
    const today = state.selectedDate;
    const isDone = isCompleted(a.id, today);
    m.innerHTML = `
      <div class="modal timer-modal" role="dialog" aria-modal="true">
        <div class="timer-body">
          <div class="timer-header-row">
            ${iconChip(a.icon, a.category, 'lg', a.color)}
            <div class="timer-header-meta">
              <div class="timer-title">${escape(a.name)}</div>
              <div class="timer-sub">${fmtRange(a.startTime, a.endTime)}</div>
            </div>
          </div>
          <div class="pre-timer">
            <div class="big">${isDone ? 'Completed' : (t.mode === 'preview' ? 'Scheduled' : 'Time has passed')}</div>
            <div class="small">${isDone ? 'Nice work.' : ''}</div>
          </div>
          <div class="timer-actions">
            <button class="btn btn-soft" data-action="close-timer">${I.arrow}<span>Back</span></button>
            <button class="btn btn-primary" data-action="mark-done" data-activity-id="${a.id}">${I.check}<span>${isDone ? 'Undo Done' : 'Mark Done'}</span></button>
          </div>
        </div>
      </div>`;
    m.hidden = false;
    return;
  }

  /* strict or task active timer */
  const elapsed = getTimerElapsed();
  const remainMs = Math.max(0, t.durationMs - elapsed);
  const remainSec = Math.floor(remainMs / 1000);
  const progress = t.durationMs ? (1 - remainMs / t.durationMs) : 0;

  const r = 110;
  const C = 2 * Math.PI * r;
  const offset = C * (1 - Math.min(1, Math.max(0, progress)));

  /* Color thresholds */
  const ratio = remainMs / t.durationMs;
  let warnClass = '';
  if (ratio <= 0.15) warnClass = 'crit';
  else if (ratio <= 0.35) warnClass = 'warn';

  if (soft) {
    const wrap = m.querySelector('.timer-ring-wrap');
    const fg = m.querySelector('.timer-ring .fg');
    const num = m.querySelector('.timer-readout .num');
    if (wrap) wrap.className = 'timer-ring-wrap ' + warnClass;
    if (fg) fg.style.strokeDashoffset = offset;
    if (num) num.textContent = fmtHMS(remainSec);
    return;
  }

  m.innerHTML = `
    <div class="modal timer-modal" role="dialog" aria-modal="true">
      <div class="timer-body">
        <div class="timer-header-row">
          ${iconChip(a.icon, a.category, 'lg', a.color)}
          <div class="timer-header-meta">
            <div class="timer-title">${escape(a.name)}</div>
            <div class="timer-sub">${fmtRange(a.startTime, a.endTime)}</div>
          </div>
        </div>
        <div class="timer-ring-wrap ${warnClass}">
          <svg class="timer-ring" viewBox="0 0 240 240">
            <circle class="bg" cx="120" cy="120" r="${r}" fill="none" stroke-width="14"/>
            <circle class="fg" cx="120" cy="120" r="${r}" fill="none" stroke-width="14"
              stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="timer-readout">
            <div class="num">${fmtHMS(remainSec)}</div>
            <div class="lbl">until finish</div>
          </div>
        </div>
        <div class="timer-actions">
          <button class="btn btn-ghost" data-action="close-timer">${I.arrow}<span>Back</span></button>
          <button class="btn btn-primary" data-action="mark-done" data-activity-id="${a.id}">${I.check}<span>Done</span></button>
        </div>
      </div>
    </div>`;
  m.hidden = false;
}

/* ============================================================
   REMINDERS / TOASTS
   ============================================================ */
function showToast(message, type = 'info', body = '') {
  const root = document.getElementById('toastContainer');
  const icon = type === 'alert' ? I.bell : type === 'warn' ? I.bell : I.bell;
  const node = el(`
    <div class="toast ${type==='alert'?'alert':type==='warn'?'warn':''}">
      <div class="icon-wrap">${icon}</div>
      <div class="meta">
        <div class="title">${escape(message)}</div>
        ${body ? `<div class="body">${escape(body)}</div>` : ''}
      </div>
    </div>
  `);
  root.appendChild(node);
  setTimeout(() => {
    node.style.transition = 'opacity 0.4s, transform 0.4s';
    node.style.opacity = '0';
    node.style.transform = 'translateY(-8px)';
    setTimeout(() => node.remove(), 420);
  }, 4500);
}
function checkReminders() {
  const now = new Date();
  if (!isSameDay(state.selectedDate, now) && state.view !== 'today') {
    /* Still fire today's reminders even when viewing other days */
  }
  const today = new Date();
  const nowMin = nowMinutes();
  const key = dateKey(today);
  const acts = activitiesForDate(today);
  acts.forEach(a => {
    if (isCompleted(a.id, today)) return;
    const s = parseHM(a.startTime), e = parseHM(a.endTime);
    /* before start: 5 min ahead */
    if (a.reminders?.beforeStart) {
      const trigger = s - 5;
      const k = `${a.id}-beforeStart-${key}`;
      if (nowMin >= trigger && nowMin < s && !state.shownReminders.has(k)) {
        state.shownReminders.add(k);
        showToast(`${a.name} starts in 5 minutes.`);
      }
    }
    /* at start */
    if (a.reminders?.atStart) {
      const k = `${a.id}-atStart-${key}`;
      if (nowMin >= s && nowMin < s + 1.2 && !state.shownReminders.has(k)) {
        state.shownReminders.add(k);
        showToast(`It's time for ${a.name}.`);
      }
    }
    /* almost over: 3 min before end */
    if (a.reminders?.almostOver) {
      const trigger = e - 3;
      const k = `${a.id}-almostOver-${key}`;
      if (nowMin >= trigger && nowMin < e && !state.shownReminders.has(k)) {
        state.shownReminders.add(k);
        showToast(`${a.name} is almost done.`, 'warn');
      }
    }
  });
}
function preMarkPastReminders() {
  /* On load, mark reminders whose times have already passed so we don't spam */
  const today = new Date();
  const nowMin = nowMinutes();
  const key = dateKey(today);
  const acts = activitiesForDate(today);
  acts.forEach(a => {
    const s = parseHM(a.startTime), e = parseHM(a.endTime);
    if (nowMin >= s) state.shownReminders.add(`${a.id}-beforeStart-${key}`);
    if (nowMin > s + 1.2) state.shownReminders.add(`${a.id}-atStart-${key}`);
    if (nowMin >= e) state.shownReminders.add(`${a.id}-almostOver-${key}`);
  });
}

    </div>`;
  m.hidden = false;
  m.querySelector('#cancelBtn').onclick = () => { m.hidden = true; m.innerHTML = ''; };
  m.querySelector('#okBtn').onclick = () => {
    m.hidden = true; m.innerHTML = '';
    onConfirm && onConfirm();
  };
}

/* ============================================================
   COPY SCHEDULE
   ============================================================ */
let _copySched = { sourceDay: 1, targetDays: new Set() };
function openCopyScheduleModal() {
  _copySched = { sourceDay: new Date().getDay(), targetDays: new Set() };
  renderCopyScheduleModal();
}
function renderCopyScheduleModal() {
  const m = document.getElementById('confirmModal');
  const sourceCount = state.activities.filter(a => isScheduledOn(a, _fakeDateForDow(_copySched.sourceDay))).length;
  const dayChips = (which) => DAY_LABELS.map((lbl, i) => {
    const selected = which === 'source' ? _copySched.sourceDay === i : _copySched.targetDays.has(i);
    return `<button class="day-chip ${selected?'selected':''}" data-action="copy-${which}-pick" data-dow="${i}">${lbl}</button>`;
  }).join('');
  m.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" style="max-width:460px">
      <div class="modal-header">
        <div style="font-size:17px;font-weight:800;color:var(--gray-900)">Copy Schedule</div>
        <button class="icon-btn" data-action="copy-cancel" aria-label="Close">${I.close}</button>
      </div>
      <div class="modal-body">
        <div class="form-label">Copy activities from</div>
        <div class="day-chips">${dayChips('source')}</div>
        <div class="copy-summary">${sourceCount} activit${sourceCount===1?'y':'ies'} on ${DAY_LABELS_FULL[_copySched.sourceDay]}.</div>

        <div class="form-label" style="margin-top:14px">To these days</div>
        <div class="day-chips">${dayChips('target')}</div>
        <div class="copy-help">${I.info}<span>Each chosen activity will be duplicated as a custom-day copy on the selected days. Existing activities are not changed.</span></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-action="copy-cancel">Cancel</button>
        <button class="btn btn-primary" data-action="copy-apply">${I.copy}<span>Copy</span></button>
      </div>
    </div>`;
  m.hidden = false;
}
function _fakeDateForDow(dow) {
  /* Build a date with the given day-of-week (uses a known Sunday as anchor) */
  const anchor = new Date(2024, 0, 7); // Sunday Jan 7, 2024
  anchor.setDate(anchor.getDate() + dow);
  return anchor;
}
function applyCopySchedule() {
  const src = _copySched.sourceDay;
  const targets = [..._copySched.targetDays].filter(d => d !== src);
  if (!targets.length) {
    showToast('Pick at least one different target day.', 'warn');
    return;
  }
  const sourceActs = state.activities.filter(a => isScheduledOn(a, _fakeDateForDow(src)));
  if (!sourceActs.length) {
    showToast('Nothing to copy on that day.', 'warn');
    return;
  }
  let added = 0;
  sourceActs.forEach(a => {
    targets.forEach(t => {
      const clone = JSON.parse(JSON.stringify(a));
      clone.id = 'a' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
      clone.repeat = 'custom';
      clone.customDays = [t];
      state.activities.push(clone);
      added++;
    });
  });
  saveState();
  const cm = document.getElementById('confirmModal');
  cm.hidden = true; cm.innerHTML = '';
  render();
  showToast(`Copied ${added} activit${added===1?'y':'ies'} to ${targets.length} day${targets.length===1?'':'s'}.`);
}

/* ============================================================
   CATEGORIES MANAGEMENT
   ============================================================ */
let _editingCategories = null; // working copy [{id,label}, ...]
function openCategoriesModal() {
  _editingCategories = JSON.parse(JSON.stringify(state.categories));
  renderCategoriesModal();
}
function renderCategoriesModal() {
  const m = document.getElementById('confirmModal');
  /* Snapshot focus + scroll across re-renders.
     The .modal element is the actual scroller (overflow-y:auto), not .modal-body. */
  const prevModalEl = m.querySelector('.modal');
  const prevScroll = prevModalEl ? prevModalEl.scrollTop : 0;
  const prevFocusIdx = document.activeElement && document.activeElement.classList.contains('cat-name')
    ? document.activeElement.dataset.idx : null;
  let prevSelStart = null, prevSelEnd = null;
  if (prevFocusIdx != null && document.activeElement && 'selectionStart' in document.activeElement) {
    try {
      prevSelStart = document.activeElement.selectionStart;
      prevSelEnd = document.activeElement.selectionEnd;
    } catch(e) {}
  }

  const rows = _editingCategories.map((c, idx) => {
    const useCount = state.activities.filter(a => a.category === c.id).length;
    return `
      <div class="cat-row" data-idx="${idx}">
        <input class="input cat-name" data-idx="${idx}" value="${escape(c.label)}" maxlength="20" placeholder="Category name"/>
        <span class="cat-count">${useCount} use${useCount===1?'':'s'}</span>
        <button class="icon-btn" data-action="cat-delete" data-idx="${idx}" aria-label="Delete category">${I.trash}</button>
      </div>`;
  }).join('');

  m.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" style="max-width:480px">
      <div class="modal-header">
        <div style="font-size:17px;font-weight:800;color:var(--gray-900)">Manage Categories</div>
        <button class="icon-btn" data-action="cat-cancel" aria-label="Close">${I.close}</button>
      </div>
      <div class="modal-body">
        <div class="form-help" style="margin-bottom:10px">Categories are simple labels for organizing activities. Pick the per-activity color in the activity editor.</div>
        <div class="cat-list">${rows}</div>
        <button class="btn btn-soft btn-sm" data-action="cat-add" style="margin-top:10px">${I.plus}<span>Add Category</span></button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-action="cat-cancel">Cancel</button>
        <button class="btn btn-primary" data-action="cat-save">${I.check}<span>Save</span></button>
      </div>
    </div>`;
  m.hidden = false;

  /* Restore focus + scroll */
  const newModalEl = m.querySelector('.modal');
  if (newModalEl) newModalEl.scrollTop = prevScroll;
  if (prevFocusIdx != null) {
    const inp = m.querySelector(`.cat-name[data-idx="${prevFocusIdx}"]`);
    if (inp) {
      inp.focus({ preventScroll: true });
      if (prevSelStart != null && 'setSelectionRange' in inp) {
        try { inp.setSelectionRange(prevSelStart, prevSelEnd); } catch(e) {}
      }
    }
  }
}
function readCatNamesFromInputs() {
  const m = document.getElementById('confirmModal');
  m.querySelectorAll('.cat-name').forEach(inp => {
    const idx = +inp.dataset.idx;
    if (_editingCategories[idx]) _editingCategories[idx].label = inp.value;
  });
}
function commitCategories() {
  readCatNamesFromInputs();
  /* Validate: no empties */
  for (const c of _editingCategories) {
    if (!c.label.trim()) { showToast('Category names cannot be empty.', 'warn'); return; }
  }
  if (_editingCategories.length === 0) {
    showToast('Keep at least one category.', 'warn'); return;
  }
  state.categories = _editingCategories;
  /* Reassign any activity whose category id no longer exists → first remaining category */
  const validIds = new Set(state.categories.map(c => c.id));
  const fallbackId = state.categories[0].id;
  state.activities.forEach(a => {
    if (!validIds.has(a.category)) a.category = fallbackId;
  });
  saveState();
  const m = document.getElementById('confirmModal');
  m.hidden = true; m.innerHTML = '';
  render();
  showToast('Categories saved.');
}

/* ============================================================
   ONBOARDING
   ============================================================ */
function maybeShowOnboarding() {
  if (state.prefs.onboardingDone) return;
  const m = document.getElementById('confirmModal');
  m.innerHTML = `
    <div class="modal onboarding-modal" role="dialog" aria-modal="true">
      <div class="ob-hero">${I.smile}</div>
      <div class="ob-title">Welcome to <span class="mark">I'M ON!</span> Tiny Tasks</div>
      <div class="ob-sub">A calm visual routine for your child.</div>
      <ul class="ob-list">
        <li><span class="dot">${I.edit}</span><div><b>Add your child's routine</b> in Parent Setup.</div></li>
        <li><span class="dot">${I.navToday}</span><div><b>Today</b> shows what's happening now and what's next.</div></li>
        <li><span class="dot">${I.playArr}</span><div><b>Tap any activity</b> to open the visual timer.</div></li>
        <li><span class="dot">${I.bell}</span><div><b>Reminders</b> appear while this app is open.</div></li>
      </ul>
      <div class="ob-actions">
        <button class="btn btn-primary" data-action="onboarding-done">${I.check}<span>Got it</span></button>
      </div>
    </div>`;
  m.hidden = false;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  renderNav();
  switch (state.view) {
    case 'today': renderToday(); break;
    case 'week':  renderWeek();  break;
    case 'month': renderMonth(); break;
    case 'setup': renderSetup(); break;
  }
  updateClock();
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click', (ev) => {
  const target = ev.target.closest('[data-action]');
  if (!target) return;
  const a = target.dataset.action;

  switch (a) {
    case 'nav': {
      state.view = target.dataset.view;
      if (state.view === 'today') state.selectedDate = new Date();
      if (state.view === 'week')  state.weekCursor   = new Date();
      if (state.view === 'month') state.monthCursor  = new Date();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      break;
    }
    case 'open-timer': {
      ev.stopPropagation();
      openTimer(target.dataset.activityId);
      break;
    }
    case 'mark-done': {
      ev.stopPropagation();
      const id = target.dataset.activityId;
      toggleCompletion(id, state.selectedDate);
      const wasDone = isCompleted(id, state.selectedDate);
      showToast(wasDone ? 'Marked done.' : 'Unmarked.');
      if (state.timer) closeTimer();
      else render();
      break;
    }
    case 'reset-day': {
      confirmAction('Reset today?', 'This will clear all completion marks for today.', () => {
        resetDay(state.selectedDate);
        render();
        showToast('Today reset.');
      });
      break;
    }
    case 'today-shift': {
      const d = new Date(state.selectedDate);
      d.setDate(d.getDate() + Number(target.dataset.delta));
      state.selectedDate = d;
      render();
      break;
    }
    case 'today-jump': {
      state.selectedDate = new Date();
      render();
      break;
    }
    case 'week-shift': {
      const d = new Date(state.weekCursor);
      d.setDate(d.getDate() + Number(target.dataset.delta));
      state.weekCursor = d;
      render();
      break;
    }
    case 'week-pick': {
      const [y, mo, da] = target.dataset.date.split('-').map(Number);
      state.selectedDate = new Date(y, mo-1, da);
      state.view = 'today';
      render();
      break;
    }
    case 'month-shift': {
      const d = new Date(state.monthCursor);
      d.setMonth(d.getMonth() + Number(target.dataset.delta));
      state.monthCursor = d;
      render();
      break;
    }
    case 'month-pick': {
      const [y, mo, da] = target.dataset.date.split('-').map(Number);
      state.selectedDate = new Date(y, mo-1, da);
      state.view = 'today';
      render();
      break;
    }
    case 'add-activity': openEditModal(null); break;
    case 'edit-activity': openEditModal(target.dataset.id); break;

    /* PIN */
    case 'pin-submit': {
      const inp = document.getElementById('pinInput');
      const err = document.getElementById('pinError');
      if (!inp) break;
      if ((inp.value || '') === (state.prefs.parentPin || '1234')) {
        state.pinUnlocked = true;
        render();
      } else {
        if (err) err.textContent = 'Wrong PIN. Try again.';
        inp.value = '';
        inp.focus();
      }
      break;
    }
    case 'pin-lock': {
      state.pinUnlocked = false;
      render();
      break;
    }

    /* Copy schedule */
    case 'open-copy-schedule': openCopyScheduleModal(); break;
    case 'copy-source-pick': {
      _copySched.sourceDay = +target.dataset.dow;
      renderCopyScheduleModal();
      break;
    }
    case 'copy-target-pick': {
      const d = +target.dataset.dow;
      if (_copySched.targetDays.has(d)) _copySched.targetDays.delete(d);
      else _copySched.targetDays.add(d);
      renderCopyScheduleModal();
      break;
    }
    case 'copy-cancel': {
      const m = document.getElementById('confirmModal');
      m.hidden = true; m.innerHTML = '';
      break;
    }
    case 'copy-apply': applyCopySchedule(); break;

    /* Categories management */
    case 'open-categories': openCategoriesModal(); break;
    case 'cat-add': {
      readCatNamesFromInputs();
      const id = 'c' + Date.now() + Math.random().toString(36).slice(2,5);
      _editingCategories.push({ id, label: 'New category' });
      renderCategoriesModal();
      break;
    }
    case 'cat-delete': {
      readCatNamesFromInputs();
      const idx = +target.dataset.idx;
      const c = _editingCategories[idx];
      if (!c) break;
      const useCount = state.activities.filter(a => a.category === c.id).length;
      const doDelete = () => {
        _editingCategories.splice(idx, 1);
        renderCategoriesModal();
      };
      if (useCount > 0) {
        confirmActionHTML(
          `Delete "${escape(c.label)}"?`,
          `${useCount} activit${useCount===1?'y'.replace('y','y'):'ies'} use this category. They'll be reassigned to the first remaining category when you save.`,
          'Delete',
          doDelete
        );
      } else {
        doDelete();
      }
      break;
    }
    case 'cat-cancel': {
      const m = document.getElementById('confirmModal');
      m.hidden = true; m.innerHTML = '';
      _editingCategories = null;
      break;
    }
    case 'cat-save': commitCategories(); break;

    /* Onboarding */
    case 'onboarding-done': {
      state.prefs.onboardingDone = true;
      saveState();
      const m = document.getElementById('confirmModal');
      m.hidden = true; m.innerHTML = '';
      break;
    }

    /* Auto-follow toggle */
    case 'toggle-autofollow': {
      state.prefs.autoFollow = !state.prefs.autoFollow;
      saveState();
      render();
      break;
    }
    case 'delete-activity': {
      const id = target.dataset.id;
      const a = state.activities.find(x => x.id === id);
      if (!a) break;
      confirmAction(`Delete "${a.name}"?`, 'This activity will be removed from the schedule.', () => {
        state.activities = state.activities.filter(x => x.id !== id);
        saveState();
        render();
        showToast('Activity deleted.');
      });
      break;
    }
    case 'reset-data': {
      confirmAction('Reset everything?', 'All your activities and progress will return to the starter routine.', () => {
        state.activities = JSON.parse(JSON.stringify(DEFAULT_ACTIVITIES));
        state.completions = {};
        state.shownReminders = new Set();
        saveState();
        preMarkPastReminders();
        render();
        showToast('Reset to defaults.');
      });
      break;
    }
    case 'close-edit': closeEdit(); break;
    case 'pick-icon': {
      state.editing.icon = target.dataset.icon;
      /* Toggle .active class on icon-pick buttons */
      target.parentElement.querySelectorAll('.icon-pick.active').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      break;
    }
    case 'pick-cat': {
      state.editing.category = target.dataset.cat;
      target.parentElement.querySelectorAll('.chip.active').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      break;
    }
    case 'pick-color': {
      const col = target.dataset.color || '';
      state.editing.color = col || null;
      target.parentElement.querySelectorAll('.color-swatch.active').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      /* Update helper text */
      const helper = target.parentElement.parentElement.querySelector('.form-help');
      if (helper) helper.textContent = state.editing.color ? 'Custom color set.' : 'Using default color.';
      break;
    }
    case 'pick-repeat': {
      const newRepeat = target.dataset.repeat;
      const wasCustom = state.editing.repeat === 'custom';
      const isCustom = newRepeat === 'custom';
      state.editing.repeat = newRepeat;
      if (isCustom && (!state.editing.customDays || state.editing.customDays.length === 0)) {
        state.editing.customDays = [1,2,3,4,5];
      }
      target.parentElement.querySelectorAll('.chip.active').forEach(b => b.classList.remove('active'));
      target.classList.add('active');
      /* Show/hide custom-day toggles only when crossing the custom boundary */
      if (wasCustom !== isCustom) {
        const formGroup = target.closest('.form-group');
        const existingToggles = formGroup.querySelector('.day-toggles');
        if (isCustom && !existingToggles) {
          const wrap = document.createElement('div');
          wrap.className = 'day-toggles';
          wrap.style.marginTop = '10px';
          wrap.innerHTML = DAY_LABELS.map((d,i) =>
            `<button class="day-toggle ${state.editing.customDays.includes(i)?'on':''}" data-action="toggle-day" data-day="${i}" aria-label="${d}">${d}</button>`
          ).join('');
          formGroup.appendChild(wrap);
        } else if (!isCustom && existingToggles) {
          existingToggles.remove();
        }
      }
      break;
    }
    case 'toggle-day': {
      const d = +target.dataset.day;
      const arr = state.editing.customDays || [];
      const idx = arr.indexOf(d);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(d);
      state.editing.customDays = arr;
      target.classList.toggle('on');
      break;
    }
    case 'toggle-reminder': {
      const k = target.dataset.key;
      state.editing.reminders[k] = !state.editing.reminders[k];
      target.classList.toggle('on');
      target.setAttribute('aria-pressed', String(state.editing.reminders[k]));
      break;
    }
    case 'save-activity': commitActivity(); break;

    case 'close-timer': closeTimer(); break;
  }
});

/* Click backdrop to close modals */
['timerModal','editModal','confirmModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', (ev) => {
    if (ev.target.id === id) {
      if (id === 'editModal') closeEdit();
      else if (id === 'timerModal') closeTimer();
      else { ev.currentTarget.hidden = true; ev.currentTarget.innerHTML = ''; }
    }
  });
});

/* Escape closes modals */
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') {
    if (!document.getElementById('timerModal').hidden) closeTimer();
    else if (!document.getElementById('editModal').hidden) closeEdit();
    else if (!document.getElementById('confirmModal').hidden) {
      const m = document.getElementById('confirmModal');
      m.hidden = true; m.innerHTML = '';
    }
  }
});

/* ============================================================
   TICKER
   ============================================================ */
let lastMinute = -1;
function tick() {
  updateClock();

  /* Update visible "live" elements only when minute changes */
  const m = new Date().getMinutes();
  if (m !== lastMinute) {
    lastMinute = m;
    checkReminders();
    if (state.view === 'today' && isSameDay(state.selectedDate, new Date())) {
      render();
    }
  }

  /* If timer is open, soft-update */
  if (state.timer) {
    if (state.timer.mode === 'pre') {
      /* Auto-transition to active strict timer when start moment arrives */
      if (Date.now() >= state.timer.startsAtMs) {
        const a = state.activities.find(x => x.id === state.timer.activityId);
        if (a) {
          const totalMs = state.timer.endsAtMs - state.timer.startsAtMs;
          state.timer = {
            activityId: state.timer.activityId,
            mode: 'strict',
            durationMs: totalMs,
            startedAt: state.timer.startsAtMs
          };
          showToast(`It's time for ${a.name}.`);
          renderTimerModal();
        } else {
          closeTimer();
        }
      } else {
        renderTimerModal(true);
      }
    } else if (state.timer.mode === 'strict') {
      const elapsed = getTimerElapsed();
      if (elapsed >= state.timer.durationMs && !state.timer.finished) {
        state.timer.finished = true;
        showToast(`${state.activities.find(x=>x.id===state.timer.activityId)?.name} time is up.`, 'warn');
      }
      renderTimerModal(true);
    }
  }
}

/* ============================================================
   BOOT
   ============================================================ */
loadState();
preMarkPastReminders();
render();
maybeShowOnboarding();
state.ticker = setInterval(tick, 1000);
</script>
